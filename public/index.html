<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Survival Evolution — 2D</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   Survival Evolution — görsel sistem
   Palet: orman gecesi + parlayan chakra-teal vurgu
   ============================================================ */
:root {
  --bg-0: #0b1410;
  --bg-1: #101d17;
  --panel: #142219;
  --border: #24402f;
  --text: #eaf3ec;
  --text-dim: #8ba896;
  --accent: #4ce0c4;
  --accent-dim: #2a8c78;
  --accent-glow: rgba(76, 224, 196, 0.35);
  --danger: #ff6a5a;
  --radius: 14px;
  --font-display: 'Bebas Neue', 'Impact', sans-serif;
  --font-body: 'Space Grotesk', -apple-system, Segoe UI, sans-serif;
}

* { box-sizing: border-box; }

html, body {
  margin: 0; padding: 0; width: 100%; height: 100%;
  background: var(--bg-0);
  color: var(--text);
  font-family: var(--font-body);
  overflow: hidden;
  -webkit-tap-highlight-color: transparent;
}

.hidden { display: none !important; }

/* ─────────── Auth ekranı ─────────── */
.screen {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  background:
    radial-gradient(circle at 50% 30%, rgba(76, 224, 196, 0.10), transparent 55%),
    radial-gradient(circle at 85% 80%, rgba(255, 106, 90, 0.06), transparent 45%),
    var(--bg-0);
  padding: 24px;
  position: relative;
}

.card {
  position: relative;
  background: linear-gradient(180deg, var(--panel), var(--bg-1));
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 32px 26px 26px;
  width: 340px; max-width: 100%;
  text-align: center;
  box-shadow: 0 20px 60px -20px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(76, 224, 196, 0.04);
}

.chakraRing {
  position: absolute;
  top: -70px; left: 50%; transform: translateX(-50%);
  width: 220px; height: 220px;
  border-radius: 50%;
  border: 1.5px solid var(--accent-glow);
  box-shadow: 0 0 60px 10px var(--accent-glow), inset 0 0 40px rgba(76, 224, 196, 0.08);
  pointer-events: none;
  z-index: 0;
  animation: chakraPulse 4.5s ease-in-out infinite;
}
@keyframes chakraPulse {
  0%, 100% { opacity: 0.45; transform: translateX(-50%) scale(0.96); }
  50% { opacity: 0.9; transform: translateX(-50%) scale(1.04); }
}

.card h1 {
  position: relative; z-index: 1;
  font-family: var(--font-display);
  font-size: 40px;
  line-height: 0.92;
  letter-spacing: 0.5px;
  margin: 0 0 18px;
  color: var(--text);
  text-shadow: 0 0 24px var(--accent-glow);
}

.hint {
  font-size: 12.5px;
  color: var(--text-dim);
  margin: 0 0 14px;
  letter-spacing: 0.2px;
}

.card input {
  width: 100%;
  padding: 12px 14px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--bg-1);
  color: var(--text);
  font-family: var(--font-body);
  font-size: 14px;
  margin-bottom: 9px;
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.card input::placeholder { color: #5c7568; }
.card input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}

.card button {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: var(--accent);
  color: #06231c;
  font-family: var(--font-body);
  font-weight: 700;
  font-size: 14px;
  letter-spacing: 0.2px;
  cursor: pointer;
  margin-top: 3px;
  transition: transform 0.12s, box-shadow 0.15s, background 0.15s;
  box-shadow: 0 8px 20px -8px var(--accent-glow);
}
.card button:hover { background: #63e9d0; box-shadow: 0 10px 26px -6px var(--accent-glow); }
.card button:active { transform: scale(0.98); }

.card button.link {
  background: none;
  color: var(--accent);
  font-size: 12px;
  font-weight: 500;
  text-decoration: none;
  border-bottom: 1px solid transparent;
  padding: 8px 0;
  margin-top: 6px;
  box-shadow: none;
  opacity: 0.85;
}
.card button.link:hover { opacity: 1; border-bottom-color: var(--accent); background: none; }

.msg {
  font-size: 12px;
  color: var(--danger);
  min-height: 16px;
  margin: 8px 0 0;
}

/* ─────────── Oyun ekranı ─────────── */
#gameScreen { position: relative; width: 100%; height: 100%; background: var(--bg-0); }
#c { display: block; width: 100%; height: 100%; touch-action: none; }

#hud {
  position: absolute; top: 12px; left: 12px; right: 12px; z-index: 3;
  display: flex; align-items: center; gap: 10px;
  pointer-events: none;
  font-family: var(--font-body);
}
#hpwrap {
  width: 120px; height: 11px;
  background: rgba(8, 16, 12, 0.6);
  border: 1px solid var(--border);
  border-radius: 7px;
  overflow: hidden;
  backdrop-filter: blur(4px);
}
#hpbar {
  width: 100%; height: 100%;
  background: linear-gradient(90deg, var(--accent-dim), var(--accent));
  box-shadow: 0 0 10px var(--accent-glow);
  transition: width 0.15s;
}
#invBar {
  background: rgba(10, 20, 15, 0.65);
  border: 1px solid var(--border);
  backdrop-filter: blur(6px);
  border-radius: 10px;
  padding: 7px 12px;
  display: flex; gap: 12px;
  font-size: 13px; font-weight: 600;
  pointer-events: auto;
}
#craftToggle {
  margin-left: auto;
  background: var(--accent);
  border: none;
  color: #06231c;
  font-family: var(--font-body);
  font-weight: 700;
  font-size: 13px;
  padding: 9px 14px;
  border-radius: 10px;
  pointer-events: auto;
  cursor: pointer;
  box-shadow: 0 6px 16px -6px var(--accent-glow);
}

#craftPanel {
  position: absolute; top: 58px; right: 12px; z-index: 3;
  display: flex; flex-direction: column; gap: 6px;
}
.craftBtn {
  background: rgba(10, 20, 15, 0.85);
  border: 1px solid var(--border);
  backdrop-filter: blur(6px);
  color: var(--text);
  font-family: var(--font-body);
  padding: 9px 14px;
  border-radius: 10px;
  cursor: pointer;
  text-align: left;
  font-size: 12.5px;
  font-weight: 600;
  transition: border-color 0.15s;
}
.craftBtn:hover { border-color: var(--accent); }
.craftBtn small { color: var(--text-dim); font-weight: 400; }

#touchControls { position: absolute; inset: 0; z-index: 3; pointer-events: none; }
#stick {
  position: absolute; left: 26px; bottom: 26px; width: 104px; height: 104px;
  border-radius: 50%;
  background: rgba(10, 20, 15, 0.5);
  border: 1px solid var(--border);
  backdrop-filter: blur(4px);
  pointer-events: auto;
}
#stickKnob {
  position: absolute; left: 32px; top: 32px; width: 40px; height: 40px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 16px var(--accent-glow);
}
#interactBtn {
  position: absolute; right: 28px; bottom: 34px; width: 78px; height: 78px;
  border-radius: 50%; border: none;
  background: var(--danger);
  color: #2a0805;
  font-family: var(--font-body);
  font-weight: 700; font-size: 11px;
  pointer-events: auto;
  box-shadow: 0 10px 26px -6px rgba(255, 106, 90, 0.5);
}

#toast {
  position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: rgba(10, 20, 15, 0.9);
  border: 1px solid var(--border);
  padding: 9px 18px;
  border-radius: 999px;
  font-family: var(--font-body);
  font-size: 13px;
  z-index: 4;
  pointer-events: none;
}

.overlay {
  position: absolute; inset: 0; z-index: 10;
  background: rgba(6, 12, 9, 0.86);
  backdrop-filter: blur(6px);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  text-align: center;
  font-family: var(--font-body);
}
.overlay .big {
  font-family: var(--font-display);
  font-size: 34px;
  letter-spacing: 0.5px;
  margin: 0 0 8px;
  color: var(--text);
}
.overlay button {
  padding: 11px 24px;
  border-radius: 10px;
  border: none;
  margin-top: 14px;
  background: var(--accent);
  color: #06231c;
  font-weight: 700;
  cursor: pointer;
  box-shadow: 0 8px 20px -8px var(--accent-glow);
}
.overlay button.secondary {
  background: none;
  border: 1px solid var(--border);
  color: var(--text);
  box-shadow: none;
}
.rotateIcon { font-size: 40px; margin-bottom: 10px; color: var(--accent); }

/* ─────────── Sohbet ─────────── */
.hudChatBtn {
  position: absolute; top: 12px; right: 118px; z-index: 3;
  width: 42px; height: 42px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: rgba(10, 20, 15, 0.75);
  backdrop-filter: blur(6px);
  font-size: 18px;
  cursor: pointer;
}
#chatPanel {
  position: absolute; top: 60px; right: 12px; z-index: 5;
  width: 240px; max-width: calc(100vw - 24px);
  background: rgba(10, 20, 15, 0.92);
  border: 1px solid var(--border);
  border-radius: 12px;
  backdrop-filter: blur(8px);
  display: flex; flex-direction: column;
  overflow: hidden;
}
#chatLog {
  max-height: 160px;
  overflow-y: auto;
  padding: 10px 12px;
  font-size: 12.5px;
  display: flex; flex-direction: column; gap: 4px;
}
.chatLine { color: var(--text); word-break: break-word; }
.chatName { color: var(--accent); font-weight: 700; }
#chatInputRow {
  display: flex; gap: 6px;
  padding: 8px;
  border-top: 1px solid var(--border);
}
#chatInputRow input {
  flex: 1;
  padding: 8px 10px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--bg-1);
  color: var(--text);
  font-family: var(--font-body);
  font-size: 12.5px;
  outline: none;
}
#chatInputRow input:focus { border-color: var(--accent); }
#chatInputRow button {
  padding: 8px 12px;
  border-radius: 8px;
  border: none;
  background: var(--accent);
  color: #06231c;
  font-weight: 700;
  font-size: 12px;
  cursor: pointer;
}

#fsPrompt {
  position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
  z-index: 6;
  background: rgba(10, 20, 15, 0.9);
  border: 1px solid var(--accent-dim);
  color: var(--accent);
  font-size: 12.5px; font-weight: 600;
  padding: 8px 16px;
  border-radius: 999px;
  cursor: pointer;
  animation: fsPulse 2s ease-in-out infinite;
}
@keyframes fsPulse {
  0%, 100% { box-shadow: 0 0 0 0 var(--accent-glow); }
  50% { box-shadow: 0 0 0 8px transparent; }
}

@media (max-width: 900px) and (orientation: portrait) {
  #gameScreen:not(.hidden) ~ #rotateOverlay { display: none; }
}

#c { image-rendering: pixelated; image-rendering: crisp-edges; background:#1a2a1f; }
</style>
</head>
<body>

<div id="rotateOverlay" class="overlay hidden">
  <div class="rotateIcon">&#8635;</div>
  <p>Oynamak için telefonunu yatay çevir</p>
</div>

<div id="authScreen" class="screen">
  <div class="card">
    <div class="chakraRing" aria-hidden="true"></div>
    <h1>Survival<br>Evolution</h1>

    <div id="loginPanel">
      <input type="text" id="loginUser" placeholder="Kahraman adı veya e-posta">
      <input type="password" id="loginPass" placeholder="Şifre">
      <button id="loginBtn">Giriş yap</button>
      <p id="loginMsg" class="msg"></p>
      <button class="link" id="toRegister">Hesabın yok mu? Kayıt ol</button>
      <button class="link" id="toForgot">Şifremi unuttum</button>
    </div>

    <div id="registerPanel" class="hidden">
      <input type="text" id="regUser" placeholder="Kahraman adı (3-16 karakter)">
      <input type="email" id="regEmail" placeholder="E-posta">
      <input type="password" id="regPass" placeholder="Şifre (en az 6 karakter)">
      <button id="registerBtn">Kayıt ol</button>
      <p id="registerMsg" class="msg"></p>
      <button class="link" id="toLoginFromReg">Zaten hesabın var mı? Giriş yap</button>
    </div>

    <div id="verifyPanel" class="hidden">
      <p class="hint">E-postana gelen 6 haneli kodu gir</p>
      <input type="text" id="verifyCode" placeholder="000000" maxlength="6" inputmode="numeric">
      <button id="verifyBtn">Doğrula</button>
      <p id="verifyMsg" class="msg"></p>
      <button class="link" id="resendBtn">Kodu tekrar gönder</button>
    </div>

    <div id="forgotPanel" class="hidden">
      <input type="email" id="forgotEmail" placeholder="Kayıtlı e-posta">
      <button id="forgotBtn">Kod gönder</button>
      <p id="forgotMsg" class="msg"></p>
      <button class="link" id="toLoginFromForgot">Girişe dön</button>
    </div>

    <div id="resetCodePanel" class="hidden">
      <p class="hint">E-postana gelen kodu gir</p>
      <input type="text" id="resetCode" placeholder="000000" maxlength="6" inputmode="numeric">
      <button id="resetCodeBtn">Kodu doğrula</button>
      <p id="resetCodeMsg" class="msg"></p>
    </div>

    <div id="resetPassPanel" class="hidden">
      <input type="password" id="newPass" placeholder="Yeni şifre (en az 6 karakter)">
      <button id="resetPassBtn">Şifreyi değiştir</button>
      <p id="resetPassMsg" class="msg"></p>
    </div>
  </div>
</div>

<div id="gameScreen" class="hidden">
  <div id="hud">
    <div id="hpwrap"><div id="hpbar"></div></div>
    <div id="invBar">
      <span class="invItem">🪵 <b id="invWood">0</b></span>
      <span class="invItem">🪨 <b id="invStone">0</b></span>
      <span class="invItem">🗡️ <b id="invSword">0</b></span>
      <span class="invItem">⛏️ <b id="invPickaxe">0</b></span>
      <span class="invItem">🪓 <b id="invAxe">0</b></span>
    </div>
    <button id="craftToggle">Üretim</button>
  </div>

  <div id="craftPanel" class="hidden">
    <button class="craftBtn" data-item="sword">🗡️ Kılıç<br><small>2 odun · 2 taş</small></button>
    <button class="craftBtn" data-item="pickaxe">⛏️ Kazma<br><small>3 odun · 1 taş</small></button>
    <button class="craftBtn" data-item="axe">🪓 Balta<br><small>1 odun · 3 taş</small></button>
  </div>

  <canvas id="c"></canvas>

  <button id="chatToggle" class="hudChatBtn">💬</button>
  <div id="chatPanel" class="hidden">
    <div id="chatLog"></div>
    <div id="chatInputRow">
      <input type="text" id="chatInput" placeholder="Mesaj yaz..." maxlength="140">
      <button id="chatSendBtn">Gönder</button>
    </div>
  </div>

  <div id="fsPrompt" class="hidden">Tam ekran için dokun</div>

  <div id="touchControls" class="hidden">
    <div id="stick"><div id="stickKnob"></div></div>
    <button id="interactBtn">TOPLA / VUR</button>
  </div>

  <div id="toast" class="hidden"></div>

  <div id="overScreen" class="overlay hidden">
    <p class="big">Düştün</p>
    <p class="hint">Envanterin korunuyor, tekrar canlanıyorsun</p>
    <button id="respawnBtn">Devam et</button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
// ================================================================
// main2d.js — Survival Evolution (2D istemci)
// Bu dosya TARAYICIDA çalışır (server.js gibi Node.js'te değil).
// Bu yüzden require() yok — bunun yerine kütüphaneler index.html'de
// Script etiketiyle yükleniyor ve global değişken olarak geliyor:
//
//   index.html'de socket.io kütüphanesi ayrı bir kaynaktan yükleniyor,
//     -> global io() fonksiyonunu verir (server.js'deki socket.io
//        sunucusuna bağlanmak için). Aşağıdaki ilk satırda kullanılıyor.
//
// Kullanılan tarayıcı API'leri (kurulum gerektirmez, JS'e gömülü):
//   - Canvas 2D (piksel sanatı çizimi, karakter/ağaç/kaya sprite'ları)
//   - localStorage (giriş token'ını hatırlamak için)
//   - screen.orientation.lock (mobilde yatay ekran kilidi)
//   - requestAnimationFrame (oyun döngüsü)
//
// Sunucu tarafındaki (server.js) socket.io event'lerine burada
// bire bir karşılık veriliyor: register, verifyEmail, login,
// loginWithToken, forgotPassword, verifyResetCode, resetPassword,
// playerMovement, collect, craft, attack.
// ================================================================

(function () {
  const socket = io();
  const isTouch = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;

  // ─────────────── Auth akışı (öncekiyle aynı) ───────────────
  const authScreen = document.getElementById('authScreen');
  const gameScreen = document.getElementById('gameScreen');
  const panels = {
    login: document.getElementById('loginPanel'), register: document.getElementById('registerPanel'),
    verify: document.getElementById('verifyPanel'), forgot: document.getElementById('forgotPanel'),
    resetCode: document.getElementById('resetCodePanel'), resetPass: document.getElementById('resetPassPanel')
  };
  function showPanel(name) { Object.keys(panels).forEach(function (k) { panels[k].classList.add('hidden'); }); panels[name].classList.remove('hidden'); }
  function setMsg(id, text) { document.getElementById(id).textContent = text || ''; }

  let pendingUsername = null, pendingResetEmail = null;

  document.getElementById('toRegister').onclick = function () { showPanel('register'); };
  document.getElementById('toLoginFromReg').onclick = function () { showPanel('login'); };
  document.getElementById('toForgot').onclick = function () { showPanel('forgot'); };
  document.getElementById('toLoginFromForgot').onclick = function () { showPanel('login'); };

  document.getElementById('loginBtn').onclick = function () {
    let username = document.getElementById('loginUser').value.trim();
    let password = document.getElementById('loginPass').value;
    if (!username || !password) { setMsg('loginMsg', 'Tüm alanları doldur.'); return; }
    socket.emit('login', { username: username, password: password });
  };
  document.getElementById('registerBtn').onclick = function () {
    let username = document.getElementById('regUser').value.trim();
    let email = document.getElementById('regEmail').value.trim();
    let password = document.getElementById('regPass').value;
    setMsg('registerMsg', '');
    socket.emit('register', { username: username, email: email, password: password });
  };
  document.getElementById('verifyBtn').onclick = function () {
    socket.emit('verifyEmail', { username: pendingUsername, code: document.getElementById('verifyCode').value.trim() });
  };
  document.getElementById('resendBtn').onclick = function () {
    socket.emit('resendVerifyCode', { username: pendingUsername });
    setMsg('verifyMsg', 'Yeni kod gönderildi.');
  };
  document.getElementById('forgotBtn').onclick = function () {
    pendingResetEmail = document.getElementById('forgotEmail').value.trim();
    socket.emit('forgotPassword', { email: pendingResetEmail });
  };
  document.getElementById('resetCodeBtn').onclick = function () {
    socket.emit('verifyResetCode', { email: pendingResetEmail, code: document.getElementById('resetCode').value.trim() });
  };
  document.getElementById('resetPassBtn').onclick = function () {
    socket.emit('resetPassword', { email: pendingResetEmail, newPassword: document.getElementById('newPass').value });
  };

  socket.on('loginError', function (msg) {
    if (!msg) return;
    ['loginMsg', 'registerMsg', 'verifyMsg', 'forgotMsg'].forEach(function (id) { setMsg(id, ''); });
    if (!panels.login.classList.contains('hidden')) setMsg('loginMsg', msg);
    else if (!panels.register.classList.contains('hidden')) setMsg('registerMsg', msg);
    else if (!panels.verify.classList.contains('hidden')) setMsg('verifyMsg', msg);
    else if (!panels.forgot.classList.contains('hidden')) setMsg('forgotMsg', msg);
  });
  socket.on('registerSuccess', function (data) { pendingUsername = data.username; showPanel('verify'); setMsg('verifyMsg', ''); });
  socket.on('verifySuccess', function () { setMsg('verifyMsg', 'Doğrulandı!'); });
  socket.on('forgotPasswordCodeSent', function () { showPanel('resetCode'); setMsg('resetCodeMsg', ''); });
  socket.on('resetCodeError', function (msg) { setMsg('resetCodeMsg', msg); });
  socket.on('resetCodeVerified', function () { showPanel('resetPass'); setMsg('resetPassMsg', ''); });
  socket.on('resetPasswordError', function (msg) { setMsg('resetPassMsg', msg); });
  socket.on('resetPasswordSuccess', function () { setMsg('resetPassMsg', 'Şifren değişti.'); setTimeout(function () { showPanel('login'); }, 1200); });

  let myUsername = null;
  function tryFullscreen() {
    const el = document.documentElement;
    const req = el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen;
    if (req) { try { req.call(el).catch(function () {}); } catch (e) {} }
  }

  socket.on('loginSuccess', function (data) {
    myUsername = data.username;
    localStorage.setItem('survivalToken', data.token);
    authScreen.classList.add('hidden');
    gameScreen.classList.remove('hidden');
    document.getElementById('touchControls').classList.toggle('hidden', !isTouch);
    tryFullscreen();
    initGame();
    checkOrientation();
    if (!document.fullscreenElement) document.getElementById('fsPrompt').classList.remove('hidden');
  });
  let savedToken = localStorage.getItem('survivalToken');
  if (savedToken) socket.emit('loginWithToken', savedToken);

  let rotateOverlay = document.getElementById('rotateOverlay');
  function checkOrientation() {
    let inGame = !gameScreen.classList.contains('hidden');
    rotateOverlay.classList.toggle('hidden', !(isTouch && inGame && window.innerHeight > window.innerWidth));
  }
  window.addEventListener('resize', checkOrientation);
  window.addEventListener('orientationchange', function () { setTimeout(checkOrientation, 200); });
  if (isTouch && screen.orientation && screen.orientation.lock) {
    document.addEventListener('click', function once() {
      screen.orientation.lock('landscape').catch(function () {});
      document.removeEventListener('click', once);
    }, { once: true });
  }

  let myInventory = {};
  socket.on('updateInventory', function (inv) {
    myInventory = inv;
    document.getElementById('invWood').textContent = inv.wood || 0;
    document.getElementById('invStone').textContent = inv.stone || 0;
    document.getElementById('invSword').textContent = inv.sword || 0;
    document.getElementById('invPickaxe').textContent = inv.pickaxe || 0;
    document.getElementById('invAxe').textContent = inv.axe || 0;

  // ═══════════════════ 2D PİKSEL SANATI MOTORU ═══════════════════
  const canvas = document.getElementById('c');

  const ELEMENTS = [

  function makeNinjaSprite(hairColor, clothColor, headbandColor) {
    // 26x34 piksel gridine detaylı chibi ninja çiziyoruz
    let cv = document.createElement('canvas'); cv.width = 26; cv.height = 34;
    let c = cv.getContext('2d');
    function px(x, y, color) { c.fillStyle = color; c.fillRect(x, y, 1, 1); }
    let skin = '#f0b98c';
    let skinShade = shadeHex(skin, -0.18);
    let clothShade = shadeHex(clothColor, -0.28);
    let clothLight = shadeHex(clothColor, 0.22);
    let hairShade = shadeHex(hairColor, -0.3);

    // saç (arka, geniş)
    for (let x = 6; x <= 19; x++) for (let y = 2; y <= 8; y++) {
      if (Math.hypot(x - 12.5, y - 6) < 7.2) px(x, y, hairColor);
    }
    for (let x = 6; x <= 9; x++) for (let y = 6; y <= 8; y++) px(x, y, hairShade);
    // baş / yüz
    for (let x = 8; x <= 17; x++) for (let y = 7; y <= 15; y++) px(x, y, skin);
    for (let x = 8; x <= 9; x++) for (let y = 10; y <= 15; y++) px(x, y, skinShade);
    // bandana + arkaya uçuşan uçlar
    for (let x = 6; x <= 19; x++) px(x, y9(), headbandColor);
    function y9() { return 9; }
    for (let x = 6; x <= 19; x++) px(x, 10, headbandColor);
    px(19, 11, headbandColor); px(20, 12, headbandColor);
    px(4, 12, headbandColor); px(3, 14, headbandColor); px(2, 16, shadeHex(headbandColor, -0.2));
    // bandananın metal plakası (küçük parlaklık)
    for (let x = 11; x <= 14; x++) px(x, 9, '#c9d3da');
    px(12, 9, '#e8eef2');
    // gözler + kaş
    px(10, 12, '#20242c'); px(11, 12, '#20242c');
    px(14, 12, '#20242c'); px(15, 12, '#20242c');
    px(9, 11, hairShade); px(10, 11, hairShade);
    px(14, 11, hairShade); px(15, 11, hairShade);
    // vücut / yelek (V yaka)
    for (let x = 7; x <= 18; x++) for (let y = 16; y <= 27; y++) px(x, y, clothColor);
    for (let x = 7; x <= 8; x++) for (let y = 16; y <= 27; y++) px(x, y, clothShade);
    for (let y = 16; y <= 20; y++) { px(12, y, skin); px(13, y, skin); }
    for (let x = 10; x <= 15; x++) px(x, 27, clothShade); // bel çizgisi
    // kollar
    for (let y = 17; y <= 24; y++) { px(5, y, clothColor); px(6, y, clothShade); px(19, y, skin); px(20, y, skinShade); }
    px(5, 25, skin); px(6, 25, skin); px(19, 25, skin); px(20, 25, skin);
    // kılıç kayışı (sırt, ince çizgi)
    for (let y = 15; y <= 26; y++) px(16, y, clothLight);
    // bacaklar (duruş pozu, koyu pantolon)
    for (let y = 28; y <= 33; y++) { px(9, y, '#242832'); px(10, y, '#242832'); px(15, y, '#242832'); px(16, y, '#242832'); }
    return cv;
  }

  function makeWalkFrame(base, legOffset) {
    let cv = document.createElement('canvas'); cv.width = 26; cv.height = 34;
    let c = cv.getContext('2d');
    c.drawImage(base, 0, 0, 26, 28, 0, 0, 26, 28);
    c.fillStyle = '#242832';
    c.fillRect(9, 28 + legOffset, 2, 6 - legOffset);
    c.fillRect(15, 28 - legOffset, 2, 6 + legOffset);
    return cv;
  }

  function buildCharacterSet(seedColor) {
    let hair = shadeHex(seedColor, -0.45);
    let base = makeNinjaSprite(hair, seedColor, '#20242c');
    return [makeWalkFrame(base, 0), makeWalkFrame(base, 2), makeWalkFrame(base, 0), makeWalkFrame(base, -2)];
  }
  function shadeHex(hex, amt) {
    let num = parseInt(hex.replace('#', ''), 16);
    let r = Math.min(255, Math.max(0, ((num >> 16) & 255) * (1 + amt)));
    let g = Math.min(255, Math.max(0, ((num >> 8) & 255) * (1 + amt)));
    let b = Math.min(255, Math.max(0, (num & 255) * (1 + amt)));
    return 'rgb(' + (r | 0) + ',' + (g | 0) + ',' + (b | 0) + ')';
  }

  const treeSprite = (function () {
    let cv = document.createElement('canvas'); cv.width = 28; cv.height = 34;
    let c = cv.getContext('2d');
    function px(x, y, color) { c.fillStyle = color; c.fillRect(x, y, 1, 1); }
    for (let x = 12; x <= 15; x++) for (let y = 20; y <= 31; y++) px(x, y, x < 14 ? '#5a3f27' : '#6b4a2f');
    // üç katmanlı yaprak kütlesi (derinlik hissi)
    function blob(cx, cy, r, base, hi) {
      for (let x = Math.floor(cx - r); x <= cx + r; x++) for (let y = Math.floor(cy - r); y <= cy + r; y++) {
        let d = Math.hypot(x - cx, y - cy);
        if (d < r) px(x, y, d < r * 0.55 && (x + y) % 3 === 0 ? hi : base);
      }
    }
    blob(9, 13, 7.5, '#356e3c', '#3f9c4f');
    blob(19, 11, 7, '#3a7a43', '#4fae5a');
    blob(14, 8, 6.5, '#4a9955', '#5cc468');
    return cv;
  })();

  const rockSprite = (function () {
    let cv = document.createElement('canvas'); cv.width = 22; cv.height = 18;
    let c = cv.getContext('2d');
    function px(x, y, color) { c.fillStyle = color; c.fillRect(x, y, 1, 1); }
    for (let x = 1; x <= 20; x++) for (let y = 3; y <= 16; y++) {
      if (Math.hypot((x - 10.5) / 1.35, y - 10) < 6.2) {
        let shade = (x < 9) ? '#7d828c' : ((x + y * 2) % 6 === 0 ? '#a7adb8' : '#909670');
        px(x, y, (x < 9) ? '#7d828c' : ((x + y) % 5 === 0 ? '#a7adb8' : '#8f95a0'));
      }
    }
    return cv;
  })();

  const WORLD_SIZE = 1600;
  const TILE = 32;

  const groundPattern = (function () {
    let cv = document.createElement('canvas'); cv.width = cv.height = 64;
    let c = cv.getContext('2d');
    c.fillStyle = '#6fae52'; c.fillRect(0, 0, 64, 64);
    for (let i = 0; i < 40; i++) {
      c.fillStyle = Math.random() < 0.5 ? '#649e49' : '#7ab85c';
      c.fillRect(Math.floor(Math.random() * 64), Math.floor(Math.random() * 64), 2, 2);
    }
    return c.getImageData(0, 0, 64, 64);
  })();
  const groundCanvas = document.createElement('canvas');
  groundCanvas.width = groundCanvas.height = 64;
  groundCanvas.getContext('2d').putImageData(groundPattern, 0, 0);
  let groundTilePattern = null;

  let resourceNodes = [];
  function seedWorld() {
    resourceNodes = [];
    for (let i = 0; i < 26; i++) resourceNodes.push({ type: 'wood', x: Math.random() * WORLD_SIZE - WORLD_SIZE / 2, y: Math.random() * WORLD_SIZE - WORLD_SIZE / 2, alive: true });
    for (let j = 0; j < 20; j++) resourceNodes.push({ type: 'stone', x: Math.random() * WORLD_SIZE - WORLD_SIZE / 2, y: Math.random() * WORLD_SIZE - WORLD_SIZE / 2, alive: true });
  }

  let myPos = { x: 0, y: 0 };
  let myFrame = 0, myFrameT = 0, myDir = 1, myMoving = false;
  let myColor = '#3ad1ff';
  let mySprites = null;
  let others = {}; // id -> {x,y,tx,ty,dir,color,sprites,frame,frameT}
  let effects = []; // jutsu/toz efektleri
  let floatTexts = [];
  let shakeAmt = 0;

  function floatText(x, y, text, color) {
    floatTexts.push({ x: x, y: y, text: text, color: color, life: 0.8 });
  }
  function shake(amt) { shakeAmt = Math.min(14, shakeAmt + amt); }

  let shockwaves = [];
  let flashes = [];

  function jutsuEffect(x, y) {
    let el = ELEMENTS[Math.floor(Math.random() * ELEMENTS.length)];
    flashes.push({ x: x, y: y, life: 0.18, maxLife: 0.18, color: el.glow });
    shockwaves.push({ x: x, y: y, r: 4, life: 0.45, maxLife: 0.45, color: el.base });
    for (let i = 0; i < 22; i++) {
      let ang = Math.random() * Math.PI * 2;
      let speed = 50 + Math.random() * 90;
      effects.push({
        x: x, y: y, vx: Math.cos(ang) * speed, vy: Math.sin(ang) * speed,
        life: 0.4 + Math.random() * 0.45, maxLife: 0.4 + Math.random() * 0.45,
        color: Math.random() < 0.45 ? el.base : el.glow, size: 2.5 + Math.random() * 4
      });
    }
    shake(9);
    return el.name;
  }

  function initGame() {
    myColor = '#' + ('000000' + Math.floor(Math.random() * 0x1000000).toString(16)).slice(-6);
    mySprites = buildCharacterSet(myColor);
    seedWorld();
    resize();
    requestAnimationFrame(loop);
  }

  function resize() {
    canvas.width = canvas.clientWidth;
    canvas.height = canvas.clientHeight;

  window.addEventListener('resize', resize);

  // ─────────────── Diğer oyuncular ───────────────
  socket.on('currentPlayers', function (players) {
    Object.keys(players).forEach(function (id) { if (id !== socket.id) addOther(players[id]); });
  });
  socket.on('newPlayer', function (p) { if (p.id !== socket.id) addOther(p); });
  socket.on('playerMoved', function (p) {
    let o = others[p.id];
    if (!o) { addOther(p); return; }
    o.tx = p.x; o.ty = p.z;
    o.dir = (p.rotationY > Math.PI / 2 || p.rotationY < -Math.PI / 2) ? -1 : 1;
  });
  socket.on('playerDisconnected', function (id) { delete others[id]; });

  // ─────────────── Sohbet ───────────────
  const chatLog = document.getElementById('chatLog');
  const chatInput = document.getElementById('chatInput');
  const chatBubbles = {}; // socket id -> {text, until}

  function appendChatLine(username, text) {
    const line = document.createElement('div');
    line.className = 'chatLine';

    nameSpan.className = 'chatName';

  function sendChat() {

  function tryFullscreenPrompt() {

  function addOther(p) {
    let hexColor = '#' + (p.color || 0xd8663c).toString(16).padStart(6, '0');
    others[p.id] = { x: p.x || 0, y: p.z || 0, tx: p.x || 0, ty: p.z || 0, dir: 1, sprites: buildCharacterSet(hexColor), frame: 0, frameT: 0, moving: false, username: p.username || '?', inventory: p.inventory || {} };
  }

  // ─────────────── Girdi ───────────────
  const keys = {};
  document.addEventListener('keydown', function (e) { keys[e.key.toLowerCase()] = true; });
  document.addEventListener('keyup', function (e) { keys[e.key.toLowerCase()] = false; });

  const move = { x: 0, y: 0 };
  const stick = document.getElementById('stick'), stickKnob = document.getElementById('stickKnob');
  let stickTouchId = null, stickCenter = { x: 0, y: 0 };
  stick.addEventListener('touchstart', function (e) {
    stickTouchId = e.changedTouches[0].identifier;
    let rect = stick.getBoundingClientRect();
    stickCenter = { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };
    e.preventDefault();
  });
  stick.addEventListener('touchmove', function (e) {
    for (let i = 0; i < e.changedTouches.length; i++) {
      let t = e.changedTouches[i];
      if (t.identifier !== stickTouchId) continue;
      let dx = t.clientX - stickCenter.x, dy = t.clientY - stickCenter.y;
      let dist = Math.min(40, Math.hypot(dx, dy));
      let ang = Math.atan2(dy, dx);
      stickKnob.style.left = (30 + Math.cos(ang) * dist) + 'px';
      stickKnob.style.top = (30 + Math.sin(ang) * dist) + 'px';
      move.x = Math.cos(ang) * (dist / 40); move.y = Math.sin(ang) * (dist / 40);
    }
    e.preventDefault();
  });
  function resetStick() { stickTouchId = null; move.x = 0; move.y = 0; stickKnob.style.left = '30px'; stickKnob.style.top = '30px'; }
  stick.addEventListener('touchend', resetStick);
  stick.addEventListener('touchcancel', resetStick);

  function nearestInteractable() {
    let best = null, bestDist = 46;
    resourceNodes.forEach(function (n) {
      if (!n.alive) return;
      let d = Math.hypot(myPos.x - n.x, myPos.y - n.y);
      if (d < bestDist) { bestDist = d; best = { kind: 'resource', node: n }; }
    });
    Object.keys(others).forEach(function (id) {
      let o = others[id];
      let d = Math.hypot(myPos.x - o.x, myPos.y - o.y);
      if (d < 56) { bestDist = d; best = { kind: 'player', id: id }; }
    });
    return best;
  }
  function doInteract() {
    let target = nearestInteractable();
    if (!target) return;
    if (target.kind === 'resource') {
      let n = target.node;
      socket.emit('collect', n.type);
      floatText(n.x, n.y, n.type === 'wood' ? '+odun' : '+taş', '#bdf0ff');
      n.alive = false;
      setTimeout(function () { n.alive = true; }, 12000);
    } else {
      socket.emit('attack', target.id);
      let elName = jutsuEffect(others[target.id].x, others[target.id].y);
      floatText(others[target.id].x, others[target.id].y - 10, elName + ' jutsu!', '#ffe08a');
    }
  }
  document.getElementById('interactBtn').addEventListener('touchstart', function (e) { doInteract(); e.preventDefault(); });
  window.addEventListener('keydown', function (e) { if (e.key.toLowerCase() === 'e') doInteract(); });
  canvas.addEventListener('dblclick', doInteract);

  // ─────────────── Döngü ───────────────
  let lastT = performance.now(), lastSent = 0;
  function loop(now) {
    requestAnimationFrame(loop);
    let dt = Math.min((now - lastT) / 1000, 0.05);
    lastT = now;

    let mx = 0, my = 0;
    if (isTouch) { mx = move.x; my = move.y; }
    else {
      if (keys['w']) my -= 1; if (keys['s']) my += 1;
      if (keys['a']) mx -= 1; if (keys['d']) mx += 1;
    }
    let len = Math.hypot(mx, my);
    myMoving = len > 0.05;
    if (myMoving) {
      mx /= len; my /= len;
      myDir = mx < -0.1 ? -1 : (mx > 0.1 ? 1 : myDir);
      let speed = 130 * dt;
      myPos.x = Math.max(-WORLD_SIZE / 2, Math.min(WORLD_SIZE / 2, myPos.x + mx * speed));
      myPos.y = Math.max(-WORLD_SIZE / 2, Math.min(WORLD_SIZE / 2, myPos.y + my * speed));
      myFrameT += dt;
      if (myFrameT > 0.14) { myFrameT = 0; myFrame = (myFrame + 1) % 4; }
    } else { myFrame = 0; }

    lastSent += dt;
    if (lastSent > 0.08) {
      lastSent = 0;
      socket.emit('playerMovement', { x: myPos.x, y: 0, z: myPos.y, rotationY: myDir > 0 ? 0 : Math.PI });
    }

    Object.keys(others).forEach(function (id) {
      let o = others[id];
      let d = Math.hypot(o.tx - o.x, o.ty - o.y);
      o.moving = d > 1;
      o.x += (o.tx - o.x) * 0.2; o.y += (o.ty - o.y) * 0.2;
      if (o.moving) { o.frameT += dt; if (o.frameT > 0.14) { o.frameT = 0; o.frame = (o.frame + 1) % 4; } } else { o.frame = 0; }
    });

    for (let i = effects.length - 1; i >= 0; i--) {
      let e = effects[i];
      e.x += e.vx * dt; e.y += e.vy * dt; e.vx *= 0.9; e.vy *= 0.9; e.life -= dt;
      if (e.life <= 0) effects.splice(i, 1);
    }
    for (let i = shockwaves.length - 1; i >= 0; i--) {
      let s = shockwaves[i];
      s.r += dt * 260; s.life -= dt;
      if (s.life <= 0) shockwaves.splice(i, 1);
    }
    for (let i = flashes.length - 1; i >= 0; i--) {
      flashes[i].life -= dt;
      if (flashes[i].life <= 0) flashes.splice(i, 1);
    }
    for (let j = floatTexts.length - 1; j >= 0; j--) {
      floatTexts[j].y -= dt * 20; floatTexts[j].life -= dt;
      if (floatTexts[j].life <= 0) floatTexts.splice(j, 1);
    }
    shakeAmt *= 0.85;

    render();
  }

  function render() {
    let w = canvas.width, h = canvas.height;
    ctx.fillStyle = '#5a9c4a';
    ctx.fillRect(0, 0, w, h);

    let sx = -myPos.x + w / 2 + (Math.random() - 0.5) * shakeAmt;
    let sy = -myPos.y + h / 2 + (Math.random() - 0.5) * shakeAmt;

    if (!groundTilePattern) groundTilePattern = ctx.createPattern(groundCanvas, 'repeat');
    ctx.save();
    ctx.translate(sx % 64, sy % 64);
    ctx.fillStyle = groundTilePattern;
    ctx.fillRect(-64, -64, w + 128, h + 128);
    ctx.restore();

    resourceNodes.forEach(function (n) {
      if (!n.alive) return;
      let x = n.x + sx, y = n.y + sy;
      if (x < -40 || x > w + 40 || y < -40 || y > h + 40) return;
      let sprite = n.type === 'wood' ? treeSprite : rockSprite;
      ctx.drawImage(sprite, x - sprite.width, y - sprite.height, sprite.width * 2, sprite.height * 2);
    });

    function drawChar(x, y, sprites, frame, dir, name, inv) {
      let sp = sprites[frame];
      ctx.fillStyle = 'rgba(6,12,9,0.3)';
      ctx.beginPath();
      ctx.ellipse(x, y + 3, sp.width * 0.9, sp.width * 0.32, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.save();
      ctx.translate(x, y);
      ctx.scale(dir, 1);
      ctx.drawImage(sp, -sp.width, -sp.height * 1.6, sp.width * 2, sp.height * 1.6);
      if (inv && (inv.sword || inv.pickaxe || inv.axe)) {
        let weaponColor = inv.sword ? '#c9d3da' : (inv.pickaxe ? '#8a8f9a' : '#c9793f');
        ctx.strokeStyle = weaponColor;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(sp.width * 0.55, -sp.height * 0.9);
        ctx.lineTo(sp.width * 1.0, -sp.height * 1.5);
        ctx.stroke();
      }
      ctx.restore();
      if (name) {
        ctx.font = '600 11px "Space Grotesk", monospace';
        ctx.textAlign = 'center';
        ctx.fillStyle = 'rgba(6,12,9,0.65)';
        ctx.fillRect(x - ctx.measureText(name).width / 2 - 5, y - sp.height * 1.6 * 2 - 16, ctx.measureText(name).width + 10, 15);
        ctx.fillStyle = '#4ce0c4';
        ctx.fillText(name, x, y - sp.height * 1.6 * 2 - 5);
      }
    }

    Object.keys(others).forEach(function (id) {
      let o = others[id];
      drawChar(o.x + sx, o.y + sy, o.sprites, o.frame, o.dir, o.username, o.inventory);
    });
    if (mySprites) drawChar(myPos.x + sx, myPos.y + sy, mySprites, myFrame, myDir, myUsername, myInventory);

    effects.forEach(function (e) {
      let a = Math.max(0, e.life / e.maxLife);
      ctx.globalAlpha = a * 0.35;
      ctx.fillStyle = e.color;
      ctx.beginPath();
      ctx.arc(e.x + sx, e.y + sy, e.size * 2.2, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = a;
      ctx.fillRect(e.x + sx - e.size / 2, e.y + sy - e.size / 2, e.size, e.size);
      ctx.globalAlpha = 1;
    });

    shockwaves.forEach(function (s) {
      let a = Math.max(0, s.life / s.maxLife);
      ctx.globalAlpha = a * 0.8;
      ctx.strokeStyle = s.color;
      ctx.lineWidth = 3 * a + 0.5;
      ctx.beginPath();
      ctx.arc(s.x + sx, s.y + sy, s.r, 0, Math.PI * 2);
      ctx.stroke();
      ctx.globalAlpha = 1;
    });

    flashes.forEach(function (f) {
      let a = Math.max(0, f.life / f.maxLife);
      ctx.globalAlpha = a;
      ctx.fillStyle = f.color;
      ctx.beginPath();
      ctx.arc(f.x + sx, f.y + sy, 26 * a, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    });

    floatTexts.forEach(function (f) {
      ctx.globalAlpha = Math.max(0, f.life);
      ctx.fillStyle = f.color;
      ctx.font = 'bold 13px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(f.text, f.x + sx, f.y + sy);
      ctx.globalAlpha = 1;
    });

    const now = performance.now();
    Object.keys(chatBubbles).forEach(function (id) {
      const b = chatBubbles[id];
      if (now > b.until) { delete chatBubbles[id]; return; }
      let px, py;
      if (id === socket.id) { px = myPos.x + sx; py = myPos.y + sy; }
      else if (others[id]) { px = others[id].x + sx; py = others[id].y + sy; }
      else return;
      ctx.font = '600 12px "Space Grotesk", sans-serif';
      ctx.textAlign = 'center';
      const tw = ctx.measureText(b.text).width;
      const bx = px, by = py - 62;
      ctx.fillStyle = 'rgba(20,34,25,0.92)';
      ctx.beginPath();
      ctx.roundRect(bx - tw / 2 - 8, by - 12, tw + 16, 22, 8);
      ctx.fill();
      ctx.fillStyle = '#eaf3ec';
      ctx.fillText(b.text, bx, by + 4);
    });
  }
})();

</script>
