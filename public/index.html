<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Mobil/PC Orman</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; }
        #login-screen {
            position: fixed; width: 100%; height: 100%; background: rgba(0,0,0,0.8);
            display: flex; align-items: center; justify-content: center; z-index: 1000;
        }
        .box { background: #2d5e1e; padding: 20px; border-radius: 10px; text-align: center; color: white; }
        input { padding: 10px; width: 200px; border-radius: 5px; border: none; }
        #joystick-container {
            position: absolute; bottom: 50px; left: 50px; width: 120px; height: 120px;
            background: rgba(255,255,255,0.2); border-radius: 50%; display: none; touch-action: none;
        }
        #joystick-knob {
            position: absolute; width: 50px; height: 50px; background: rgba(255,255,255,0.5);
            border-radius: 50%; top: 35px; left: 35px;
        }
        @media (pointer: coarse) { #joystick-container { display: block; } } /* Sadece dokunmatik ekranlarda göster */
    </style>
</head>
<body>

<div id="login-screen">
    <div class="box">
        <h2>ORMANA GİRİŞ</h2>
        <input type="text" id="username" placeholder="Kullanıcı Adı"><br><br>
        <button onclick="start()" style="padding: 10px 20px; cursor:pointer;">BAŞLA</button>
    </div>
</div>

<div id="joystick-container"><div id="joystick-knob"></div></div>

<script src="/socket.io/socket.io.js"></script>
<script type="module">
    import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';
    import { OrbitControls } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/controls/OrbitControls.js';

    let scene, camera, renderer, controls, socket, myPlayer;
    let joystickData = { x: 0, y: 0, active: false };
    const otherPlayers = {};
    const keys = {};

    window.start = () => {
        const user = document.getElementById('username').value;
        if(user.length < 2) return alert("İsim yazın");
        document.getElementById('login-screen').style.display = 'none';
        init(user);
    };

    function init(username) {
        socket = io();
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 10, 100);

        camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 15, 20);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        const ground = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), new THREE.MeshStandardMaterial({color: 0x228B22}));
        ground.rotation.x = -Math.PI/2; ground.receiveShadow = true; scene.add(ground);

        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(10, 20, 10); light.castShadow = true; scene.add(light);
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));

        // Dekorasyon (Ağaçlar)
        for(let i=0; i<50; i++) {
            const tree = new THREE.Group();
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 1), new THREE.MeshStandardMaterial({color: 0x4b3621}));
            const leaves = new THREE.Mesh(new THREE.ConeGeometry(1, 2, 8), new THREE.MeshStandardMaterial({color: 0x0b5345}));
            leaves.position.y = 1.5; tree.add(trunk); tree.add(leaves);
            tree.position.set(Math.random()*80-40, 0.5, Math.random()*80-40);
            scene.add(tree);
        }

        socket.emit('login', username);

        socket.on('currentPlayers', (players) => {
            Object.keys(players).forEach(id => {
                const p = createPlayer(players[id]);
                if(id === socket.id) myPlayer = p;
                else otherPlayers[id] = p;
            });
        });

        socket.on('newPlayer', (data) => otherPlayers[data.id] = createPlayer(data));
        socket.on('playerMoved', (data) => {
            if(otherPlayers[data.id]) otherPlayers[data.id].position.set(data.x, 1, data.z);
        });
        socket.on('playerDisconnected', (id) => {
            scene.remove(otherPlayers[id]); delete otherPlayers[id];
        });

        setupJoystick();
        animate();
    }

    function createPlayer(data) {
        const p = new THREE.Mesh(new THREE.CapsuleGeometry(0.4, 0.8, 4, 8), new THREE.MeshStandardMaterial({color: data.color}));
        p.position.set(data.x, 1, data.z); p.castShadow = true; scene.add(p);
        return p;
    }

    function setupJoystick() {
        const container = document.getElementById('joystick-container');
        const knob = document.getElementById('joystick-knob');
        const startX = 110, startY = window.innerHeight - 110;

        const handleMove = (e) => {
            if(!joystickData.active) return;
            const touch = e.touches ? e.touches[0] : e;
            const dx = touch.clientX - (container.offsetLeft + 60);
            const dy = touch.clientY - (container.offsetTop + 60);
            const dist = Math.min(Math.sqrt(dx*dx + dy*dy), 50);
            const angle = Math.atan2(dy, dx);
            
            knob.style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`;
            joystickData.x = (Math.cos(angle) * dist) / 50;
            joystickData.y = (Math.sin(angle) * dist) / 50;
        };

        container.addEventListener('touchstart', () => joystickData.active = true);
        window.addEventListener('touchend', () => {
            joystickData.active = false;
            knob.style.transform = `translate(0,0)`;
            joystickData.x = 0; joystickData.y = 0;
        });
        window.addEventListener('touchmove', handleMove);
    }

    window.onkeydown = (e) => keys[e.code] = true;
    window.onkeyup = (e) => keys[e.code] = false;

    function animate() {
        requestAnimationFrame(animate);
        if(myPlayer) {
            const speed = 0.15;
            let mx = 0, mz = 0;

            if(keys['KeyW']) mz -= speed;
            if(keys['KeyS']) mz += speed;
            if(keys['KeyA']) mx -= speed;
            if(keys['KeyD']) mx += speed;
            
            // Joystick Kontrolü
            mx += joystickData.x * speed;
            mz += joystickData.y * speed;

            if(mx !== 0 || mz !== 0) {
                myPlayer.position.x += mx;
                myPlayer.position.z += mz;
                socket.emit('playerMovement', {x: myPlayer.position.x, z: myPlayer.position.z});
                controls.target.copy(myPlayer.position);
            }
        }
        controls.update();
        renderer.render(scene, camera);
    }
</script>
</body>
</html>
