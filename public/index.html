<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>⚔️ Survival Evolution RPG</title>
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root {
            --gold: #c9a84c;
            --gold-light: #f0d080;
            --gold-dark: #7a5c1e;
            --dark: #0a0806;
            --dark2: #12100d;
            --dark3: #1c1710;
            --red: #c0392b;
            --green: #27ae60;
            --ember: #e67e22;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--dark);
            font-family: 'Crimson Text', serif;
            overflow: hidden;
            touch-action: none;
            cursor: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='20' height='20'><text y='16' font-size='16'>⚔️</text></svg>") 10 10, auto;
        }

        #particles-canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

        /* ═══════════════════ AUTH SCREEN ═══════════════════ */
        #auth-screen {
            position: fixed; inset: 0; z-index: 2000;
            display: flex; align-items: center; justify-content: center;
            background: radial-gradient(ellipse at 30% 40%, #2a1a05 0%, #0a0806 60%);
            overflow: hidden;
        }

        .bg-rune {
            position: absolute; font-size: 120px; opacity: 0.03;
            animation: runeFloat 8s ease-in-out infinite;
            pointer-events: none; color: var(--gold); user-select: none;
        }
        @keyframes runeFloat { 0%,100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-20px) rotate(5deg); } }

        .auth-container { position: relative; z-index: 10; width: 420px; max-width: 95vw; }

        .auth-title-wrap { text-align: center; margin-bottom: 8px; }
        .auth-title {
            font-family: 'Cinzel Decorative', serif;
            font-size: clamp(20px, 5vw, 32px);
            color: var(--gold-light);
            text-shadow: 0 0 30px #c9a84c88, 0 0 60px #c9a84c44;
            letter-spacing: 4px;
            animation: titleGlow 2s ease-in-out infinite alternate;
        }
        @keyframes titleGlow {
            from { text-shadow: 0 0 20px #c9a84c88; }
            to { text-shadow: 0 0 40px #f0d08099, 0 2px 4px #000; }
        }
        .auth-subtitle {
            font-family: 'Cinzel', serif;
            color: #8a6a2a; font-size: 11px; letter-spacing: 8px;
            text-transform: uppercase; margin-top: 4px;
        }

        .panel-frame {
            background: linear-gradient(160deg, #1c1508 0%, #0e0b05 60%, #1a1206 100%);
            border: 1px solid #3a2a10;
            border-radius: 4px;
            padding: 32px 28px;
            position: relative;
            box-shadow: 0 0 60px #00000099, inset 0 1px 0 #3a2a10, inset 0 -1px 0 #1a0f05;
        }
        .panel-frame::before {
            content: ''; position: absolute; inset: 6px;
            border: 1px solid #2a1e08; border-radius: 2px; pointer-events: none;
        }

        .corner { position: absolute; width: 20px; height: 20px; color: var(--gold-dark); font-size: 14px; }
        .corner.tl { top: 4px; left: 4px; }
        .corner.tr { top: 4px; right: 4px; transform: scaleX(-1); }
        .corner.bl { bottom: 4px; left: 4px; transform: scaleY(-1); }
        .corner.br { bottom: 4px; right: 4px; transform: scale(-1); }

        .auth-tabs { display: flex; margin-bottom: 24px; border-bottom: 1px solid #2a1e08; }
        .auth-tab {
            flex: 1; padding: 10px; text-align: center;
            font-family: 'Cinzel', serif; font-size: 12px; letter-spacing: 2px;
            color: #5a4820; cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.3s; text-transform: uppercase;
        }
        .auth-tab.active { color: var(--gold-light); border-bottom-color: var(--gold); }
        .auth-tab:hover { color: var(--gold); }

        .form-panel { display: none; }
        .form-panel.active { display: block; }

        .field-wrap { margin-bottom: 14px; position: relative; }
        .field-label {
            display: block; font-family: 'Cinzel', serif;
            font-size: 10px; letter-spacing: 3px;
            color: var(--gold-dark); margin-bottom: 6px; text-transform: uppercase;
        }
        .field-input {
            width: 100%; padding: 12px 16px;
            background: rgba(0,0,0,0.5);
            border: 1px solid #2a1e08; border-radius: 2px;
            color: #e8d8a0;
            font-family: 'Crimson Text', serif; font-size: 15px;
            outline: none; transition: all 0.3s;
            box-shadow: inset 0 2px 8px #00000066;
        }
        .field-input:focus { border-color: var(--gold-dark); box-shadow: inset 0 2px 8px #00000066, 0 0 12px #c9a84c22; }
        .field-input::placeholder { color: #3a2a10; }
        .field-input.error { border-color: #c0392b88; box-shadow: 0 0 8px #c0392b44; }
        .field-input.success { border-color: #27ae6088; }

        .captcha-box {
            background: #0a0806; border: 1px solid #2a1e08; border-radius: 2px;
            padding: 14px 16px; display: flex; align-items: center; gap: 12px; margin-bottom: 14px;
        }
        .captcha-img {
            background: linear-gradient(135deg, #1a1206, #0e0b05);
            border: 1px solid #3a2a10; border-radius: 2px; padding: 8px 16px;
            font-family: 'Cinzel Decorative', serif; font-size: 18px; letter-spacing: 6px;
            color: var(--gold-light); text-shadow: 2px 2px 4px #000;
            user-select: none; position: relative; overflow: hidden;
            min-width: 120px; text-align: center;
        }
        .captcha-img::after {
            content: ''; position: absolute; inset: 0;
            background: repeating-linear-gradient(45deg, transparent, transparent 2px, rgba(255,255,255,0.02) 2px, rgba(255,255,255,0.02) 4px);
        }
        .captcha-line { position: absolute; width: 100%; height: 1px; background: #c9a84c44; transform: rotate(-8deg); top: 50%; }
        .captcha-refresh {
            background: none; border: 1px solid #2a1e08;
            color: var(--gold-dark); cursor: pointer;
            padding: 6px 10px; border-radius: 2px; font-size: 16px; transition: all 0.2s;
        }
        .captcha-refresh:hover { border-color: var(--gold-dark); color: var(--gold); }

        .msg-box {
            padding: 10px 14px; border-radius: 2px; font-size: 13px; margin-bottom: 14px;
            display: none; align-items: center; gap: 8px;
            font-family: 'Cinzel', serif; letter-spacing: 1px;
        }
        .msg-box.error { background: #c0392b22; border: 1px solid #c0392b88; color: #e74c3c; display: flex; }
        .msg-box.success { background: #27ae6022; border: 1px solid #27ae6088; color: #2ecc71; display: flex; }

        .btn-enter {
            width: 100%; padding: 14px;
            background: linear-gradient(180deg, #3a2a0a 0%, #1a1005 50%, #2a1e08 100%);
            border: 1px solid var(--gold-dark);
            color: var(--gold-light);
            font-family: 'Cinzel', serif; font-size: 14px; letter-spacing: 4px;
            text-transform: uppercase; cursor: pointer; border-radius: 2px;
            transition: all 0.3s; position: relative; overflow: hidden;
            box-shadow: 0 4px 20px #00000088;
        }
        .btn-enter::before {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(180deg, transparent 0%, rgba(201,168,76,0.1) 100%);
            opacity: 0; transition: opacity 0.3s;
        }
        .btn-enter:hover::before { opacity: 1; }
        .btn-enter:hover { border-color: var(--gold); color: #fff; box-shadow: 0 4px 30px #c9a84c44; }
        .btn-enter:active { transform: translateY(1px); }

        /* ═══════════════════ LOADING ═══════════════════ */
        #loading-overlay {
            position: fixed; inset: 0; z-index: 3000;
            background: #0a0806; display: none;
            flex-direction: column; align-items: center; justify-content: center;
        }
        .loading-title {
            font-family: 'Cinzel Decorative', serif; font-size: 24px;
            color: var(--gold-light); margin-bottom: 30px; text-shadow: 0 0 30px var(--gold);
        }
        .loading-bar-wrap {
            width: 300px; height: 4px; background: #1a1206;
            border: 1px solid #3a2a10; border-radius: 2px; overflow: hidden;
        }
        .loading-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--gold-dark), var(--gold-light));
            width: 0%; transition: width 0.3s; box-shadow: 0 0 8px var(--gold);
        }
        .loading-text { font-family: 'Cinzel', serif; color: #5a4820; font-size: 11px; letter-spacing: 4px; margin-top: 12px; }

        /* ═══════════════════ GAME CANVAS ═══════════════════ */
        #game-canvas {
            position: fixed; inset: 0; z-index: 1;
            display: none;
        }

        /* ═══════════════════ GAME UI ═══════════════════ */
        #game-ui { display: none; }

        #ui-overlay {
            position: fixed; top: 0; left: 0; right: 0;
            z-index: 1000; pointer-events: none; padding: 16px;
            background: linear-gradient(180deg, rgba(0,0,0,0.7) 0%, transparent 100%);
        }
        .player-hud { display: flex; align-items: center; gap: 12px; }
        .avatar-icon {
            width: 44px; height: 44px;
            background: linear-gradient(135deg, #1c1508, #2a1e08);
            border: 2px solid var(--gold-dark); border-radius: 4px;
            display: flex; align-items: center; justify-content: center; font-size: 22px;
        }
        .player-info { flex: 1; }
        #player-name-display { font-family: 'Cinzel', serif; color: var(--gold-light); font-size: 13px; letter-spacing: 2px; }
        .hp-bar-wrap { display: flex; align-items: center; gap: 6px; margin-top: 4px; }
        .hp-icon { font-size: 12px; }
        #hp-bar-ui { width: 150px; height: 8px; background: rgba(0,0,0,0.6); border: 1px solid #3a1010; border-radius: 2px; overflow: hidden; }
        #hp-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #c0392b, #e74c3c); transition: 0.3s; box-shadow: 0 0 6px #e74c3c88; }
        .hp-text { font-family: 'Cinzel', serif; font-size: 10px; color: #c0392b; }
        .inv-bar { display: flex; gap: 8px; margin-top: 8px; }
        .inv-item {
            background: rgba(0,0,0,0.6); border: 1px solid #2a1e08; border-radius: 3px;
            padding: 4px 10px; font-family: 'Cinzel', serif; font-size: 11px; color: #c9a84c; letter-spacing: 1px;
        }

        /* ═══════════════════ CRAFT ═══════════════════ */
        #craft-toggle {
            position: fixed; top: 80px; right: 16px;
            width: 48px; height: 48px;
            background: linear-gradient(135deg, #1c1508, #0e0b05);
            border: 2px solid var(--gold-dark); border-radius: 6px;
            color: var(--gold); font-size: 22px;
            display: none; align-items: center; justify-content: center;
            cursor: pointer; z-index: 1600;
            box-shadow: 0 4px 12px #00000088; transition: all 0.2s;
        }
        #craft-toggle:hover { border-color: var(--gold); box-shadow: 0 0 16px var(--gold-dark); }

        #craft-panel {
            position: fixed; top: 60px; right: -280px; width: 260px;
            background: linear-gradient(160deg, #1c1508, #0e0b05);
            border: 1px solid #3a2a10; border-right: none; border-radius: 8px 0 0 8px;
            padding: 20px 16px;
            transition: right 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 1500; color: white;
        }
        #craft-panel.open { right: 0; }
        .craft-title {
            font-family: 'Cinzel', serif; color: var(--gold-light); font-size: 13px;
            letter-spacing: 4px; text-transform: uppercase; margin-bottom: 16px;
            padding-bottom: 10px; border-bottom: 1px solid #2a1e08;
        }
        .craft-option {
            background: rgba(0,0,0,0.4); border: 1px solid #2a1e08; border-radius: 4px;
            padding: 12px 14px; margin-bottom: 8px; cursor: pointer; transition: all 0.2s;
            display: flex; align-items: center; gap: 10px;
        }
        .craft-option:hover { border-color: var(--gold-dark); background: rgba(201,168,76,0.1); }
        .craft-option .icon { font-size: 22px; }
        .craft-option .info { flex: 1; }
        .craft-option .name { font-family: 'Cinzel', serif; font-size: 12px; color: var(--gold-light); }
        .craft-option .cost { font-size: 11px; color: #5a4820; margin-top: 2px; }

        /* ═══════════════════ MOBILE CONTROLS ═══════════════════ */
        #mobile-controls { position: fixed; inset: 0; pointer-events: none; z-index: 900; display: none; }

        #joystick-container {
            position: absolute; bottom: 28px; left: 28px;
            width: 120px; height: 120px;
            background: radial-gradient(circle, rgba(201,168,76,0.1) 0%, rgba(0,0,0,0.3) 100%);
            border: 2px solid rgba(201,168,76,0.3); border-radius: 50%;
            pointer-events: auto; box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        #joystick-inner { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 40px; height: 40px; border: 1px solid rgba(201,168,76,0.4); border-radius: 50%; }
        #joystick-knob {
            position: absolute; width: 44px; height: 44px;
            background: radial-gradient(circle, rgba(201,168,76,0.6) 0%, rgba(100,70,20,0.8) 100%);
            border: 2px solid rgba(201,168,76,0.5); border-radius: 50%;
            top: 38px; left: 38px; pointer-events: none;
            box-shadow: 0 2px 8px #00000088; transition: transform 0.05s;
        }

        #jump-btn {
            position: absolute; bottom: 28px; right: 140px;
            width: 64px; height: 64px;
            background: rgba(0,0,0,0.6); border: 2px solid rgba(201,168,76,0.4); border-radius: 50%;
            color: var(--gold); font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 1px;
            pointer-events: auto; display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 2px;
        }
        #jump-btn .j-icon { font-size: 20px; }

        #attack-btn {
            position: absolute; bottom: 28px; right: 28px;
            width: 100px; height: 100px;
            background: radial-gradient(circle, rgba(192,57,43,0.5) 0%, rgba(100,20,10,0.7) 100%);
            border: 3px solid rgba(192,57,43,0.6); border-radius: 50%;
            font-size: 32px; pointer-events: auto;
            box-shadow: 0 0 20px rgba(192,57,43,0.3); transition: all 0.1s;
            display: flex; align-items: center; justify-content: center;
        }
        #attack-btn:active { transform: scale(0.92); box-shadow: 0 0 30px rgba(192,57,43,0.6); }

        /* ═══════════════════ MINIMAP ═══════════════════ */
        #minimap {
            position: fixed; top: 16px; right: 16px;
            width: 100px; height: 100px;
            background: rgba(0,0,0,0.7); border: 1px solid #3a2a10;
            border-radius: 4px; overflow: hidden; z-index: 1000; display: none;
        }
        #minimap-canvas { width: 100%; height: 100%; }

        /* ═══════════════════ FX ═══════════════════ */
        #damage-flash { position: fixed; inset: 0; z-index: 999; background: rgba(192,57,43,0); pointer-events: none; transition: background 0.1s; }
        #damage-flash.flash { background: rgba(192,57,43,0.25); }

        #killfeed { position: fixed; top: 130px; right: 16px; z-index: 1000; pointer-events: none; width: 220px; }
        .kill-entry {
            background: rgba(0,0,0,0.7); border-left: 2px solid var(--gold-dark);
            padding: 4px 10px; font-family: 'Cinzel', serif; font-size: 10px;
            color: #c9a84c; letter-spacing: 1px; margin-bottom: 4px;
            animation: killFade 4s forwards;
        }
        @keyframes killFade { 0% { opacity:1; } 80% { opacity:1; } 100% { opacity:0; } }

        #notification {
            position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
            z-index: 1500; font-family: 'Cinzel', serif; font-size: 13px; letter-spacing: 3px;
            color: var(--gold-light); background: rgba(0,0,0,0.85); border: 1px solid var(--gold-dark);
            padding: 10px 24px; border-radius: 4px; opacity: 0; transition: opacity 0.3s; pointer-events: none;
        }
        #notification.show { opacity: 1; }

        #online-count {
            position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%);
            font-family: 'Cinzel', serif; font-size: 10px;
            color: rgba(201,168,76,0.4); letter-spacing: 3px;
            z-index: 1000; pointer-events: none; display: none;
        }

        #crosshair {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
            z-index: 1000; pointer-events: none; color: rgba(255,255,255,0.5);
            font-size: 18px; display: none;
        }

        @media (max-width: 480px) {
            .auth-container { width: 95vw; }
            .panel-frame { padding: 24px 16px; }
            .auth-title { font-size: 18px; }
        }
    </style>
</head>
<body>

<canvas id="particles-canvas"></canvas>
<canvas id="game-canvas"></canvas>

<!-- ══════════════════ LOADING ══════════════════ -->
<div id="loading-overlay">
    <div class="loading-title">⚔️ SURVIVAL EVOLUTION</div>
    <div class="loading-bar-wrap"><div class="loading-bar-fill" id="loading-fill"></div></div>
    <div class="loading-text" id="loading-text">DÜNYA YÜKLENİYOR...</div>
</div>

<!-- ══════════════════ AUTH SCREEN ══════════════════ -->
<div id="auth-screen">
    <div class="bg-rune" style="top:10%; left:5%; animation-delay:0s;">⚔</div>
    <div class="bg-rune" style="top:60%; right:8%; animation-delay:2s; font-size:80px;">🛡</div>
    <div class="bg-rune" style="bottom:15%; left:15%; animation-delay:4s; font-size:60px;">⛏</div>
    <div class="bg-rune" style="top:30%; right:20%; animation-delay:1s; font-size:50px;">🗡</div>

    <div class="auth-container">
        <div class="auth-title-wrap">
            <div class="auth-title">⚔️ SURVIVAL<br>EVOLUTION</div>
            <div class="auth-subtitle">Çok Oyunculu Hayatta Kalma RPG</div>
        </div>
        <br>
        <div class="panel-frame">
            <div class="corner tl">◆</div>
            <div class="corner tr">◆</div>
            <div class="corner bl">◆</div>
            <div class="corner br">◆</div>

            <div class="auth-tabs">
                <div class="auth-tab active" onclick="switchTab('login')">⚔ Giriş Yap</div>
                <div class="auth-tab" onclick="switchTab('register')">📜 Kayıt Ol</div>
            </div>

            <!-- LOGIN -->
            <div class="form-panel active" id="panel-login">
                <div id="msg-login" class="msg-box"></div>
                <div class="field-wrap">
                    <label class="field-label">⚔ Kahraman Adı</label>
                    <input type="text" id="login-user" class="field-input" placeholder="Kullanıcı adınız..." autocomplete="username">
                </div>
                <div class="field-wrap">
                    <label class="field-label">🔒 Şifre</label>
                    <input type="password" id="login-pass" class="field-input" placeholder="Şifreniz..." autocomplete="current-password">
                </div>
                <button class="btn-enter" onclick="doLogin()">⚔ DÜNYAYA GİR ⚔</button>
            </div>

            <!-- REGISTER -->
            <div class="form-panel" id="panel-register">
                <div id="msg-register" class="msg-box"></div>
                <div class="field-wrap">
                    <label class="field-label">⚔ Kahraman Adı</label>
                    <input type="text" id="reg-user" class="field-input" placeholder="Kullanıcı adınız..." autocomplete="username">
                </div>
                <div class="field-wrap">
                    <label class="field-label">🔒 Şifre</label>
                    <input type="password" id="reg-pass" class="field-input" placeholder="Şifreniz..." autocomplete="new-password">
                </div>
                <div class="field-wrap">
                    <label class="field-label">🔒 Şifre Tekrar</label>
                    <input type="password" id="reg-pass2" class="field-input" placeholder="Şifrenizi tekrar girin..." autocomplete="new-password">
                </div>
                <div class="captcha-box">
                    <div class="captcha-img" id="captcha-display">
                        <div class="captcha-line"></div>
                        <span id="captcha-text">A4X9</span>
                    </div>
                    <button class="captcha-refresh" onclick="refreshCaptcha()" title="Yenile">↻</button>
                    <input type="text" id="captcha-input" class="field-input" placeholder="Kodu girin..." style="flex:1">
                </div>
                <button class="btn-enter" onclick="doRegister()">📜 KAHRAMAN OLUŞTUR 📜</button>
            </div>
        </div>
    </div>
</div>

<!-- ══════════════════ GAME UI ══════════════════ -->
<div id="game-ui">
    <div id="ui-overlay">
        <div class="player-hud">
            <div class="avatar-icon">⚔️</div>
            <div class="player-info">
                <div id="player-name-display">KAHRAMAN</div>
                <div class="hp-bar-wrap">
                    <span class="hp-icon">❤️</span>
                    <div id="hp-bar-ui"><div id="hp-fill"></div></div>
                    <span class="hp-text" id="hp-text">100/100</span>
                </div>
                <div class="inv-bar">
                    <div class="inv-item">🪵 <span id="inv-wood">0</span></div>
                    <div class="inv-item">🪨 <span id="inv-stone">0</span></div>
                    <div class="inv-item">⚔️ <span id="inv-sword">0</span></div>
                    <div class="inv-item">⛏️ <span id="inv-pickaxe">0</span></div>
                    <div class="inv-item">🪓 <span id="inv-axe">0</span></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Craft Toggle -->
    <div id="craft-toggle" onclick="toggleCraft()">🔨</div>

    <!-- Craft Panel -->
    <div id="craft-panel">
        <div class="craft-title">⚒ ÜRETIM TEZGAHI</div>
        <div class="craft-option" onclick="doCraft('sword')">
            <span class="icon">⚔️</span>
            <div class="info">
                <div class="name">Kılıç</div>
                <div class="cost">🪵×2 + 🪨×2</div>
            </div>
        </div>
        <div class="craft-option" onclick="doCraft('pickaxe')">

<script>
// ═══════════════════════════════════════════════
//  PARTICLES (Auth Screen)
// ═══════════════════════════════════════════════
(function () {
    const canvas = document.getElementById('particles-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize); resize();

    for (let i = 0; i < 60; i++) {
        particles.push({
            x: Math.random() * window.innerWidth,
            y: Math.random() * window.innerHeight,
            vx: (Math.random() - 0.5) * 0.3,
            vy: -Math.random() * 0.5 - 0.1,
            r: Math.random() * 2 + 0.5,
            a: Math.random(),
            life: Math.random()
        });
    }

    function animParticles() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => {
            p.x += p.vx; p.y += p.vy; p.life += 0.003;
            if (p.y < -10 || p.life > 1) { p.y = canvas.height + 10; p.x = Math.random() * canvas.width; p.life = 0; }
            ctx.save();
            ctx.globalAlpha = Math.sin(p.life * Math.PI) * 0.4;
            ctx.fillStyle = '#c9a84c';
            ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
            ctx.restore();
        });
        requestAnimationFrame(animParticles);
    }
    animParticles();
})();

// ═══════════════════════════════════════════════
//  CAPTCHA
// ═══════════════════════════════════════════════
let currentCaptcha = '';
function generateCaptcha() {
    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
    currentCaptcha = Array.from({ length: 4 }, () => chars[Math.floor(Math.random() * chars.length)]).join('');
    document.getElementById('captcha-text').textContent = currentCaptcha;
}
function refreshCaptcha() { generateCaptcha(); }
generateCaptcha();

// ═══════════════════════════════════════════════
//  AUTH TABS
// ═══════════════════════════════════════════════
function switchTab(tab) {
    document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));
    if (tab === 'login') {
        document.querySelector('.auth-tab:first-child').classList.add('active');
        document.getElementById('panel-login').classList.add('active');
    } else {
        document.querySelector('.auth-tab:last-child').classList.add('active');
        document.getElementById('panel-register').classList.add('active');
    }
}

function showMsg(id, type, text) {
    const el = document.getElementById(id);
    el.className = 'msg-box ' + type;
    el.textContent = (type === 'error' ? '⚠ ' : '✓ ') + text;
    el.style.display = 'flex';
}
function hideMsg(id) { document.getElementById(id).style.display = 'none'; }

// ═══════════════════════════════════════════════
//  SOCKET.IO CONNECTION
// ═══════════════════════════════════════════════
const socket = io();

// ── Login ──
function doLogin() {
    const username = document.getElementById('login-user').value.trim();
    const password = document.getElementById('login-pass').value;
    if (!username || !password) { showMsg('msg-login', 'error', 'Tüm alanları doldurun!'); return; }
    hideMsg('msg-login');
    socket.emit('login', { username, password });
}

// ── Register ──
function doRegister() {
    const username = document.getElementById('reg-user').value.trim();
    const password = document.getElementById('reg-pass').value;
    const password2 = document.getElementById('reg-pass2').value;
    const captchaInput = document.getElementById('captcha-input').value.toUpperCase();

    if (!username || !password) { showMsg('msg-register', 'error', 'Tüm alanları doldurun!'); return; }
    if (password !== password2) { showMsg('msg-register', 'error', 'Şifreler eşleşmiyor!'); return; }
    if (captchaInput !== currentCaptcha) { showMsg('msg-register', 'error', 'Güvenlik kodu hatalı!'); refreshCaptcha(); return; }

    hideMsg('msg-register');
    socket.emit('login', { username, password });
}

// Enter tuşu desteği
document.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
        const activePanel = document.querySelector('.form-panel.active').id;
        if (activePanel === 'panel-login') doLogin();
        else doRegister();
    }
});

// ── Login Success ──
socket.on('loginSuccess', () => {
    startLoadingSequence();
});

// ── Login Error ──
socket.on('loginError', (msg) => {
    const activePanel = document.querySelector('.form-panel.active').id;
    const msgId = activePanel === 'panel-login' ? 'msg-login' : 'msg-register';
    showMsg(msgId, 'error', msg);
});

// ═══════════════════════════════════════════════
//  LOADING SEQUENCE
// ═══════════════════════════════════════════════
function startLoadingSequence() {
    document.getElementById('auth-screen').style.display = 'none';
    const overlay = document.getElementById('loading-overlay');
    overlay.style.display = 'flex';

    const steps = [
        [20, 'HARITA YÜKLENİYOR...'],
        [45, 'KAYNAKLAR OLUŞTURULUYOR...'],
        [70, 'DİĞER KAHRAMANLAR BEKLENIYOR...'],
        [90, 'SON HAZIRLIKLAR...'],
        [100, 'GİRİŞ YAPILIYOR!']
    ];

    let i = 0;
    const fill = document.getElementById('loading-fill');
    const loadText = document.getElementById('loading-text');

    function nextStep() {
        if (i >= steps.length) {
            setTimeout(() => {
                overlay.style.display = 'none';
                enterGame();
            }, 300);
            return;
        }
        const [pct, text] = steps[i++];
        fill.style.width = pct + '%';
        loadText.textContent = text;
        setTimeout(nextStep, 400 + Math.random() * 300);
    }
    nextStep();
}

// ═══════════════════════════════════════════════
//  THREE.JS GAME WORLD
// ═══════════════════════════════════════════════
let scene, camera, renderer, playerMesh;
let otherPlayerMeshes = {};
let resourceObjects = [];
let myPlayer = null;

const keys = {};
const mouse = { dx: 0, dy: 0 };
let yaw = 0, pitch = 0;
let velocityY = 0;
const GRAVITY = -0.015;
const JUMP_FORCE = 0.3;
let onGround = true;
let pointerLocked = false;

const joystick = { active: false, startX: 0, startY: 0, dx: 0, dy: 0 };

function enterGame() {
    const canvas = document.getElementById('game-canvas');
    canvas.style.display = 'block';
    document.getElementById('game-ui').style.display = 'block';
    document.getElementById('craft-toggle').style.display = 'flex';
    document.getElementById('minimap').style.display = 'block';
    document.getElementById('online-count').style.display = 'block';
    document.getElementById('crosshair').style.display = 'block';

    initThree(canvas);
    buildWorld();
    spawnResources();
    setupInput(canvas);
    setupMobileControls();
    gameLoop();
}

function initThree(canvas) {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a0f05);
    scene.fog = new THREE.Fog(0x1a0f05, 30, 120);

    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 200);
    camera.position.set(0, 1.7, 0);

    renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    const ambient = new THREE.AmbientLight(0x2a1a05, 1.2);
    scene.add(ambient);

    const sun = new THREE.DirectionalLight(0xc9a84c, 1.5);
    sun.position.set(30, 60, 20);
    sun.castShadow = true;
    sun.shadow.mapSize.set(1024, 1024);
    sun.shadow.camera.near = 0.1;
    sun.shadow.camera.far = 200;
    sun.shadow.camera.left = -80; sun.shadow.camera.right = 80;
    sun.shadow.camera.top = 80; sun.shadow.camera.bottom = -80;
    scene.add(sun);

    [[5,1,5],[-5,1,-5],[10,1,-8],[-8,1,12]].forEach(([x,y,z]) => {
        const pt = new THREE.PointLight(0xe67e22, 1.5, 12);
        pt.position.set(x, y, z);
        scene.add(pt);
    });
}

function buildWorld() {
    const groundGeo = new THREE.PlaneGeometry(200, 200, 40, 40);
    const groundMat = new THREE.MeshLambertMaterial({ color: 0x1a1005 });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    const grid = new THREE.GridHelper(200, 50, 0x2a1e08, 0x1a1005);
    grid.position.y = 0.01;
    scene.add(grid);

    const wallMat = new THREE.MeshLambertMaterial({ color: 0x3a2a10, transparent: true, opacity: 0.5 });
    [
        [0, 2, 100], [0, 2, -100], [100, 2, 0], [-100, 2, 0]
    ].forEach(([x, y, z]) => {
        const geo = z === 0 ? new THREE.BoxGeometry(1, 4, 200) : new THREE.BoxGeometry(200, 4, 1);
        const wall = new THREE.Mesh(geo, wallMat);
        wall.position.set(x, y, z);
        scene.add(wall);
    });

    for (let i = 0; i < 20; i++) {
        const r = Math.random() * 0.4 + 0.1;
        const geo = new THREE.DodecahedronGeometry(r, 0);
        const mat = new THREE.MeshLambertMaterial({ color: 0x2a2216 });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.set((Math.random() - 0.5) * 180, r, (Math.random() - 0.5) * 180);
        mesh.rotation.set(Math.random(), Math.random(), Math.random());
        scene.add(mesh);
    }
}

function spawnResources() {
    for (let i = 0; i < 15; i++) {
        const x = (Math.random() - 0.5) * 160;
        const z = (Math.random() - 0.5) * 160;
        createTree(x, z, i);
    }
    for (let i = 0; i < 12; i++) {
        const x = (Math.random() - 0.5) * 160;
        const z = (Math.random() - 0.5) * 160;
        createRock(x, z, i + 100);
    }
}

function createTree(x, z, id) {
    const group = new THREE.Group();

    const trunkGeo = new THREE.CylinderGeometry(0.25, 0.35, 2.5, 7);
    const trunkMat = new THREE.MeshLambertMaterial({ color: 0x3a2010 });
    const trunk = new THREE.Mesh(trunkGeo, trunkMat);
    trunk.position.y = 1.25;
    trunk.castShadow = true;
    group.add(trunk);

    const foliageGeo = new THREE.ConeGeometry(1.6, 3, 8);
    const foliageMat = new THREE.MeshLambertMaterial({ color: 0x1a3a10 });
    const foliage = new THREE.Mesh(foliageGeo, foliageMat);
    foliage.position.y = 3.8;
    foliage.castShadow = true;
    group.add(foliage);

    group.position.set(x, 0, z);
    scene.add(group);
    resourceObjects.push({ mesh: group, type: 'wood', id, x, z, radius: 2 });
}

function createRock(x, z, id) {
    const geo = new THREE.DodecahedronGeometry(0.9 + Math.random() * 0.4, 0);
    const mat = new THREE.MeshLambertMaterial({ color: 0x4a4030 });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(x, 0.7, z);
    mesh.rotation.set(Math.random(), Math.random(), Math.random());
    mesh.castShadow = true;
    scene.add(mesh);
    resourceObjects.push({ mesh, type: 'stone', id, x, z, radius: 1.5 });
}

function createPlayerMesh(color) {
    const group = new THREE.Group();
    const bodyMat = new THREE.MeshLambertMaterial({ color: color || 0xc9a84c });

    const body = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.9, 0.3), bodyMat);
    body.position.y = 0.8; group.add(body);

    const head = new THREE.Mesh(new THREE.BoxGeometry(0.45, 0.45, 0.45), bodyMat);
    head.position.y = 1.5; group.add(head);

    [-0.15, 0.15].forEach(ox => {
        const leg = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.5, 0.25), bodyMat);
        leg.position.set(ox, 0.25, 0); group.add(leg);
    });

    return group;
}

// ── Socket: Other Players ──
socket.on('currentPlayers', (players) => {
    Object.values(players).forEach(p => {
        if (p.id === socket.id) {
            myPlayer = p;
            document.getElementById('player-name-display').textContent = p.username.toUpperCase();
        } else {
            addOtherPlayer(p);
        }
    });
    updateOnlineCount(Object.keys(players).length);
});

socket.on('newPlayer', (p) => {
    if (p.id !== socket.id) addOtherPlayer(p);
    updateOnlineCount(Object.keys(otherPlayerMeshes).length + 1);
    addKillFeed(`⚔ ${p.username} dünyaya katıldı`);
});

socket.on('playerMoved', (p) => {
    if (p.id === socket.id) return;
    if (otherPlayerMeshes[p.id]) {
        otherPlayerMeshes[p.id].position.set(p.x, p.y || 0, p.z);
        if (p.rotationY !== undefined) otherPlayerMeshes[p.id].rotation.y = p.rotationY;
    }
});

socket.on('playerDisconnected', (id) => {
    if (otherPlayerMeshes[id]) {
        scene.remove(otherPlayerMeshes[id]);
        delete otherPlayerMeshes[id];
    }
    updateOnlineCount(Object.keys(otherPlayerMeshes).length + 1);
});

socket.on('updateInventory', (inv) => {
    document.getElementById('inv-wood').textContent = inv.wood;
    document.getElementById('inv-stone').textContent = inv.stone;
    document.getElementById('inv-sword').textContent = inv.sword;
    document.getElementById('inv-pickaxe').textContent = inv.pickaxe;
    document.getElementById('inv-axe').textContent = inv.axe;
});

socket.on('hpUpdate', (data) => {
    if (data.id === socket.id) {
        updateHP(data.hp);
        const flash = document.getElementById('damage-flash');
        flash.classList.add('flash');
        setTimeout(() => flash.classList.remove('flash'), 200);
    }
});

function addOtherPlayer(p) {
    const mesh = createPlayerMesh(p.color);
    mesh.position.set(p.x || 0, p.y || 0, p.z || 0);
    scene.add(mesh);
    otherPlayerMeshes[p.id] = mesh;
}

function updateHP(hp) {
    const pct = Math.max(0, hp) / 100;
    document.getElementById('hp-fill').style.width = (pct * 100) + '%';
    document.getElementById('hp-text').textContent = `${Math.max(0, hp)}/100`;
}

function updateOnlineCount(n) {
    document.getElementById('online-num').textContent = n;
}

// ═══════════════════════════════════════════════
//  INPUT
// ═══════════════════════════════════════════════
function setupInput(canvas) {
    canvas.addEventListener('click', () => {
        if (!pointerLocked) canvas.requestPointerLock();
    });
    document.addEventListener('pointerlockchange', () => {
        pointerLocked = document.pointerLockElement === canvas;
    });

    document.addEventListener('mousemove', (e) => {
        if (!pointerLocked) return;
        yaw -= e.movementX * 0.002;
        pitch -= e.movementY * 0.002;
        pitch = Math.max(-Math.PI / 3, Math.min(Math.PI / 3, pitch));
    });

    document.addEventListener('keydown', e => { keys[e.code] = true; });
    document.addEventListener('keyup', e => { keys[e.code] = false; });

    document.addEventListener('keydown', e => {
        if (e.code === 'KeyE') tryCollect();
        if (e.code === 'KeyF') doAttackNearest();
        if (e.code === 'Space') tryJump();
    });

    document.addEventListener('mousedown', e => {
        if (e.button === 0 && pointerLocked) doAttackNearest();
        if (e.button === 2 && pointerLocked) tryCollect();
    });
    document.addEventListener('contextmenu', e => e.preventDefault());
}

function tryJump() {
    if (onGround) { velocityY = JUMP_FORCE; onGround = false; }
}

// ═══════════════════════════════════════════════
//  MOBILE CONTROLS
// ═══════════════════════════════════════════════
function setupMobileControls() {
    const isMobile = 'ontouchstart' in window;
    if (!isMobile) return;

    document.getElementById('mobile-controls').style.display = 'block';
    document.getElementById('crosshair').style.display = 'none';

    const jc = document.getElementById('joystick-container');
    const knob = document.getElementById('joystick-knob');
    const maxR = 38;

    jc.addEventListener('touchstart', e => {
        const t = e.touches[0];
        const rect = jc.getBoundingClientRect();
        joystick.startX = rect.left + rect.width / 2;
        joystick.startY = rect.top + rect.height / 2;
        joystick.active = true;
    }, { passive: true });

    jc.addEventListener('touchmove', e => {
        if (!joystick.active) return;
        const t = e.touches[0];
        let dx = t.clientX - joystick.startX;
        let dy = t.clientY - joystick.startY;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist > maxR) { dx *= maxR / dist; dy *= maxR / dist; }
        joystick.dx = dx / maxR;
        joystick.dy = dy / maxR;
        knob.style.transform = `translate(${dx}px, ${dy}px)`;
    }, { passive: true });

    const resetJoystick = () => {
        joystick.active = false; joystick.dx = 0; joystick.dy = 0;
        knob.style.transform = '';
    };
    jc.addEventListener('touchend', resetJoystick);
    jc.addEventListener('touchcancel', resetJoystick);

    let lastTX = 0, lastTY = 0;
    document.addEventListener('touchstart', e => {
        const t = e.touches[0];
        if (t.clientX > window.innerWidth / 2) { lastTX = t.clientX; lastTY = t.clientY; }
    }, { passive: true });
    document.addEventListener('touchmove', e => {
        for (let t of e.touches) {
            if (t.clientX > window.innerWidth / 2) {
                yaw -= (t.clientX - lastTX) * 0.005;
                pitch -= (t.clientY - lastTY) * 0.005;
                pitch = Math.max(-Math.PI / 3, Math.min(Math.PI / 3, pitch));
                lastTX = t.clientX; lastTY = t.clientY;
            }
        }
    }, { passive: true });

    document.getElementById('jump-btn').addEventListener('touchstart', tryJump, { passive: true });
}

// ═══════════════════════════════════════════════
//  GAME LOOP
// ═══════════════════════════════════════════════
let lastSent = 0;

function gameLoop() {
    requestAnimationFrame(gameLoop);
    if (!scene) return;

    const speed = 0.12;
    const forward = new THREE.Vector3(-Math.sin(yaw), 0, -Math.cos(yaw));
    const right = new THREE.Vector3(Math.cos(yaw), 0, -Math.sin(yaw));
    const move = new THREE.Vector3();

    if (keys['KeyW'] || keys['ArrowUp']) move.addScaledVector(forward, speed);
    if (keys['KeyS'] || keys['ArrowDown']) move.addScaledVector(forward, -speed);
    if (keys['KeyA'] || keys['ArrowLeft']) move.addScaledVector(right, -speed);
    if (keys['KeyD'] || keys['ArrowRight']) move.addScaledVector(right, speed);
    if (keys['Space']) tryJump();

    if (joystick.active) {
        move.addScaledVector(forward, -joystick.dy * speed);
        move.addScaledVector(right, joystick.dx * speed);
    }

    camera.position.add(move);

    velocityY += GRAVITY;
    camera.position.y += velocityY;
    if (camera.position.y < 1.7) { camera.position.y = 1.7; velocityY = 0; onGround = true; }

    camera.position.x = Math.max(-98, Math.min(98, camera.position.x));
    camera.position.z = Math.max(-98, Math.min(98, camera.position.z));

    camera.rotation.order = 'YXZ';
    camera.rotation.y = yaw;
    camera.rotation.x = pitch;

    const now = Date.now();
    if (now - lastSent > 50) {
        lastSent = now;
        socket.emit('playerMovement', {
            x: camera.position.x,
            y: camera.position.y - 1.7,
            z: camera.position.z,
            rotationY: yaw
        });
    }

    resourceObjects.forEach(r => {
        if (r.mesh) r.mesh.rotation.y += 0.003;
    });

    drawMinimap();
    renderer.render(scene, camera);
}

// ═══════════════════════════════════════════════
//  COLLECT
// ═══════════════════════════════════════════════
function tryCollect() {
    const px = camera.position.x, pz = camera.position.z;
    resourceObjects.forEach(r => {
        if (!r.mesh) return;
        const dx = px - r.x, dz = pz - r.z;
        const dist = Math.sqrt(dx * dx + dz * dz);
        if (dist < r.radius + 2) {
            socket.emit('collect', r.type);
            showNotification(`${r.type === 'wood' ? '🪵 Ahşap' : '🪨 Taş'} toplandı!`);
        }
    });
}

// ═══════════════════════════════════════════════
//  ATTACK
// ═══════════════════════════════════════════════
function doAttackNearest() {
    const px = camera.position.x, pz = camera.position.z;
    let nearest = null, nearDist = 5;
    Object.entries(otherPlayerMeshes).forEach(([id, mesh]) => {
        const dx = px - mesh.position.x, dz = pz - mesh.position.z;
        const d = Math.sqrt(dx * dx + dz * dz);
        if (d < nearDist) { nearDist = d; nearest = id; }
    });
    if (nearest) {
        socket.emit('attack', nearest);
        showNotification('⚔️ Saldırı!');
    }
}

// ═══════════════════════════════════════════════
//  CRAFT
// ═══════════════════════════════════════════════
function toggleCraft() {
    document.getElementById('craft-panel').classList.toggle('open');
}

function doCraft(item) {
    socket.emit('craft', item);
    const names = { sword: '⚔️ Kılıç', pickaxe: '⛏️ Kazma', axe: '🪓 Balta' };
    showNotification(`${names[item] || item} üretildi!`);
}

// ═══════════════════════════════════════════════
//  MINIMAP
// ═══════════════════════════════════════════════
function drawMinimap() {
    const canvas = document.getElementById('minimap-canvas');
    const ctx = canvas.getContext('2d');
    const W = 100, H = 100, scale = 100 / 200;

    ctx.fillStyle = '#0a0806';
    ctx.fillRect(0, 0, W, H);

    ctx.strokeStyle = '#1a1005'; ctx.lineWidth = 0.5;
    for (let i = 0; i <= W; i += 10) { ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, H); ctx.stroke(); }
    for (let i = 0; i <= H; i += 10) { ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(W, i); ctx.stroke(); }

    resourceObjects.forEach(r => {
        const mx = (r.x + 100) * scale, my = (r.z + 100) * scale;
        ctx.fillStyle = r.type === 'wood' ? '#1a3a10' : '#4a4030';
        ctx.fillRect(mx - 1, my - 1, 3, 3);
    });

    Object.values(otherPlayerMeshes).forEach(mesh => {
        const mx = (mesh.position.x + 100) * scale, my = (mesh.position.z + 100) * scale;
        ctx.fillStyle = '#e74c3c';
        ctx.beginPath(); ctx.arc(mx, my, 2.5, 0, Math.PI * 2); ctx.fill();
    });

    const sx = (camera.position.x + 100) * scale, sy = (camera.position.z + 100) * scale;
    ctx.fillStyle = '#c9a84c';
    ctx.beginPath(); ctx.arc(sx, sy, 3.5, 0, Math.PI * 2); ctx.fill();

    ctx.strokeStyle = '#c9a84c'; ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(sx, sy);
    ctx.lineTo(sx - Math.sin(yaw) * 6, sy - Math.cos(yaw) * 6);
    ctx.stroke();
}

// ═══════════════════════════════════════════════
//  UI HELPERS
// ═══════════════════════════════════════════════
let notifTimer = null;
function showNotification(text) {
    const el = document.getElementById('notification');
    el.textContent = text;
    el.classList.add('show');
    clearTimeout(notifTimer);
    notifTimer = setTimeout(() => el.classList.remove('show'), 2000);
}

function addKillFeed(text) {
    const feed = document.getElementById('killfeed');
    const div = document.createElement('div');
    div.className = 'kill-entry';
    div.textContent = text;
    feed.appendChild(div);
    setTimeout(() => { if (div.parentNode) div.parentNode.removeChild(div); }, 4500);
}

socket.on('playerMoved', (p) => {
    if (p.id !== socket.id) return;
    if (p.x === 0 && p.z === 0 && p.hp === 100) {
        camera.position.set(0, 1.7, 0);
        updateHP(100);
        showNotification('☠️ Öldürüldünüz! Yeniden doğuyorsunuz...');
    }
});

socket.on('hpUpdate', (data) => {
    if (data.id === socket.id) updateHP(data.hp);
});
</script>
