<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>⚔️ Survival Evolution RPG</title>
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        /* CSS AYNI BIRAKILMIŞTIR */
        :root {
            --gold: #c9a84c; --gold-light: #f0d080; --gold-dark: #7a5c1e;
            --dark: #0a0806; --dark2: #12100d; --dark3: #1c1710;
            --red: #c0392b; --green: #27ae60; --ember: #e67e22;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--dark);
            font-family: 'Crimson Text', serif;
            overflow: hidden; touch-action: none;
            cursor: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='20' height='20'><text y='16' font-size='16'>⚔️</text></svg>") 10 10, auto;
        }

        #particles-canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
        
        #auth-screen {
            position: fixed; inset: 0; z-index: 2000;
            display: flex; align-items: center; justify-content: center;
            background: radial-gradient(ellipse at 30% 40%, #2a1a05 0%, #0a0806 60%);
            overflow: hidden;
        }

        .bg-rune { position: absolute; font-size: 120px; opacity: 0.03; animation: runeFloat 8s ease-in-out infinite; pointer-events: none; color: var(--gold); user-select: none; }
        @keyframes runeFloat { 0%,100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-20px) rotate(5deg); } }

        .auth-container { position: relative; z-index: 10; width: 420px; max-width: 95vw; }
        .auth-title-wrap { text-align: center; margin-bottom: 8px; }
        .auth-title { font-family: 'Cinzel Decorative', serif; font-size: clamp(20px, 5vw, 32px); color: var(--gold-light); text-shadow: 0 0 30px #c9a84c88, 0 0 60px #c9a84c44; letter-spacing: 4px; animation: titleGlow 2s ease-in-out infinite alternate; }
        @keyframes titleGlow { from { text-shadow: 0 0 20px #c9a84c88; } to { text-shadow: 0 0 40px #f0d08099, 0 2px 4px #000; } }
        .auth-subtitle { font-family: 'Cinzel', serif; color: #8a6a2a; font-size: 11px; letter-spacing: 8px; text-transform: uppercase; margin-top: 4px; }

        .panel-frame { background: linear-gradient(160deg, #1c1508 0%, #0e0b05 60%, #1a1206 100%); border: 1px solid #3a2a10; border-radius: 4px; padding: 32px 28px; position: relative; box-shadow: 0 0 60px #00000099, inset 0 1px 0 #3a2a10, inset 0 -1px 0 #1a0f05; }
        .panel-frame::before { content: ''; position: absolute; inset: 6px; border: 1px solid #2a1e08; border-radius: 2px; pointer-events: none; }
        .corner { position: absolute; width: 20px; height: 20px; color: var(--gold-dark); font-size: 14px; }
        .corner.tl { top: 4px; left: 4px; } .corner.tr { top: 4px; right: 4px; transform: scaleX(-1); } .corner.bl { bottom: 4px; left: 4px; transform: scaleY(-1); } .corner.br { bottom: 4px; right: 4px; transform: scale(-1); }

        .auth-tabs { display: flex; margin-bottom: 24px; border-bottom: 1px solid #2a1e08; }
        .auth-tab { flex: 1; padding: 10px; text-align: center; font-family: 'Cinzel', serif; font-size: 12px; letter-spacing: 2px; color: #5a4820; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.3s; text-transform: uppercase; }
        .auth-tab.active { color: var(--gold-light); border-bottom-color: var(--gold); }
        .auth-tab:hover { color: var(--gold); }
        .form-panel { display: none; } .form-panel.active { display: block; }

        .field-wrap { margin-bottom: 14px; position: relative; }
        .field-label { display: block; font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 3px; color: var(--gold-dark); margin-bottom: 6px; text-transform: uppercase; }
        .field-input { width: 100%; padding: 12px 16px; background: rgba(0,0,0,0.5); border: 1px solid #2a1e08; border-radius: 2px; color: #e8d8a0; font-family: 'Crimson Text', serif; font-size: 15px; outline: none; transition: all 0.3s; box-shadow: inset 0 2px 8px #00000066; }
        .field-input:focus { border-color: var(--gold-dark); box-shadow: inset 0 2px 8px #00000066, 0 0 12px #c9a84c22; }
        .field-input.error { border-color: #c0392b88; box-shadow: 0 0 8px #c0392b44; } .field-input.success { border-color: #27ae6088; box-shadow: 0 0 8px #27ae6044; } .field-input.checking { border-color: #c9a84c88; }
        .field-hint { font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 1px; margin-top: 4px; min-height: 14px; transition: all 0.2s; }
        .field-hint.error { color: #e74c3c; } .field-hint.success { color: #27ae60; } .field-hint.info { color: #c9a84c; }
        .field-status { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); font-size: 16px; pointer-events: none; }
        .forgot-link { font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 2px; color: var(--gold-dark); cursor: pointer; transition: color 0.2s; text-decoration: underline; text-underline-offset: 3px; }
        .forgot-link:hover { color: var(--gold); }

        .captcha-box { background: #0a0806; border: 1px solid #2a1e08; border-radius: 2px; padding: 14px 16px; display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
        .captcha-img { background: linear-gradient(135deg, #1a1206, #0e0b05); border: 1px solid #3a2a10; border-radius: 2px; padding: 8px 16px; font-family: 'Cinzel Decorative', serif; font-size: 18px; letter-spacing: 6px; color: var(--gold-light); text-shadow: 2px 2px 4px #000; user-select: none; position: relative; overflow: hidden; min-width: 120px; text-align: center; }
        .captcha-img::after { content: ''; position: absolute; inset: 0; background: repeating-linear-gradient(45deg, transparent, transparent 2px, rgba(255,255,255,0.02) 2px, rgba(255,255,255,0.02) 4px); }
        .captcha-line { position: absolute; width: 100%; height: 1px; background: #c9a84c44; transform: rotate(-8deg); top: 50%; }
        .captcha-refresh { background: none; border: 1px solid #2a1e08; color: var(--gold-dark); cursor: pointer; padding: 6px 10px; border-radius: 2px; font-size: 16px; transition: all 0.2s; }
        .captcha-refresh:hover { border-color: var(--gold-dark); color: var(--gold); }

        .msg-box { padding: 10px 14px; border-radius: 2px; font-size: 13px; margin-bottom: 14px; display: none; align-items: center; gap: 8px; font-family: 'Cinzel', serif; letter-spacing: 1px; }
        .msg-box.error { background: #c0392b22; border: 1px solid #c0392b88; color: #e74c3c; display: flex; }
        .msg-box.success { background: #27ae6022; border: 1px solid #27ae6088; color: #2ecc71; display: flex; }

        .btn-enter { width: 100%; padding: 14px; background: linear-gradient(180deg, #3a2a0a 0%, #1a1005 50%, #2a1e08 100%); border: 1px solid var(--gold-dark); color: var(--gold-light); font-family: 'Cinzel', serif; font-size: 14px; letter-spacing: 4px; text-transform: uppercase; cursor: pointer; border-radius: 2px; transition: all 0.3s; position: relative; overflow: hidden; box-shadow: 0 4px 20px #00000088; }
        .btn-enter::before { content: ''; position: absolute; inset: 0; background: linear-gradient(180deg, transparent 0%, rgba(201,168,76,0.1) 100%); opacity: 0; transition: opacity 0.3s; }
        .btn-enter:hover::before { opacity: 1; } .btn-enter:hover { border-color: var(--gold); color: #fff; box-shadow: 0 4px 30px #c9a84c44; }

        #loading-overlay { position: fixed; inset: 0; z-index: 3000; background: #0a0806; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .loading-title { font-family: 'Cinzel Decorative', serif; font-size: 24px; color: var(--gold-light); margin-bottom: 30px; text-shadow: 0 0 30px var(--gold); }
        .loading-bar-wrap { width: 300px; height: 4px; background: #1a1206; border: 1px solid #3a2a10; border-radius: 2px; overflow: hidden; }
        .loading-bar-fill { height: 100%; background: linear-gradient(90deg, var(--gold-dark), var(--gold-light)); width: 0%; transition: width 0.3s; box-shadow: 0 0 8px var(--gold); }
        .loading-text { font-family: 'Cinzel', serif; color: #5a4820; font-size: 11px; letter-spacing: 4px; margin-top: 12px; }

        #game-canvas { position: fixed; inset: 0; z-index: 1; display: none; }
        #game-ui { display: none; }
        #ui-overlay { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; pointer-events: none; padding: 16px; background: linear-gradient(180deg, rgba(0,0,0,0.7) 0%, transparent 100%); }
        .player-hud { display: flex; align-items: center; gap: 12px; }
        .avatar-icon { width: 44px; height: 44px; background: linear-gradient(135deg, #1c1508, #2a1e08); border: 2px solid var(--gold-dark); border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 22px; }
        .player-info { flex: 1; }
        #player-name-display { font-family: 'Cinzel', serif; color: var(--gold-light); font-size: 13px; letter-spacing: 2px; }
        .hp-bar-wrap { display: flex; align-items: center; gap: 6px; margin-top: 4px; }
        #hp-bar-ui { width: 150px; height: 8px; background: rgba(0,0,0,0.6); border: 1px solid #3a1010; border-radius: 2px; overflow: hidden; }
        #hp-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #c0392b, #e74c3c); transition: 0.3s; box-shadow: 0 0 6px #e74c3c88; }
        .hp-text { font-family: 'Cinzel', serif; font-size: 10px; color: #c0392b; }
        .inv-bar { display: flex; gap: 8px; margin-top: 8px; }
        .inv-item { background: rgba(0,0,0,0.6); border: 1px solid #2a1e08; border-radius: 3px; padding: 4px 10px; font-family: 'Cinzel', serif; font-size: 11px; color: #c9a84c; letter-spacing: 1px; }

        .character-select { display: flex; gap: 8px; margin-top: 10px; }
        .char-btn { background: rgba(0,0,0,0.5); border: 1px solid #c9a84c; color: #c9a84c; font-family: 'Cinzel', serif; font-size: 12px; padding: 4px 12px; border-radius: 4px; cursor: pointer; transition: 0.2s; pointer-events: auto; }
        .char-btn:hover { background: rgba(201,168,76,0.2); box-shadow: 0 0 6px #c9a84c; }

        #craft-toggle { position: fixed; top: 80px; right: 16px; width: 48px; height: 48px; background: linear-gradient(135deg, #1c1508, #0e0b05); border: 2px solid var(--gold-dark); border-radius: 6px; color: var(--gold); font-size: 22px; display: none; align-items: center; justify-content: center; cursor: pointer; z-index: 1600; box-shadow: 0 4px 12px #00000088; transition: all 0.2s; }
        #craft-toggle:hover { border-color: var(--gold); box-shadow: 0 0 16px var(--gold-dark); }
        #craft-panel { position: fixed; top: 60px; right: -280px; width: 260px; background: linear-gradient(160deg, #1c1508, #0e0b05); border: 1px solid #3a2a10; border-right: none; border-radius: 8px 0 0 8px; padding: 20px 16px; transition: right 0.4s; z-index: 1500; color: white; }
        #craft-panel.open { right: 0; }
        .craft-title { font-family: 'Cinzel', serif; color: var(--gold-light); font-size: 13px; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid #2a1e08; }
        .craft-option { background: rgba(0,0,0,0.4); border: 1px solid #2a1e08; border-radius: 4px; padding: 12px 14px; margin-bottom: 8px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 10px; }
        .craft-option:hover { border-color: var(--gold-dark); background: rgba(201,168,76,0.1); }
        .craft-option .name { font-family: 'Cinzel', serif; font-size: 12px; color: var(--gold-light); }
        .craft-option .cost { font-size: 11px; color: #5a4820; margin-top: 2px; }

        #mobile-controls { position: fixed; inset: 0; pointer-events: none; z-index: 900; display: none; }
        #joystick-container { position: absolute; bottom: 28px; left: 28px; width: 120px; height: 120px; background: radial-gradient(circle, rgba(201,168,76,0.1) 0%, rgba(0,0,0,0.3) 100%); border: 2px solid rgba(201,168,76,0.3); border-radius: 50%; pointer-events: auto; }
        #joystick-inner { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 40px; height: 40px; border: 1px solid rgba(201,168,76,0.4); border-radius: 50%; }
        #joystick-knob { position: absolute; width: 44px; height: 44px; background: radial-gradient(circle, rgba(201,168,76,0.6) 0%, rgba(100,70,20,0.8) 100%); border: 2px solid rgba(201,168,76,0.5); border-radius: 50%; top: 38px; left: 38px; pointer-events: none; transition: transform 0.05s; }
        #jump-btn { position: absolute; bottom: 28px; right: 140px; width: 64px; height: 64px; background: rgba(0,0,0,0.6); border: 2px solid rgba(201,168,76,0.4); border-radius: 50%; color: var(--gold); font-family: 'Cinzel', serif; font-size: 10px; pointer-events: auto; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #attack-btn { position: absolute; bottom: 28px; right: 28px; width: 100px; height: 100px; background: radial-gradient(circle, rgba(192,57,43,0.5) 0%, rgba(100,20,10,0.7) 100%); border: 3px solid rgba(192,57,43,0.6); border-radius: 50%; font-size: 32px; pointer-events: auto; display: flex; align-items: center; justify-content: center; }
        #attack-btn:active { transform: scale(0.92); }

        #minimap { position: fixed; top: 16px; right: 16px; width: 100px; height: 100px; background: rgba(0,0,0,0.7); border: 1px solid #3a2a10; border-radius: 4px; overflow: hidden; z-index: 1000; display: none; }
        #minimap-canvas { width: 100%; height: 100%; }

        #damage-flash { position: fixed; inset: 0; z-index: 999; background: rgba(192,57,43,0); pointer-events: none; transition: background 0.1s; }
        #damage-flash.flash { background: rgba(192,57,43,0.25); }
        #killfeed { position: fixed; top: 130px; right: 16px; z-index: 1000; pointer-events: none; width: 220px; }
        .kill-entry { background: rgba(0,0,0,0.7); border-left: 2px solid var(--gold-dark); padding: 4px 10px; font-family: 'Cinzel', serif; font-size: 10px; color: #c9a84c; margin-bottom: 4px; animation: killFade 4s forwards; }
        @keyframes killFade { 0% { opacity:1; } 80% { opacity:1; } 100% { opacity:0; } }
        #notification { position: fixed; top: 80px; left: 50%; transform: translateX(-50%); z-index: 1500; font-family: 'Cinzel', serif; font-size: 13px; letter-spacing: 3px; color: var(--gold-light); background: rgba(0,0,0,0.85); border: 1px solid var(--gold-dark); padding: 10px 24px; border-radius: 4px; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
        #notification.show { opacity: 1; }
        #online-count { position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%); font-family: 'Cinzel', serif; font-size: 10px; color: rgba(201,168,76,0.4); z-index: 1000; pointer-events: none; display: none; }
        #crosshair { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); z-index: 1000; pointer-events: none; color: rgba(255,255,255,0.5); font-size: 18px; display: none; }
    </style>
</head>
<body>
<canvas id="particles-canvas"></canvas>
<canvas id="game-canvas"></canvas>

<div id="loading-overlay">
    <div class="loading-title">⚔️ SURVIVAL EVOLUTION</div>
    <div class="loading-bar-wrap"><div class="loading-bar-fill" id="loading-fill"></div></div>
    <div class="loading-text" id="loading-text">DÜNYA YÜKLENİYOR...</div>
</div>

<div id="auth-screen">
    <div class="bg-rune" style="top:10%; left:5%; animation-delay:0s;">⚔</div>
    <div class="bg-rune" style="top:60%; right:8%; animation-delay:2s; font-size:80px;">🛡</div>
    <div class="bg-rune" style="bottom:15%; left:15%; animation-delay:4s; font-size:60px;">⛏</div>
    <div class="bg-rune" style="top:30%; right:20%; animation-delay:1s; font-size:50px;">🗡</div>
    <div class="auth-container">
        <div class="auth-title-wrap">
            <div class="auth-title">⚔️ SURVIVAL<br>EVOLUTION</div>
            <div class="auth-subtitle">Çok Oyunculu Hayatta Kalma RPG</div>
        </div>
        <br>
        <div class="panel-frame">
            <div class="auth-tabs" id="auth-tabs-main">
                <div class="auth-tab active" onclick="switchTab('login')">⚔ Giriş Yap</div>
                <div class="auth-tab" onclick="switchTab('register')">📜 Kayıt Ol</div>
            </div>
            <div class="form-panel active" id="panel-login">
                <div id="msg-login" class="msg-box"></div>
                <div class="field-wrap">
                    <label class="field-label">⚔ Kahraman Adı veya E-Posta</label>
                    <input type="text" id="login-user" class="field-input" placeholder="Kullanıcı adı veya e-posta...">
                </div>
                <div class="field-wrap">
                    <label class="field-label">🔒 Şifre</label>
                    <input type="password" id="login-pass" class="field-input" placeholder="Şifreniz...">
                </div>
                <div style="text-align:right; margin-bottom:14px; margin-top:-8px;">
                    <span class="forgot-link" onclick="switchTab('forgot')">🔑 Şifremi Unuttum</span>
                </div>
                <button class="btn-enter" onclick="doLogin()">⚔ DÜNYAYA GİR ⚔</button>
            </div>
            <div class="form-panel" id="panel-register">
                <div id="msg-register" class="msg-box"></div>
                <div class="field-wrap">
                    <label class="field-label">⚔ Kahraman Adı</label>
                    <input type="text" id="reg-user" class="field-input" oninput="checkUsername(this)">
                    <div class="field-hint" id="reg-user-hint"></div>
                </div>
                <div class="field-wrap">
                    <label class="field-label">📧 E-Posta</label>
                    <input type="email" id="reg-email" class="field-input" oninput="checkEmail(this)">
                    <div class="field-hint" id="reg-email-hint"></div>
                </div>
                <div class="field-wrap">
                    <label class="field-label">🔒 Şifre</label>
                    <input type="password" id="reg-pass" class="field-input" oninput="checkPassword(this)">
                </div>
                <div class="field-wrap">
                    <label class="field-label">🔒 Şifre Tekrar</label>
                    <input type="password" id="reg-pass2" class="field-input" oninput="checkPassword2(this)">
                </div>
                <div class="captcha-box">
                    <div class="captcha-img" id="captcha-display"><span id="captcha-text">A4X9</span></div>
                    <button class="captcha-refresh" onclick="refreshCaptcha()">↻</button>
                    <input type="text" id="captcha-input" class="field-input" style="flex:1">
                </div>
                <button class="btn-enter" onclick="doRegister()">📜 KAHRAMAN OLUŞTUR</button>
            </div>
            <div class="form-panel" id="panel-forgot"><div id="msg-forgot" class="msg-box"></div><div class="field-wrap"><label class="field-label">📧 E-Posta</label><input type="email" id="forgot-email" class="field-input"></div><button class="btn-enter" onclick="doForgotPassword()">📨 KOD GÖNDER</button><div style="text-align:center;margin-top:12px;"><span class="forgot-link" onclick="switchTab('login')">← Geri</span></div></div>
            <div class="form-panel" id="panel-reset-code"><div id="msg-reset-code" class="msg-box"></div><div class="field-wrap"><label class="field-label">🔑 Doğrulama Kodu</label><input type="text" id="reset-code-input" class="field-input"></div><button class="btn-enter" onclick="verifyResetCode()">✅ KODU DOĞRULA</button></div>
            <div class="form-panel" id="panel-new-password"><div id="msg-new-password" class="msg-box"></div><div class="field-wrap"><label class="field-label">🔒 Yeni Şifre</label><input type="password" id="new-password1" class="field-input"></div><div class="field-wrap"><label class="field-label">🔒 Yeni Şifre Tekrar</label><input type="password" id="new-password2" class="field-input"></div><button class="btn-enter" onclick="saveNewPassword()">🔑 ŞİFREYİ GÜNCELLE</button></div>
            <div class="form-panel" id="panel-verify"><div id="msg-verify" class="msg-box"></div><div class="field-wrap"><label class="field-label">🔑 Doğrulama Kodu</label><input type="text" id="verify-code" class="field-input"></div><button class="btn-enter" onclick="doVerifyCode()">✅ DOĞRULA VE GİRİŞ YAP</button></div>
        </div>
    </div>
</div>

<div id="game-ui">
    <div id="ui-overlay">
        <div class="player-hud">
            <div class="avatar-icon">⚔️</div>
            <div class="player-info">
                <div id="player-name-display">KAHRAMAN</div>
                <div class="hp-bar-wrap"><span class="hp-icon">❤️</span><div id="hp-bar-ui"><div id="hp-fill"></div></div><span class="hp-text" id="hp-text">100/100</span></div>
                <div class="inv-bar">
                    <div class="inv-item">🪵 <span id="inv-wood">0</span></div>
                    <div class="inv-item">🪨 <span id="inv-stone">0</span></div>
                    <div class="inv-item">⚔️ <span id="inv-sword">0</span></div>
                </div>
                <div class="character-select">
                    <div class="char-btn" onclick="spawnCharacter('edward')">⚙️ Edward Elric</div>
                    <div class="char-btn" onclick="spawnCharacter('muichiro')">💨 Muichiro Tokito</div>
                </div>
            </div>
        </div>
    </div>
    <div id="craft-toggle" onclick="toggleCraft()">🔨</div>
    <div id="craft-panel">
        <div class="craft-title">⚒ ÜRETIM TEZGAHI</div>
        <div class="craft-option" onclick="doCraft('sword')"><span class="icon">⚔️</span><div class="info"><div class="name">Kılıç</div><div class="cost">🪵×2 + 🪨×2</div></div></div>
    </div>
    <div id="mobile-controls">
        <div id="joystick-container"><div id="joystick-inner"></div><div id="joystick-knob"></div></div>
        <button id="jump-btn"><span class="j-icon">↑</span><span>ZIPLA</span></button>
        <button id="attack-btn" onclick="doAttackNearest()">⚔️</button>

(function () {
    const canvas = document.getElementById('particles-canvas'); const ctx = canvas.getContext('2d');
    let particles = [];
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize); resize();

        requestAnimationFrame(animParticles);
    }
    animParticles();
})();

// Edward: Yerden Çıkan Taş Sütunlar ve Mavi Şimşek
function createEarthSpikeEffect(targetPos, scene) {
    const spikeMat = new THREE.MeshStandardMaterial({ color: 0x555555, roughness: 1.0 });
    const spikes = [];
    
    // Yere simya çemberi izi
    const circle = new THREE.Mesh(
        new THREE.RingGeometry(1, 1.2, 16),
        new THREE.MeshBasicMaterial({ color: 0x00ccff, side: THREE.DoubleSide, transparent: true, blending: THREE.AdditiveBlending })
    );
    circle.rotation.x = -Math.PI/2;
    circle.position.copy(targetPos);
    circle.position.y = 0.05;
    scene.add(circle);

    for(let i=0; i<3; i++) {
        const spike = new THREE.Mesh(new THREE.ConeGeometry(0.4, 2, 5), spikeMat);
        spike.position.set(
            targetPos.x + (Math.random()-0.5),
            -1.0, // Yerden başlayacak
            targetPos.z + (Math.random()-0.5)
        );
        spike.rotation.set((Math.random()-0.5)*0.5, 0, (Math.random()-0.5)*0.5);
        scene.add(spike);
        spikes.push(spike);
    }
    
    activeEffects.push((deltaTime, totalTime) => {
        let isDone = true;
        circle.rotation.z += deltaTime * 5;
        circle.material.opacity -= deltaTime * 1.5;

        spikes.forEach(s => {
            if(s.position.y < 1.0) { s.position.y += deltaTime * 15; isDone = false; }
            else if(circle.material.opacity <= 0) { scene.remove(s); }
        });
        
        if(circle.material.opacity <= 0) { scene.remove(circle); return true; } // Efekti bitir
        return false;
    });
}

// Muichiro: Hacimli Sis Bulutları ve Kesikler (Additive Blending)
function createMistBreathingEffect(targetPos, scene) {
    const mistMat = new THREE.MeshBasicMaterial({ 
        color: 0x00ffff, transparent: true, opacity: 0.6, 
        blending: THREE.AdditiveBlending, depthWrite: false 
    });
    
    const clouds = [];
    for(let i=0; i<10; i++) {
        const cloud = new THREE.Mesh(new THREE.SphereGeometry(0.5 + Math.random(), 8, 8), mistMat);
        cloud.position.copy(targetPos);
        cloud.position.x += (Math.random()-0.5)*3;
        cloud.position.y += Math.random()*2;
        cloud.position.z += (Math.random()-0.5)*3;
        scene.add(cloud);
        clouds.push({ mesh: cloud, scaleDir: 1 + Math.random()*2 });
    }

    const slash = new THREE.Mesh(
        new THREE.TorusGeometry(1.5, 0.1, 4, 16, Math.PI),
        new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, blending: THREE.AdditiveBlending })
    );
    slash.position.copy(targetPos);
    slash.position.y = 1;
    slash.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, Math.random()*Math.PI);
    scene.add(slash);

    activeEffects.push((deltaTime) => {
        slash.scale.addScalar(deltaTime * 5);
        slash.material.opacity -= deltaTime * 2;
        
        let allFaded = true;
        clouds.forEach(c => {
            c.mesh.scale.addScalar(deltaTime * c.scaleDir);
            c.mesh.material.opacity -= deltaTime * 0.8;
            if(c.mesh.material.opacity > 0) allFaded = false;
        });

        if(allFaded) {
            scene.remove(slash);
            clouds.forEach(c => scene.remove(c.mesh));
            return true;
        }
        return false;
    });
}

function spawnCharacter(type) {

// Animasyon ve Savaş Güncellemesi
function updateNPCsAndCombat(deltaTime) {
    const now = Date.now();
    for(let id in spawnedNPCs) {
        const npc = spawnedNPCs[id];
        if(!npc || npc.hp <= 0) {
            if(npc && npc.mesh) scene.remove(npc.mesh);
            delete spawnedNPCs[id]; continue;
        }
        
        let targetNPC = null;
        for(let otherId in spawnedNPCs) {
            if(otherId !== id && spawnedNPCs[otherId].type !== npc.type) { targetNPC = spawnedNPCs[otherId]; break; }
        }
        
        // Kemik animasyonları için parçaları bul
        const leftArm = npc.mesh.getObjectByName("leftArm");
        const rightArm = npc.mesh.getObjectByName("rightArm");
        const leftLeg = npc.mesh.getObjectByName("leftLeg");
        const rightLeg = npc.mesh.getObjectByName("rightLeg");

        if(targetNPC) {
            const dx = targetNPC.mesh.position.x - npc.mesh.position.x;
            const dz = targetNPC.mesh.position.z - npc.mesh.position.z;
            const distance = Math.sqrt(dx*dx + dz*dz);
            
            if(distance > 1.8) {
                // YÜRÜME ANİMASYONU
                const angle = Math.atan2(dx, dz);
                npc.mesh.position.x += Math.sin(angle) * 3 * deltaTime;
                npc.mesh.position.z += Math.cos(angle) * 3 * deltaTime;
                npc.mesh.lookAt(targetNPC.mesh.position);
                
                npc.walkCycle += deltaTime * 10;
                if(leftLeg) leftLeg.rotation.x = Math.sin(npc.walkCycle) * 0.5;
                if(rightLeg) rightLeg.rotation.x = -Math.sin(npc.walkCycle) * 0.5;
                if(leftArm) leftArm.rotation.x = -Math.sin(npc.walkCycle) * 0.5;
                if(rightArm) rightArm.rotation.x = Math.sin(npc.walkCycle) * 0.5;
            } else {
                // DURMA & SALDIRI
                if(leftLeg) leftLeg.rotation.x = 0; if(rightLeg) rightLeg.rotation.x = 0;
                
                if(now - (npc.lastAttack || 0) > 1200) {
                    npc.lastAttack = now;
                    targetNPC.hp -= npc.attackDamage;
                    
                    // Basit vurma animasyonu
                    if(rightArm) {
                        rightArm.rotation.x = -1.5;
                        setTimeout(() => { if(rightArm) rightArm.rotation.x = 0; }, 200);
                    }

                    if(npc.skill && (now - (npc.lastSkillUse || 0) > npc.skill.cooldown)) {
                        npc.lastSkillUse = now;
                        npc.skill.effect(npc, targetNPC, scene);
                    }
                }
            }
        } else {
            // Hedef yoksa dur
            if(leftLeg) leftLeg.rotation.x = 0; if(rightLeg) rightLeg.rotation.x = 0;
            if(leftArm) leftArm.rotation.x = 0; if(rightArm) rightArm.rotation.x = 0;
        }
        npc.x = npc.mesh.position.x; npc.z = npc.mesh.position.z;
    }
}

function enterGame() {
    const canvas = document.getElementById('game-canvas');
    canvas.style.display = 'block'; document.getElementById('game-ui').style.display = 'block';
    initThree(canvas); buildWorld(); spawnResources(); setupInput(canvas);
    lastTime = performance.now();
    gameLoop();
}

function initThree(canvas) {
    scene = new THREE.Scene(); scene.background = new THREE.Color(0x1a0f05); scene.fog = new THREE.Fog(0x1a0f05, 30, 120);
    camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 200);
    renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight); renderer.shadowMap.enabled = true;
    
    // Daha iyi ışıklandırma
    const ambient = new THREE.AmbientLight(0xffffff, 0.6); scene.add(ambient);
    const sun = new THREE.DirectionalLight(0xffddaa, 1.2);
    sun.position.set(30, 60, 20); sun.castShadow = true;
    sun.shadow.mapSize.set(2048, 2048); scene.add(sun);
}

function buildWorld() {
    const ground = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), new THREE.MeshStandardMaterial({ color: 0x1a1005, roughness: 1 }));
    ground.rotation.x = -Math.PI / 2; ground.receiveShadow = true; scene.add(ground);
}
function spawnResources() {} // Boş bırakıldı, orijinalliği bozmamak için kısaltıldı

function createPlayerMesh() { 
    // Ana oyuncu için basit avatar (Orijinal yapıya benzer)
    const g = new THREE.Group();
    const mesh = new THREE.Mesh(new THREE.BoxGeometry(0.5, 1, 0.5), new THREE.MeshStandardMaterial({color: 0xc9a84c}));
    mesh.position.y = 0.5; g.add(mesh); return g; 
}

function setupInput(canvas) {
    document.addEventListener('keydown', e => { keys[e.code] = true; });
    document.addEventListener('keyup', e => { keys[e.code] = false; });
}

let lastTime = 0;
function gameLoop(time) {
    requestAnimationFrame(gameLoop);
    const deltaTime = (time - lastTime) / 1000 || 0;
    lastTime = time;

    if (!scene) return;
    
    // Karakter animasyonları ve savaş
    updateNPCsAndCombat(deltaTime);
    
    // Gelişmiş VFX Güncellemeleri
    for(let i = activeEffects.length - 1; i >= 0; i--) {
        const isDone = activeEffects[i](deltaTime, time/1000);
        if(isDone) activeEffects.splice(i, 1);
    }

    // Basit oyuncu hareketi
    const speed = 0.12;
    if (keys['KeyW']) playerPos.z -= speed; if (keys['KeyS']) playerPos.z += speed;
    if (keys['KeyA']) playerPos.x -= speed; if (keys['KeyD']) playerPos.x += speed;

    if (playerMesh) playerMesh.position.set(playerPos.x, playerPos.y, playerPos.z);
    
    camera.position.x += (playerPos.x - camera.position.x)*0.15;
    camera.position.y += (playerPos.y + CAM_HEIGHT - camera.position.y)*0.15;
    camera.position.z += (playerPos.z + CAM_DISTANCE - camera.position.z)*0.15;
    camera.lookAt(playerPos.x, playerPos.y, playerPos.z);

    renderer.render(scene, camera);
}

function showNotification(text) {
    const el = document.getElementById('notification');
    el.textContent = text; el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2000);
}
function toggleCraft() { document.getElementById('craft-panel').classList.toggle('open'); }
function doCraft(item) {} function doAttackNearest() {}
</script>
