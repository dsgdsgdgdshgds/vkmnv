<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, orientation=landscape">
    <title>Survival Evolution: Ultra</title>
    <style>
        :root { --primary: #2ecc71; --ui-bg: rgba(0,0,0,0.6); }
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; touch-action: none; user-select: none; }
        
        #portrait-warning { 
            position: fixed; inset: 0; background: #1a1a1a; color: white; 
            z-index: 9999; display: none; align-items: center; justify-content: center; text-align: center; 
        }
        @media screen and (orientation: portrait) { #portrait-warning { display: flex; } }

        /* Giriş Ekranı */
        #login-screen { position: fixed; inset: 0; background: radial-gradient(circle, #2c3e50, #000); display: flex; align-items: center; justify-content: center; z-index: 2000; }
        .box { background: rgba(255,255,255,0.1); backdrop-filter: blur(15px); padding: 40px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.2); width: 320px; text-align: center; color: white; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; background: rgba(255,255,255,0.9); box-sizing: border-box; color: #333; }
        button.start-btn { width: 100%; padding: 15px; background: var(--primary); border: none; color: white; font-weight: bold; border-radius: 8px; cursor: pointer; }

        /* HUD */
        #hud { position: fixed; inset: 0; pointer-events: none; z-index: 1000; display: none; }
        .stats { position: absolute; top: 20px; left: 20px; }
        .hp-bar { width: 200px; height: 15px; background: rgba(0,0,0,0.5); border: 2px solid #fff; border-radius: 10px; overflow: hidden; }
        #hp-fill { width: 100%; height: 100%; background: #e74c3c; transition: 0.3s; }
        
        /* Envanter */
        #craft-bar { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; background: var(--ui-bg); padding: 8px; border-radius: 15px; pointer-events: auto; }
        .slot { width: 50px; height: 50px; background: rgba(255,255,255,0.1); border: 1px solid #777; border-radius: 8px; color: white; font-size: 9px; display: flex; align-items: center; justify-content: center; text-align: center; cursor: pointer; }

        /* Mobil Kontroller */
        .mobile-ui { display: none; }
        @media (pointer: coarse) { .mobile-ui { display: block; } }

        #joystick-base { position: absolute; bottom: 40px; left: 40px; width: 100px; height: 100px; background: rgba(255,255,255,0.1); border-radius: 50%; border: 2px solid rgba(255,255,255,0.2); pointer-events: auto; }
        #joystick-knob { position: absolute; width: 40px; height: 40px; background: #fff; border-radius: 50%; top: 30px; left: 30px; opacity: 0.5; }
        
        .action-btn { position: absolute; border-radius: 50%; border: 2px solid #fff; color: white; font-weight: bold; display: flex; align-items: center; justify-content: center; pointer-events: auto; }
        #atk-btn { right: 30px; bottom: 30px; width: 80px; height: 80px; background: rgba(231, 76, 60, 0.6); font-size: 20px; }
        #jmp-btn { right: 120px; bottom: 40px; width: 55px; height: 55px; background: rgba(255,255,255,0.2); font-size: 10px; }
    </style>
</head>
<body>

<div id="portrait-warning">Lütfen cihazı yan çevirin! 🔄</div>

<div id="login-screen">
    <div class="box">
        <h2 style="color:var(--primary); margin-top:0;">⚔️ EVOLUTION</h2>
        <input type="text" id="username" placeholder="Kullanıcı Adı">
        <input type="password" id="password" placeholder="Şifre">
        <button class="start-btn" onclick="joinGame()">DÜNYAYA BAĞLAN</button>
    </div>
</div>

<div id="hud">
    <div class="stats">
        <div id="name-tag" style="color:white; font-weight:bold; margin-bottom:5px;">OYUNCU</div>
        <div class="hp-bar"><div id="hp-fill"></div></div>
    </div>

    <div id="craft-bar">
        <div class="slot" onclick="doCraft('axe')">🪓<br>BALTA</div>
        <div class="slot" onclick="doCraft('pickaxe')">⛏️<br>KAZMA</div>
        <div class="slot" onclick="doCraft('sword')">⚔️<br>KILIÇ</div>
    </div>

    <div class="mobile-ui">
        <div id="joystick-base"><div id="joystick-knob"></div></div>
        <button id="atk-btn" class="action-btn">🔥</button>
        <button id="jmp-btn" class="action-btn">ZIP</button>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script type="module">
    import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';

    let scene, camera, renderer, socket, myPlayer, myId;
    let camYaw = 0, camPitch = -Math.PI / 6;
    let isRightClick = false;
    let vY = 0, isGrounded = true;
    const players = {}, resources = [], keys = {};
    
    // Çoklu dokunmatik takibi
    let moveTouchId = null;
    let lookTouchId = null;
    let lastLookX = 0, lastLookY = 0;
    let moveDir = { x: 0, y: 0 };

    window.joinGame = () => {
        const u = document.getElementById('username').value;
        if(!u) return;
        socket = io();
        socket.emit('login', { username: u, password: document.getElementById('password').value });
        socket.on('loginSuccess', () => {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('hud').style.display = 'block';
            document.getElementById('name-tag').innerText = u.toUpperCase();
            init();
        });
    };

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);
        camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const sun = new THREE.DirectionalLight(0xffffff, 0.8);
        sun.position.set(50, 100, 50); sun.castShadow = true;
        scene.add(sun);

        const ground = new THREE.Mesh(new THREE.PlaneGeometry(500, 500), new THREE.MeshStandardMaterial({ color: 0x4caf50 }));
        ground.rotation.x = -Math.PI / 2; ground.receiveShadow = true;
        scene.add(ground);

        // --- Soket Yönetimi ---
        socket.on('currentPlayers', data => {
            myId = socket.id;
            Object.keys(data).forEach(id => {
                if(id === myId) myPlayer = createChar(data[id], true);
                else players[id] = createChar(data[id], false);
            });
        });

        socket.on('newPlayer', d => { players[d.id] = createChar(d, false); });
        
        socket.on('playerMoved', d => { 
            if(players[d.id]) { 
                players[d.id].position.set(d.x, d.y, d.z); 
                players[d.id].rotation.y = d.rotationY; 
            } 
        });

        // BAĞLI OLMAYANLARI SİL
        socket.on('playerDisconnected', id => { 
            if(players[id]) { 
                scene.remove(players[id]); 
                delete players[id]; 
            } 
        });

        bindInputs();
        animate();
    }

    function createChar(data, isMe) {
        const group = new THREE.Group();
        const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.4, 1, 4, 8), new THREE.MeshStandardMaterial({ color: isMe ? 0x2ecc71 : 0xe74c3c }));
        body.position.y = 0.9; body.castShadow = true; group.add(body);
        const head = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.4, 0.4), new THREE.MeshStandardMaterial({ color: 0xffdbac }));
        head.position.y = 1.6; group.add(head);
        group.position.set(data.x || 0, 0, data.z || 0);
        scene.add(group); return group;
    }

    function bindInputs() {
        // --- MASAÜSTÜ ---
        window.addEventListener('mousedown', e => { 
            if(e.button === 0) attack(); 
            if(e.button === 2) isRightClick = true; 
        });
        window.addEventListener('mouseup', e => { if(e.button === 2) isRightClick = false; });
        window.addEventListener('mousemove', e => {
            if(isRightClick) {
                camYaw -= e.movementX * 0.005;
                camPitch = Math.max(-Math.PI/2.2, Math.min(-0.1, camPitch - e.movementY * 0.005));
            }
        });
        window.addEventListener('contextmenu', e => e.preventDefault());
        window.onkeydown = e => { keys[e.code] = true; if(e.code === 'Space' && isGrounded) { vY = 0.25; isGrounded = false; } };
        window.onkeyup = e => keys[e.code] = false;

        // --- MOBİL (GELİŞMİŞ MULTI-TOUCH) ---
        const jsBase = document.getElementById('joystick-base'), knob = document.getElementById('joystick-knob');
        
        window.addEventListener('touchstart', e => {
            for(let i=0; i<e.changedTouches.length; i++) {
                const t = e.changedTouches[i];
                const rect = jsBase.getBoundingClientRect();
                
                // Eğer dokunma joystick alanındaysa
                if(t.clientX > rect.left && t.clientX < rect.right && t.clientY > rect.top && t.clientY < rect.bottom) {
                    moveTouchId = t.identifier;
                } else {
                    // Ekranın geri kalanı kamera kontrolüdür
                    lookTouchId = t.identifier;
                    lastLookX = t.clientX;
                    lastLookY = t.clientY;
                }
            }
        }, {passive: false});

        window.addEventListener('touchmove', e => {
            for(let i=0; i<e.changedTouches.length; i++) {
                const t = e.changedTouches[i];
                
                if(t.identifier === moveTouchId) {
                    const rect = jsBase.getBoundingClientRect();
                    const dx = t.clientX - (rect.left + 50), dy = t.clientY - (rect.top + 50);
                    const dist = Math.min(Math.sqrt(dx*dx+dy*dy), 40), angle = Math.atan2(dy, dx);
                    knob.style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`;
                    moveDir = { x: Math.cos(angle)*(dist/40), y: Math.sin(angle)*(dist/40) };
                } 
                else if(t.identifier === lookTouchId) {
                    const dx = t.clientX - lastLookX, dy = t.clientY - lastLookY;
                    camYaw -= dx * 0.008;
                    camPitch = Math.max(-Math.PI/2.2, Math.min(-0.1, camPitch - dy * 0.008));
                    lastLookX = t.clientX; lastLookY = t.clientY;
                }
            }
        }, {passive: false});

        window.addEventListener('touchend', e => {
            for(let i=0; i<e.changedTouches.length; i++) {
                const t = e.changedTouches[i];
                if(t.identifier === moveTouchId) { moveTouchId = null; moveDir = {x:0, y:0}; knob.style.transform = 'translate(0,0)'; }
                if(t.identifier === lookTouchId) { lookTouchId = null; }
            }
        });

        document.getElementById('atk-btn').addEventListener('touchstart', attack);
        document.getElementById('jmp-btn').addEventListener('touchstart', () => { if(isGrounded) { vY = 0.25; isGrounded = false; } });
    }

    function attack() {
        if(myPlayer) socket.emit('attack');
    }

    window.doCraft = (t) => socket.emit('craft', t);

    function animate() {
        requestAnimationFrame(animate);
        if(myPlayer) {
            const speed = 0.16;
            let mx = 0, mz = 0;
            const forward = new THREE.Vector3(Math.sin(camYaw), 0, Math.cos(camYaw));
            const right = new THREE.Vector3().crossVectors(new THREE.Vector3(0,1,0), forward);

            // Hareket (WASD + Joystick)
            if(keys['KeyW'] || moveDir.y < -0.2) { mx += forward.x * speed; mz += forward.z * speed; }
            if(keys['KeyS'] || moveDir.y > 0.2) { mx -= forward.x * speed; mz -= forward.z * speed; }
            if(keys['KeyA'] || moveDir.x < -0.2) { mx += right.x * speed; mz += right.z * speed; }
            if(keys['KeyD'] || moveDir.x > 0.2) { mx -= right.x * speed; mz -= right.z * speed; }

            myPlayer.position.x += mx; myPlayer.position.z += mz;
            if(Math.abs(mx) > 0.01 || Math.abs(mz) > 0.01) myPlayer.rotation.y = Math.atan2(mx, mz);

            myPlayer.position.y += vY;
            if(myPlayer.position.y > 0) vY -= 0.012; else { myPlayer.position.y = 0; vY = 0; isGrounded = true; }

            // Akıcı Kamera
            const d = 12;
            camera.position.set(
                myPlayer.position.x - Math.sin(camYaw) * d * Math.cos(camPitch),
                myPlayer.position.y - Math.sin(camPitch) * d + 2,
                myPlayer.position.z - Math.cos(camYaw) * d * Math.cos(camPitch)
            );
            camera.lookAt(myPlayer.position.x, myPlayer.position.y + 1.5, myPlayer.position.z);
            
            socket.emit('playerMovement', { x: myPlayer.position.x, y: myPlayer.position.y, z: myPlayer.position.z, rotationY: myPlayer.rotation.y });
        }
        renderer.render(scene, camera);
    }
</script>
</body>
</html>
