<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>⚔️ Survival Evolution RPG</title>
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c9a84c;
            --gold-light: #f0d080;
            --gold-dark: #7a5c1e;
            --dark: #0a0806;
            --dark2: #12100d;
            --dark3: #1c1710;
            --red: #c0392b;
            --green: #27ae60;
            --ember: #e67e22;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--dark);
            font-family: 'Crimson Text', serif;
            overflow: hidden;
            touch-action: none;
            cursor: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='20' height='20'><text y='16' font-size='16'>⚔️</text></svg>") 10 10, auto;
        }

        #particles-canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

        #auth-screen {
            position: fixed; inset: 0; z-index: 2000;
            display: flex; align-items: center; justify-content: center;
            background: radial-gradient(ellipse at 30% 40%, #2a1a05 0%, #0a0806 60%);
            overflow: hidden;
        }

        .bg-rune {
            position: absolute; font-size: 120px; opacity: 0.03;
            animation: runeFloat 8s ease-in-out infinite;
            pointer-events: none; color: var(--gold); user-select: none;
        }
        @keyframes runeFloat { 0%,100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-20px) rotate(5deg); } }

        .auth-container {
            position: relative; z-index: 10;
            width: 420px; max-width: 95vw;
        }

        .auth-title-wrap { text-align: center; margin-bottom: 8px; }
        .auth-title {
            font-family: 'Cinzel Decorative', serif;
            font-size: clamp(20px, 5vw, 32px);
            color: var(--gold-light);
            text-shadow: 0 0 30px #c9a84c88, 0 0 60px #c9a84c44;
            letter-spacing: 4px;
            animation: titleGlow 2s ease-in-out infinite alternate;
        }
        @keyframes titleGlow {
            from { text-shadow: 0 0 20px #c9a84c88; }
            to { text-shadow: 0 0 40px #f0d08099, 0 2px 4px #000; }
        }
        .auth-subtitle {
            font-family: 'Cinzel', serif;
            color: #8a6a2a; font-size: 11px; letter-spacing: 8px;
            text-transform: uppercase; margin-top: 4px;
        }

        .panel-frame {
            background: linear-gradient(160deg, #1c1508 0%, #0e0b05 60%, #1a1206 100%);
            border: 1px solid #3a2a10;
            border-radius: 4px;
            padding: 32px 28px;
            position: relative;
            box-shadow: 0 0 60px #00000099, inset 0 1px 0 #3a2a10, inset 0 -1px 0 #1a0f05;
        }
        .panel-frame::before {
            content: '';
            position: absolute; inset: 6px;
            border: 1px solid #2a1e08;
            border-radius: 2px;
            pointer-events: none;
        }

        .corner { position: absolute; width: 20px; height: 20px; color: var(--gold-dark); font-size: 14px; }
        .corner.tl { top: 4px; left: 4px; }
        .corner.tr { top: 4px; right: 4px; transform: scaleX(-1); }
        .corner.bl { bottom: 4px; left: 4px; transform: scaleY(-1); }
        .corner.br { bottom: 4px; right: 4px; transform: scale(-1); }

        .auth-tabs {
            display: flex; margin-bottom: 24px;
            border-bottom: 1px solid #2a1e08;
        }
        .auth-tab {
            flex: 1; padding: 10px; text-align: center;
            font-family: 'Cinzel', serif; font-size: 12px; letter-spacing: 2px;
            color: #5a4820; cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.3s; text-transform: uppercase;
        }
        .auth-tab.active { color: var(--gold-light); border-bottom-color: var(--gold); }
        .auth-tab:hover { color: var(--gold); }

        .form-panel { display: none; }
        .form-panel.active { display: block; }

        .field-wrap { margin-bottom: 14px; position: relative; }
        .field-label {
            display: block; font-family: 'Cinzel', serif;
            font-size: 10px; letter-spacing: 3px;
            color: var(--gold-dark); margin-bottom: 6px;
            text-transform: uppercase;
        }
        .field-input {
            width: 100%; padding: 12px 16px;
            background: rgba(0,0,0,0.5);
            border: 1px solid #2a1e08;
            border-radius: 2px;
            color: #e8d8a0;
            font-family: 'Crimson Text', serif;
            font-size: 15px;
            outline: none;
            transition: all 0.3s;
            box-shadow: inset 0 2px 8px #00000066;
        }
        .field-input:focus {
            border-color: var(--gold-dark);
            box-shadow: inset 0 2px 8px #00000066, 0 0 12px #c9a84c22;
        }
        .field-input::placeholder { color: #3a2a10; }
        .field-input.error { border-color: #c0392b88; box-shadow: 0 0 8px #c0392b44; }
        .field-input.success { border-color: #27ae6088; }

        .captcha-box {
            background: #0a0806;
            border: 1px solid #2a1e08;
            border-radius: 2px;
            padding: 14px 16px;
            display: flex; align-items: center; gap: 12px;
            margin-bottom: 14px;
        }
        .captcha-img {
            background: linear-gradient(135deg, #1a1206, #0e0b05);
            border: 1px solid #3a2a10;
            border-radius: 2px;
            padding: 8px 16px;
            font-family: 'Cinzel Decorative', serif;
            font-size: 18px; letter-spacing: 6px;
            color: var(--gold-light);
            text-shadow: 2px 2px 4px #000;
            user-select: none;
            position: relative; overflow: hidden;
            min-width: 120px; text-align: center;
        }
        .captcha-img::after {
            content: '';
            position: absolute; inset: 0;
            background: repeating-linear-gradient(45deg, transparent, transparent 2px, rgba(255,255,255,0.02) 2px, rgba(255,255,255,0.02) 4px);
        }
        .captcha-line {
            position: absolute;
            width: 100%; height: 1px;
            background: #c9a84c44;
            transform: rotate(-8deg);
            top: 50%;
        }
        .captcha-refresh {
            background: none; border: 1px solid #2a1e08;
            color: var(--gold-dark); cursor: pointer;
            padding: 6px 10px; border-radius: 2px;
            font-size: 16px; transition: all 0.2s;
        }
        .captcha-refresh:hover { border-color: var(--gold-dark); color: var(--gold); }

        .msg-box {
            padding: 10px 14px; border-radius: 2px;
            font-size: 13px; margin-bottom: 14px;
            display: none; align-items: center; gap: 8px;
            font-family: 'Cinzel', serif; letter-spacing: 1px;
        }
        .msg-box.error { background: #c0392b22; border: 1px solid #c0392b88; color: #e74c3c; display: flex; }
        .msg-box.success { background: #27ae6022; border: 1px solid #27ae6088; color: #2ecc71; display: flex; }

        .btn-enter {
            width: 100%; padding: 14px;
            background: linear-gradient(180deg, #3a2a0a 0%, #1a1005 50%, #2a1e08 100%);
            border: 1px solid var(--gold-dark);
            color: var(--gold-light);
            font-family: 'Cinzel', serif;
            font-size: 14px; letter-spacing: 4px;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 2px;
            transition: all 0.3s;
            position: relative; overflow: hidden;
            box-shadow: 0 4px 20px #00000088;
        }
        .btn-enter::before {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(180deg, transparent 0%, rgba(201,168,76,0.1) 100%);
            opacity: 0; transition: opacity 0.3s;
        }
        .btn-enter:hover::before { opacity: 1; }
        .btn-enter:hover { border-color: var(--gold); color: #fff; box-shadow: 0 4px 30px #c9a84c44; }
        .btn-enter:active { transform: translateY(1px); }

        #loading-overlay {
            position: fixed; inset: 0; z-index: 3000;
            background: #0a0806;
            display: none; flex-direction: column;
            align-items: center; justify-content: center;
        }
        .loading-title {
            font-family: 'Cinzel Decorative', serif;
            font-size: 24px; color: var(--gold-light);
            margin-bottom: 30px;
            text-shadow: 0 0 30px var(--gold);
        }
        .loading-bar-wrap {
            width: 300px; height: 4px;
            background: #1a1206;
            border: 1px solid #3a2a10;
            border-radius: 2px; overflow: hidden;
        }
        .loading-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--gold-dark), var(--gold-light));
            width: 0%; transition: width 0.3s;
            box-shadow: 0 0 8px var(--gold);
        }
        .loading-text {
            font-family: 'Cinzel', serif;
            color: #5a4820; font-size: 11px;
            letter-spacing: 4px; margin-top: 12px;
        }

        #game-ui { display: none; }

        #ui-overlay {
            position: fixed; top: 0; left: 0; right: 0;
            z-index: 1000; pointer-events: none;
            padding: 16px;
            background: linear-gradient(180deg, rgba(0,0,0,0.7) 0%, transparent 100%);
        }
        .player-hud { display: flex; align-items: center; gap: 12px; }
        .avatar-icon {
            width: 44px; height: 44px;
            background: linear-gradient(135deg, #1c1508, #2a1e08);
            border: 2px solid var(--gold-dark);
            border-radius: 4px;
            display: flex; align-items: center; justify-content: center;
            font-size: 22px;
        }
        .player-info { flex: 1; }
        #player-name-display {
            font-family: 'Cinzel', serif;
            color: var(--gold-light); font-size: 13px;
            letter-spacing: 2px;
        }
        .hp-bar-wrap { display: flex; align-items: center; gap: 6px; margin-top: 4px; }
        .hp-icon { font-size: 12px; }
        #hp-bar-ui {
            width: 150px; height: 8px;
            background: rgba(0,0,0,0.6);
            border: 1px solid #3a1010;
            border-radius: 2px; overflow: hidden;
        }
        #hp-fill {
            width: 100%; height: 100%;
            background: linear-gradient(90deg, #c0392b, #e74c3c);
            transition: 0.3s;
            box-shadow: 0 0 6px #e74c3c88;
        }
        .hp-text { font-family: 'Cinzel', serif; font-size: 10px; color: #c0392b; }
        .inv-bar { display: flex; gap: 8px; margin-top: 8px; }
        .inv-item {
            background: rgba(0,0,0,0.6);
            border: 1px solid #2a1e08;
            border-radius: 3px;
            padding: 4px 10px;
            font-family: 'Cinzel', serif;
            font-size: 11px; color: #c9a84c;
            letter-spacing: 1px;
        }

        #craft-toggle {
            position: fixed; top: 80px; right: 16px;
            width: 48px; height: 48px;
            background: linear-gradient(135deg, #1c1508, #0e0b05);
            border: 2px solid var(--gold-dark);
            border-radius: 6px;
            color: var(--gold); font-size: 22px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 1600;
            box-shadow: 0 4px 12px #00000088;
            transition: all 0.2s;
        }
        #craft-toggle:hover { border-color: var(--gold); box-shadow: 0 0 16px var(--gold-dark); }

        #craft-panel {
            position: fixed; top: 60px; right: -280px;
            width: 260px;
            background: linear-gradient(160deg, #1c1508, #0e0b05);
            border: 1px solid #3a2a10;
            border-right: none;
            border-radius: 8px 0 0 8px;
            padding: 20px 16px;
            transition: right 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 1500; color: white;
        }
        #craft-panel.open { right: 0; }
        .craft-title {
            font-family: 'Cinzel', serif;
            color: var(--gold-light); font-size: 13px;
            letter-spacing: 4px; text-transform: uppercase;
            margin-bottom: 16px; padding-bottom: 10px;
            border-bottom: 1px solid #2a1e08;
        }
        .craft-option {
            background: rgba(0,0,0,0.4);
            border: 1px solid #2a1e08;
            border-radius: 4px;
            padding: 12px 14px; margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex; align-items: center; gap: 10px;
        }
        .craft-option:hover { border-color: var(--gold-dark); background: rgba(201,168,76,0.1); }
        .craft-option .icon { font-size: 22px; }
        .craft-option .info { flex: 1; }
        .craft-option .name { font-family: 'Cinzel', serif; font-size: 12px; color: var(--gold-light); }
        .craft-option .cost { font-size: 11px; color: #5a4820; margin-top: 2px; }

        #mobile-controls { position: fixed; inset: 0; pointer-events: none; z-index: 900; }

        #joystick-container {
            position: absolute; bottom: 28px; left: 28px;
            width: 120px; height: 120px;
            background: radial-gradient(circle, rgba(201,168,76,0.1) 0%, rgba(0,0,0,0.3) 100%);
            border: 2px solid rgba(201,168,76,0.3);
            border-radius: 50%;
            pointer-events: auto;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        #joystick-inner {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%,-50%);
            width: 40px; height: 40px;
            border: 1px solid rgba(201,168,76,0.4);
            border-radius: 50%;
        }
        #joystick-knob {
            position: absolute; width: 44px; height: 44px;
            background: radial-gradient(circle, rgba(201,168,76,0.6) 0%, rgba(100,70,20,0.8) 100%);
            border: 2px solid rgba(201,168,76,0.5);
            border-radius: 50%;
            top: 38px; left: 38px;
            pointer-events: none;
            box-shadow: 0 2px 8px #00000088;
            transition: transform 0.05s;
        }

        #jump-btn {
            position: absolute; bottom: 28px; right: 140px;
            width: 64px; height: 64px;
            background: rgba(0,0,0,0.6);
            border: 2px solid rgba(201,168,76,0.4);
            border-radius: 50%;
            color: var(--gold); font-family: 'Cinzel', serif;
            font-size: 10px; letter-spacing: 1px;
            pointer-events: auto;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 2px;
        }
        #jump-btn .j-icon { font-size: 20px; }

        #attack-btn {
            position: absolute; bottom: 28px; right: 28px;
            width: 100px; height: 100px;
            background: radial-gradient(circle, rgba(192,57,43,0.5) 0%, rgba(100,20,10,0.7) 100%);
            border: 3px solid rgba(192,57,43,0.6);
            border-radius: 50%;
            font-size: 32px;
            pointer-events: auto;
            box-shadow: 0 0 20px rgba(192,57,43,0.3);
            transition: all 0.1s;
        }
        #attack-btn:active { transform: scale(0.92); box-shadow: 0 0 30px rgba(192,57,43,0.6); }

        #minimap {
            position: fixed; top: 16px; right: 16px;
            width: 100px; height: 100px;
            background: rgba(0,0,0,0.7);
            border: 1px solid #3a2a10;
            border-radius: 4px;
            overflow: hidden; z-index: 1000;
        }
        #minimap-canvas { width: 100%; height: 100%; }

        #damage-flash {
            position: fixed; inset: 0; z-index: 999;
            background: rgba(192,57,43,0); pointer-events: none;
            transition: background 0.1s;
        }
        #damage-flash.flash { background: rgba(192,57,43,0.25); }

        #killfeed {
            position: fixed; top: 130px; right: 16px;
            z-index: 1000; pointer-events: none;
            width: 220px;
        }
        .kill-entry {
            background: rgba(0,0,0,0.7);
            border-left: 2px solid var(--gold-dark);
            padding: 4px 10px;
            font-family: 'Cinzel', serif; font-size: 10px;
            color: #c9a84c; letter-spacing: 1px;
            margin-bottom: 4px;
            animation: killFade 4s forwards;
        }
        @keyframes killFade { 0% { opacity:1; } 80% { opacity:1; } 100% { opacity:0; } }

        #notification {
            position: fixed; top: 80px; left: 50%;
            transform: translateX(-50%);
            z-index: 1500;
            font-family: 'Cinzel', serif;
            font-size: 13px; letter-spacing: 3px;
            color: var(--gold-light);
            background: rgba(0,0,0,0.85);
            border: 1px solid var(--gold-dark);
            padding: 10px 24px;
            border-radius: 4px;
            opacity: 0; transition: opacity 0.3s;
            pointer-events: none;
        }
        #notification.show { opacity: 1; }

        #online-count {
            position: fixed; bottom: 8px; left: 50%;
            transform: translateX(-50%);
            font-family: 'Cinzel', serif; font-size: 10px;
            color: rgba(201,168,76,0.4); letter-spacing: 3px;
            z-index: 1000; pointer-events: none;
        }

        @media (max-width: 480px) {
            .auth-container { width: 95vw; }
            .panel-frame { padding: 24px 16px; }
            .auth-title { font-size: 18px; }
        }
    </style>
</head>
<body>

<canvas id="particles-canvas"></canvas>

<div id="loading-overlay">
    <div class="loading-title">⚔️ SURVIVAL EVOLUTION</div>
    <div class="loading-bar-wrap"><div class="loading-bar-fill" id="loading-fill"></div></div>
    <div class="loading-text" id="loading-text">DÜNYA YÜKLENİYOR...</div>
</div>

<div id="auth-screen">
    <div class="bg-rune" style="top:10%; left:5%; animation-delay:0s;">⚔</div>
    <div class="bg-rune" style="top:60%; right:8%; animation-delay:2s; font-size:80px;">🛡</div>
    <div class="bg-rune" style="bottom:15%; left:15%; animation-delay:4s; font-size:60px;">⛏</div>
    <div class="bg-rune" style="top:30%; right:20%; animation-delay:1s; font-size:50px;">🗡</div>

    <div class="auth-container">
        <div class="auth-title-wrap">
            <div class="auth-title">⚔️ SURVIVAL<br>EVOLUTION</div>
            <div class="auth-subtitle">Çok Oyunculu Hayatta Kalma RPG</div>
        </div>
        <br>
        <div class="panel-frame">
            <div class="corner tl">◆</div>
            <div class="corner tr">◆</div>
            <div class="corner bl">◆</div>
            <div class="corner br">◆</div>

            <div class="auth-tabs">
                <div class="auth-tab active" onclick="switchTab('login')">⚔ Giriş Yap</div>
                <div class="auth-tab" onclick="switchTab('register')">📜 Kayıt Ol</div>
            </div>

            <div class="form-panel active" id="panel-login">
                <div id="msg-login" class="msg-box"></div>
                <div class="field-wrap">
                    <label class="field-label">⚔ Kahraman Adı</label>
                    <input type="text" id="login-user" class="field-input" placeholder="Kullanıcı adınız..." autocomplete="username">
                </div>
                <div class="field-wrap">
                    <label class="field-label">🔒 Şifre</label>
                    <input type="password" id="login-pass" class="field-input" placeholder="••••••••" autocomplete="current-password">
                </div>
                <button class="btn-enter" onclick="attemptLogin()">⚔ DÜNYAYA GİR</button>
            </div>

            <div class="form-panel" id="panel-register">
                <div id="msg-register" class="msg-box"></div>
                <div class="field-wrap">
                    <label class="field-label">⚔ Kahraman Adı</label>
                    <input type="text" id="reg-user" class="field-input" placeholder="3-16 karakter..." maxlength="16" oninput="validateRegUser(this)">
                </div>
                <div class="field-wrap">
                    <label class="field-label">🔒 Şifre</label>
                    <input type="password" id="reg-pass" class="field-input" placeholder="En az 6 karakter..." oninput="validateRegPass(this)">
                </div>
                <div class="field-wrap">
                    <label class="field-label">🔒 Şifre Tekrarı</label>
                    <input type="password" id="reg-pass2" class="field-input" placeholder="Şifreyi tekrar girin..." oninput="validateRegPass2(this)">
                </div>
                <div class="captcha-box">
                    <div class="captcha-img" id="captcha-display">
                        <div class="captcha-line"></div>
                        <span id="captcha-text">A7B3K</span>
                    </div>
                    <button class="captcha-refresh" onclick="refreshCaptcha()" title="Yenile">↺</button>
                    <input type="text" id="reg-captcha" class="field-input" placeholder="Kodu girin" style="margin-bottom:0; flex:1; padding:8px 12px; font-size:13px;">
                </div>
                <button class="btn-enter" onclick="attemptRegister()">📜 KAHRAMANI OLUŞTUR</button>
            </div>
        </div>
    </div>
</div>

<div id="game-ui">
    <div id="ui-overlay">
        <div class="player-hud">
            <div class="avatar-icon">🧙</div>
            <div class="player-info">
                <div id="player-name-display">KAHRAMAN</div>
                <div class="hp-bar-wrap">
                    <span class="hp-icon">❤️</span>
                    <div id="hp-bar-ui"><div id="hp-fill"></div></div>
                    <span class="hp-text" id="hp-text">100</span>
                </div>
            </div>
        </div>
        <div class="inv-bar">
            <div class="inv-item">🪵 <span id="inv-wood">0</span></div>
            <div class="inv-item">🪨 <span id="inv-stone">0</span></div>
            <div class="inv-item">🗡 <span id="inv-sword">0</span></div>
            <div class="inv-item">🪓 <span id="inv-axe">0</span></div>
            <div class="inv-item">⛏ <span id="inv-pick">0</span></div>
        </div>
    </div>

    <div id="minimap"><canvas id="minimap-canvas" width="100" height="100"></canvas></div>

    <div id="craft-toggle" onclick="toggleCraft()">🔨</div>
    <div id="craft-panel">
        <div class="craft-title">⚒ Üretim Masası</div>
        <div class="craft-option" onclick="doCraft('axe')">
            <span class="icon">🪓</span>
            <div class="info"><div class="name">Balta</div><div class="cost">🪵 3 Odun gerekir</div></div>
        </div>
        <div class="craft-option" onclick="doCraft('pickaxe')">
            <span class="icon">⛏️</span>
            <div class="info"><div class="name">Kazma</div><div class="cost">🪨 3 Taş gerekir</div></div>
        </div>
        <div class="craft-option" onclick="doCraft('sword')">
            <span class="icon">⚔️</span>

<script>
(function() {
    const canvas = document.getElementById('particles-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const particles = Array.from({length: 60}, () => ({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        size: Math.random() * 1.5 + 0.5,
        vx: (Math.random() - 0.5) * 0.3,
        vy: -Math.random() * 0.5 - 0.2,
        alpha: Math.random() * 0.6 + 0.1,
        color: Math.random() > 0.5 ? '#c9a84c' : '#e67e22'
    }));
    function tick() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => {
            p.x += p.vx; p.y += p.vy;
            if(p.y < 0) { p.y = canvas.height; p.x = Math.random() * canvas.width; }
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
            ctx.fillStyle = p.color + Math.floor(p.alpha * 255).toString(16).padStart(2,'0');
            ctx.fill();
        });
        requestAnimationFrame(tick);
    }
    tick();
    window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
})();

let currentCaptcha = '';
const USERS_KEY = 'rpg_users_db';
const SESSION_KEY = 'rpg_session';

function getUsers() {
    try { return JSON.parse(localStorage.getItem(USERS_KEY) || '{}'); } catch { return {}; }
}
function saveUsers(u) { localStorage.setItem(USERS_KEY, JSON.stringify(u)); }

function generateCaptcha() {
    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
    return Array.from({length:5}, () => chars[Math.floor(Math.random()*chars.length)]).join('');
}

function refreshCaptcha() {
    currentCaptcha = generateCaptcha();
    document.getElementById('captcha-text').textContent = currentCaptcha;
}
refreshCaptcha();

function switchTab(tab) {
    document.querySelectorAll('.auth-tab').forEach((t,i) => t.classList.toggle('active', (i===0&&tab==='login')||(i===1&&tab==='register')));
    document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));
    document.getElementById('panel-' + tab).classList.add('active');
    clearMsg();
}

function clearMsg() {
    document.querySelectorAll('.msg-box').forEach(m => { m.className='msg-box'; m.style.display='none'; });
    document.querySelectorAll('.field-input').forEach(i => i.classList.remove('error','success'));
}

function showMsg(id, type, txt) {
    const el = document.getElementById(id);
    el.className = 'msg-box ' + type;
    el.style.display = 'flex';
    el.innerHTML = (type==='error'?'⚠ ':'✓ ') + txt;
}

function validateRegUser(el) {
    const v = el.value.trim();
    el.classList.toggle('error', v.length > 0 && v.length < 3);
    el.classList.toggle('success', v.length >= 3);
}
function validateRegPass(el) {
    const v = el.value;
    el.classList.toggle('error', v.length > 0 && v.length < 6);
    el.classList.toggle('success', v.length >= 6);
}
function validateRegPass2(el) {
    const v1 = document.getElementById('reg-pass').value;
    el.classList.toggle('error', el.value !== v1 && el.value.length > 0);
    el.classList.toggle('success', el.value === v1 && el.value.length > 0);
}

function attemptRegister() {
    clearMsg();
    const u = document.getElementById('reg-user').value.trim();
    const p = document.getElementById('reg-pass').value;
    const p2 = document.getElementById('reg-pass2').value;
    const cap = document.getElementById('reg-captcha').value.toUpperCase().trim();

    if(u.length < 3) return showMsg('msg-register','error','Kullanıcı adı en az 3 karakter olmalı!');
    if(/[^a-zA-Z0-9_]/.test(u)) return showMsg('msg-register','error','Sadece harf, rakam ve alt çizgi kullanın!');
    if(p.length < 6) return showMsg('msg-register','error','Şifre en az 6 karakter olmalı!');
    if(p !== p2) return showMsg('msg-register','error','Şifreler eşleşmiyor!');
    if(cap !== currentCaptcha) { refreshCaptcha(); return showMsg('msg-register','error','Güvenlik kodu hatalı! Yenisi üretildi.'); }

    const users = getUsers();
    if(users[u.toLowerCase()]) return showMsg('msg-register','error','Bu kullanıcı adı zaten kayıtlı!');

    users[u.toLowerCase()] = { username: u, password: btoa(p), color: Math.floor(Math.random()*0xffffff) };
    saveUsers(users);
    showMsg('msg-register','success','Kahraman oluşturuldu! Giriş yapılıyor...');
    setTimeout(() => { switchTab('login'); document.getElementById('login-user').value = u; }, 1500);
}

function attemptLogin() {
    clearMsg();
    const u = document.getElementById('login-user').value.trim();
    const p = document.getElementById('login-pass').value;

    if(!u || !p) return showMsg('msg-login','error','Tüm alanları doldurun!');

    const users = getUsers();
    const user = users[u.toLowerCase()];

    if(!user || user.password !== btoa(p)) {
        document.getElementById('login-user').classList.add('error');
        document.getElementById('login-pass').classList.add('error');
        return showMsg('msg-login','error','Kullanıcı adı veya şifre hatalı!');
    }

    localStorage.setItem(SESSION_KEY, JSON.stringify({ username: user.username, color: user.color }));
    startGame(user);
}

window.addEventListener('load', () => {
    try {
        const s = JSON.parse(localStorage.getItem(SESSION_KEY));
        if(s) { document.getElementById('login-user').value = s.username; }
    } catch {}
});

async function startGame(user) {
    try {
        if(document.documentElement.requestFullscreen) await document.documentElement.requestFullscreen();
        if(screen.orientation && screen.orientation.lock) await screen.orientation.lock('landscape').catch(()=>{});
    } catch(e) {}

    const lo = document.getElementById('loading-overlay');
    lo.style.display = 'flex';
    document.getElementById('auth-screen').style.display = 'none';

    const steps = ['ARAZI ÜRETİLİYOR...', 'KAYNAKLAR YERLEŞTİRİLİYOR...', 'SUNUCUYA BAĞLANILIYOR...', 'KAHRAMAN OLUŞTURULUYOR...', 'GİRİLİYOR...'];
    const fill = document.getElementById('loading-fill');
    const txt = document.getElementById('loading-text');
    for(let i=0; i<steps.length; i++) {
        txt.textContent = steps[i];
        fill.style.width = ((i+1)/steps.length*100) + '%';
        await new Promise(r => setTimeout(r, 400));
    }

    lo.style.display = 'none';
    document.getElementById('game-ui').style.display = 'block';
    document.getElementById('player-name-display').textContent = user.username.toUpperCase();
    initGame(user);
}
</script>

function beep(freq=440, dur=0.1, type='sine') {
    try {
        const ctx = new (window.AudioContext||window.webkitAudioContext)();
        const o = ctx.createOscillator(); const g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.frequency.value = freq; o.type = type;
        g.gain.setValueAtTime(0.15, ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+dur);
        o.start(); o.stop(ctx.currentTime+dur);
    } catch(e) {}
}

function buildTerrain() {
    const grassGeo = new THREE.PlaneGeometry(300, 300, 60, 60);
    const pos = grassGeo.attributes.position;
    for(let i=0; i<pos.count; i++) {
        const x = pos.getX(i), z = pos.getZ(i);
        pos.setY(i, (Math.sin(x*0.05)*Math.cos(z*0.04)*2 + Math.sin(x*0.1+z*0.1)*0.5));
    }
    grassGeo.computeVertexNormals();
    const grass = new THREE.Mesh(grassGeo, new THREE.MeshStandardMaterial({ color: 0x4a8c3f, roughness: 0.9 }));
    grass.rotation.x = -Math.PI/2;
    grass.receiveShadow = true;
    scene.add(grass);

    for(let i=0; i<5; i++) {
        const path = new THREE.Mesh(
            new THREE.PlaneGeometry(2, 20+Math.random()*30),
            new THREE.MeshStandardMaterial({ color: 0x8b6914, roughness: 1 })
        );

        path.rotation.z = Math.random()*Math.PI;
        path.position.set(Math.random()*80-40, 0.01, Math.random()*80-40);
        scene.add(path);
    }

    const water = new THREE.Mesh(
        new THREE.PlaneGeometry(30, 20),
        new THREE.MeshStandardMaterial({ color: 0x1a6999, transparent: true, opacity: 0.8, metalness: 0.1, roughness: 0.1 })
    );
    water.rotation.x = -Math.PI/2;
    water.position.set(60, 0.05, 30);
    scene.add(water);

    for(let i=0; i<8; i++) {
        const h = 15 + Math.random()*25;
        const mt = new THREE.Mesh(
            new THREE.ConeGeometry(8+Math.random()*6, h, 8),
            new THREE.MeshStandardMaterial({ color: i%2===0?0x6b8c5a:0x5a6b52, roughness: 1 })
        );
        const angle = (i/8)*Math.PI*2;
        mt.position.set(Math.cos(angle)*110, h/2-2, Math.sin(angle)*110);
        scene.add(mt);
        const snow = new THREE.Mesh(
            new THREE.ConeGeometry(3, h*0.3, 8),
            new THREE.MeshStandardMaterial({ color: 0xf0f0f0 })
        );
        snow.position.set(0, h*0.35, 0);
        mt.add(snow);
    }

    for(let i=0; i<12; i++) {
        const cloud = new THREE.Group();
        const mat = new THREE.MeshStandardMaterial({ color: 0xf0f0f0, transparent: true, opacity: 0.9 });
        [0,0.8,-0.8].forEach(ox => {
            const s = new THREE.Mesh(new THREE.SphereGeometry(1.5+Math.random(), 8, 6), mat);
            s.position.set(ox*2, Math.random()*0.5, 0);
            cloud.add(s);
        });
        cloud.position.set(Math.random()*200-100, 25+Math.random()*15, Math.random()*200-100);
        cloud.scale.setScalar(2+Math.random()*3);
        cloud.userData.speed = (Math.random()-0.5)*0.01;
        scene.add(cloud);
        worldObjects.push({ type: 'cloud', mesh: cloud, position: cloud.position });
    }
}

function buildEnvironment() {

function spawnResource(x, z) {
    const isTree = Math.random() > 0.4;
    const group = new THREE.Group();

    if(isTree) {
        const h = 2.5 + Math.random() * 2;
        const trunk = new THREE.Mesh(
            new THREE.CylinderGeometry(0.18, 0.25, h, 8),
            new THREE.MeshStandardMaterial({ color: 0x5d3a1a, roughness: 1 })
        );
        trunk.position.y = h/2; trunk.castShadow = true;
        [0, 0.7, 1.3].forEach((yo, i) => {
            const leaves = new THREE.Mesh(
                new THREE.ConeGeometry(1.4-i*0.3, 1.2, 8),
                new THREE.MeshStandardMaterial({ color: i===0?0x2d6a2d:0x3a8c3a, roughness: 1 })
            );
            leaves.position.y = h*0.55 + yo;
            leaves.castShadow = true;
            group.add(leaves);
        });
        group.add(trunk);
        group.userData = { type: 'wood', hp: 10, maxHp: 10 };
    } else {
        const r = 0.5 + Math.random()*0.4;
        const rock = new THREE.Mesh(
            new THREE.DodecahedronGeometry(r, 1),
            new THREE.MeshStandardMaterial({ color: 0x7f7f7f, roughness: 0.9, metalness: 0.1 })
        );
        rock.position.y = r*0.5; rock.castShadow = true;
        for(let i=0; i<2; i++) {
            const sr = new THREE.Mesh(
                new THREE.DodecahedronGeometry(r*0.4, 1),
                new THREE.MeshStandardMaterial({ color: 0x8a8a8a, roughness: 1 })
            );
            sr.position.set(Math.random()*0.8-0.4, r*0.2, Math.random()*0.8-0.4);
            group.add(sr);
        }
        group.add(rock);
        group.userData = { type: 'stone', hp: 10, maxHp: 10 };
    }

    group.position.set(x, 0, z);
    scene.add(group);
    worldObjects.push(group);
}

function updateEquippedTool() {
    if(!myPlayer) return;
    const slot = myPlayer.userData.toolSlot;
    while(slot.children.length > 0) slot.remove(slot.children[0]);
    let m;
    if(inv.sword > 0) {
        const sg = new THREE.Group();
        const blade = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.7, 0.04), new THREE.MeshStandardMaterial({ color: 0xc0c0c0, metalness: 0.9, roughness: 0.1 }));
        blade.position.y = 0.4;
        const guard = new THREE.Mesh(new THREE.BoxGeometry(0.22, 0.06, 0.06), new THREE.MeshStandardMaterial({ color: 0x8b6914, metalness: 0.7 }));
        guard.position.y = 0.05;
        const grip = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 0.25, 8), new THREE.MeshStandardMaterial({ color: 0x5d3a1a }));
        grip.position.y = -0.1;
        sg.add(blade, guard, grip); m = sg;
    } else if(inv.axe > 0) {
        const ag = new THREE.Group();
        const handle = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 0.7, 8), new THREE.MeshStandardMaterial({ color: 0x5d3a1a }));
        handle.position.y = 0.35;
        const head = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.22, 0.08), new THREE.MeshStandardMaterial({ color: 0x7f8c8d, metalness: 0.7 }));
        head.position.set(0.12, 0.65, 0);
        ag.add(handle, head); m = ag;
    } else if(inv.pickaxe > 0) {
        const pg = new THREE.Group();
        const handle = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 0.7, 8), new THREE.MeshStandardMaterial({ color: 0x5d3a1a }));
        handle.position.y = 0.35;
        const head = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.1, 0.08), new THREE.MeshStandardMaterial({ color: 0x95a5a6, metalness: 0.7 }));
        head.position.set(0, 0.68, 0); head.rotation.z = 0.3;
        pg.add(handle, head); m = pg;
    }
    if(m) slot.add(m);
}

function performAttack() {
    if(!myPlayer) return;
    beep(300, 0.08, 'sawtooth');
    const arm = myPlayer.userData.rightArmGroup;
    arm.rotation.x = -Math.PI/1.3;
    setTimeout(() => arm.rotation.x = 0, 180);
    const reach = 4;
    for(let i = worldObjects.length-1; i>=0; i--) {
        const obj = worldObjects[i];
        if(!obj.userData || !obj.userData.type || obj.userData.type === 'cloud' || obj.userData.type === 'fire') continue;
        const dist = myPlayer.position.distanceTo(obj.position);
        if(dist < reach) {
            let dmg = 2;
            if(obj.userData.type === 'wood' && inv.axe > 0) dmg = 10;
            if(obj.userData.type === 'stone' && inv.pickaxe > 0) dmg = 10;
            if(inv.sword > 0) dmg = Math.max(dmg, 5);
            obj.userData.hp -= dmg;
            obj.scale.setScalar(Math.max(0.4, obj.userData.hp / obj.userData.maxHp));
            if(obj.userData.hp <= 0) {
                beep(200, 0.2, 'square');
                inv[obj.userData.type]++;
                updateUI();
                scene.remove(obj);
                worldObjects.splice(i, 1);
                showNotification(obj.userData.type === 'wood' ? '🪵 Odun toplandı!' : '🪨 Taş toplandı!');
            } else {
                beep(440, 0.05, 'sine');
            }
            break;
        }
    }
}

window.doCraft = function(t) {
    let ok = false;
    if(t==='axe' && inv.wood>=3) { inv.wood-=3; inv.axe=1; ok=true; }
    if(t==='pickaxe' && inv.stone>=3) { inv.stone-=3; inv.pickaxe=1; ok=true; }
    if(t==='sword' && inv.wood>=2 && inv.stone>=2) { inv.wood-=2; inv.stone-=2; inv.sword=1; ok=true; }
    if(ok) { beep(880, 0.2, 'sine'); updateUI(); updateEquippedTool(); toggleCraft(); showNotification('⚒ ' + t + ' üretildi!'); }
    else showNotification('❌ Yeterli kaynak yok!');
};

window.toggleCraft = function() { document.getElementById('craft-panel').classList.toggle('open'); };
window.jumpAction = function() { if(isGrounded) { velocityY = 0.28; isGrounded = false; beep(600, 0.05); } };

function updateUI() {
    document.getElementById('inv-wood').textContent = inv.wood;
    document.getElementById('inv-stone').textContent = inv.stone;
    document.getElementById('inv-sword').textContent = inv.sword;
    document.getElementById('inv-axe').textContent = inv.axe;
    document.getElementById('inv-pick').textContent = inv.pickaxe;
    document.getElementById('hp-fill').style.width = myHealth + '%';
    document.getElementById('hp-text').textContent = myHealth;
}

function showNotification(msg) {
    const n = document.getElementById('notification');
    n.textContent = msg;
    n.classList.add('show');
    clearTimeout(n._t);
    n._t = setTimeout(() => n.classList.remove('show'), 2500);
}

function setupControls() {
    const jsBase = document.getElementById('joystick-container');
    const knob = document.getElementById('joystick-knob');
    const R = 38;

    window.addEventListener('touchstart', e => {
        for(const t of e.changedTouches) {
            const r = jsBase.getBoundingClientRect();
            if(t.clientX > r.left && t.clientX < r.right && t.clientY > r.top && t.clientY < r.bottom) {
                joystickData.active = true; joystickData.identifier = t.identifier;
            } else if(t.clientX > window.innerWidth * 0.3) {
                lookData.active = true; lookData.identifier = t.identifier;
                lookData.lastX = t.clientX; lookData.lastY = t.clientY;
            }
        }
    }, {passive: true});

    window.addEventListener('touchmove', e => {
        for(const t of e.changedTouches) {
            if(t.identifier === joystickData.identifier) {
                const r = jsBase.getBoundingClientRect();
                const cx = r.left+60, cy = r.top+60;
                const dx = t.clientX-cx, dy = t.clientY-cy;
                const dist = Math.min(Math.sqrt(dx*dx+dy*dy), R);
                const angle = Math.atan2(dy, dx);
                knob.style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`;
                joystickData.x = Math.cos(angle)*(dist/R); joystickData.y = Math.sin(angle)*(dist/R);
            }
            if(t.identifier === lookData.identifier) {
                camYaw -= (t.clientX-lookData.lastX)*0.007;
                lookData.lastX = t.clientX; lookData.lastY = t.clientY;
            }
        }
    }, {passive: true});

    window.addEventListener('touchend', e => {
        for(const t of e.changedTouches) {
            if(t.identifier === joystickData.identifier) {
                joystickData.active=false; joystickData.x=0; joystickData.y=0;
                knob.style.transform='translate(0,0)';
            }
            if(t.identifier === lookData.identifier) lookData.active=false;
        }
    }, {passive: true});

    const keys = {};
    window.addEventListener('keydown', e => keys[e.code]=true);
    window.addEventListener('keyup', e => keys[e.code]=false);
    window.addEventListener('keydown', e => {
        if(e.code==='Space') jumpAction();
        if(e.code==='KeyF') performAttack();
        if(e.code==='KeyE') toggleCraft();
    });
    window.addEventListener('mousemove', e => {
        if(document.pointerLockElement === document.body) {
            camYaw -= e.movementX * 0.003;
        }
    });
    renderer.domElement.addEventListener('click', () => {
        if(!document.pointerLockElement) renderer.domElement.requestPointerLock();
    });
    window._keys = keys;
}

let prevTime = performance.now();

function animate() {
    requestAnimationFrame(animate);
    const now = performance.now();
    const dt = Math.min((now-prevTime)/16.7, 3);
    prevTime = now;

    if(myPlayer) {
        const speed = 0.12 * dt;
        const keys = window._keys || {};
        const kx = (keys['KeyA']?-1:0)+(keys['KeyD']?1:0);
        const kz = (keys['KeyW']?-1:0)+(keys['KeyS']?1:0);
        let moved = false;

        if(kx !== 0 || kz !== 0) {
            myPlayer.position.x += (Math.sin(camYaw)*kz + Math.cos(camYaw)*kx) * speed;
            myPlayer.position.z += (Math.cos(camYaw)*kz - Math.sin(camYaw)*kx) * speed;
            myPlayer.rotation.y = camYaw + Math.atan2(kx, kz);
            moved = true;
        }
        if(joystickData.active) {
            const jx = joystickData.x, jy = joystickData.y;
            myPlayer.position.x += (Math.sin(camYaw)*-jy + Math.cos(camYaw)*-jx) * speed;
            myPlayer.position.z += (Math.cos(camYaw)*-jy - Math.sin(camYaw)*-jx) * speed;
            myPlayer.rotation.y = camYaw + Math.atan2(-jx, -jy);
            moved = true;
        }

        myPlayer.position.x = Math.max(-140, Math.min(140, myPlayer.position.x));
        myPlayer.position.z = Math.max(-140, Math.min(140, myPlayer.position.z));
        myPlayer.position.y += velocityY;
        if(myPlayer.position.y > 0) velocityY -= 0.015 * dt;
        else { myPlayer.position.y = 0; velocityY = 0; isGrounded = true; }

        const p = myPlayer.userData.phase;
        if(moved) myPlayer.userData.phase += 0.18 * dt;
        myPlayer.userData.leftLeg.rotation.x = moved ? Math.sin(p)*0.5 : 0;
        myPlayer.userData.rightLeg.rotation.x = moved ? -Math.sin(p)*0.5 : 0;

        camera.position.x = myPlayer.position.x - Math.sin(camYaw)*9;
        camera.position.z = myPlayer.position.z - Math.cos(camYaw)*9;
        camera.position.y = myPlayer.position.y + 6;
        camera.lookAt(myPlayer.position.x, myPlayer.position.y+1.2, myPlayer.position.z);
    }

    worldObjects.forEach(obj => {
        if(obj.type === 'fire' && obj.light) {
            obj.light.intensity = 1.5 + Math.sin(Date.now()*0.01)*0.5 + Math.random()*0.3;
        }
        if(obj.type === 'cloud') {
            obj.mesh.position.x += obj.mesh.userData.speed || 0.005;
            if(obj.mesh.position.x > 120) obj.mesh.position.x = -120;
        }
    });

    Object.values(fakePlayers).forEach(fp => {
        fp.mesh.position.x += (Math.random()-0.5)*0.02;
        fp.mesh.position.z += (Math.random()-0.5)*0.02;
        fp.mesh.userData.phase = (fp.mesh.userData.phase || 0) + 0.08;
        if(fp.mesh.userData.leftLeg) {
            fp.mesh.userData.leftLeg.rotation.x = Math.sin(fp.mesh.userData.phase)*0.3;
            fp.mesh.userData.rightLeg.rotation.x = -Math.sin(fp.mesh.userData.phase)*0.3;
        }
    });

    renderer.render(scene, camera);
}

function minimapLoop() {
    const canvas = document.getElementById('minimap-canvas');
    const ctx = canvas.getContext('2d');
    function draw() {
        ctx.fillStyle = '#0a1a0a';
        ctx.fillRect(0,0,100,100);
        const scale = 0.6, cx = 50, cy = 50;
        worldObjects.forEach(obj => {
            if(!obj.userData || obj.userData.type === 'cloud' || obj.userData.type === 'fire') return;
            const mx = cx + obj.position.x*scale, my = cy + obj.position.z*scale;
            if(mx<0||mx>100||my<0||my>100) return;
            ctx.fillStyle = obj.userData.type === 'wood' ? '#3a8c3a' : '#7f7f7f';
            ctx.fillRect(mx-1,my-1,2,2);
        });
        Object.values(fakePlayers).forEach(fp => {
            const mx = cx+fp.mesh.position.x*scale, my = cy+fp.mesh.position.z*scale;
            ctx.fillStyle = '#e74c3c';
            ctx.beginPath(); ctx.arc(mx,my,2,0,Math.PI*2); ctx.fill();
        });
        if(myPlayer) {
            const mx = cx+myPlayer.position.x*scale, my = cy+myPlayer.position.z*scale;
            ctx.fillStyle = '#f0d080';
            ctx.beginPath(); ctx.arc(mx,my,3,0,Math.PI*2); ctx.fill();
        }
        requestAnimationFrame(draw);
    }
    draw();
}

function fakeBotLoop() {
    setInterval(() => {
        const names = fakePlayerNames;
        const a = names[Math.floor(Math.random()*names.length)];
        const b = names[Math.floor(Math.random()*names.length)];
        if(a !== b) {
            const kf = document.getElementById('killfeed');
            const e = document.createElement('div');
            e.className = 'kill-entry';
            e.textContent = `${a} ⚔ ${b}`;
            kf.appendChild(e);
            setTimeout(() => e.remove(), 4200);
        }
    }, 8000);
}
