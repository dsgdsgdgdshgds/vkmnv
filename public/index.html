<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Survival RPG: Evolution</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87ceeb; touch-action: none; font-family: 'Segoe UI', sans-serif; }
        #login-screen { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; z-index: 2000; }
        .box { background: #222; padding: 30px; border-radius: 15px; text-align: center; color: white; border: 2px solid #444; width: 280px; }
        input { padding: 12px; width: 90%; border-radius: 5px; border: none; margin-bottom: 10px; font-size: 16px; }
        button { padding: 12px 30px; cursor: pointer; background: #2ecc71; color: white; border: none; border-radius: 5px; font-weight: bold; width: 100%; font-size: 16px; }
        
        #ui-overlay { position: fixed; top: 20px; left: 20px; color: white; pointer-events: none; z-index: 1000; text-shadow: 2px 2px 2px #000; }
        #hp-bar-ui { width: 200px; height: 15px; background: rgba(0,0,0,0.5); border: 2px solid #fff; border-radius: 10px; overflow: hidden; margin-top: 5px; }
        #hp-fill { width: 100%; height: 100%; background: #e74c3c; transition: 0.3s; }

        /* Crafting Menüsü */
        #craft-menu { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; pointer-events: auto; background: rgba(0,0,0,0.6); padding: 10px; border-radius: 15px; border: 1px solid #777; }
        .item-slot { width: 60px; height: 60px; background: #444; border: 2px solid #888; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; color: white; font-size: 10px; font-weight: bold; }
        .item-slot:hover { background: #555; border-color: #2ecc71; }
        
        /* Mobil Kontroller */
        #mobile-controls { display: none; }
        #joystick-container { position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px; background: rgba(255,255,255,0.1); border-radius: 50%; border: 1px solid rgba(255,255,255,0.3); }
        #joystick-knob { position: absolute; width: 50px; height: 50px; background: #fff; opacity: 0.5; border-radius: 50%; top: 35px; left: 35px; }
        #jump-btn { position: absolute; bottom: 150px; right: 40px; width: 70px; height: 70px; background: rgba(255,255,255,0.2); border: 2px solid #fff; border-radius: 50%; color: white; font-weight: bold; }
        #attack-btn { position: absolute; bottom: 50px; right: 40px; width: 90px; height: 90px; background: rgba(231, 76, 60, 0.6); border-radius: 50%; color: white; border: 3px solid #fff; font-size: 20px; }
        
        @media (pointer: coarse) { #mobile-controls { display: block; } }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="box">
        <h2 style="color:#2ecc71">⚔️ CRAFT & SURVIVE</h2>
        <input type="text" id="username" placeholder="Kullanıcı Adı">
        <input type="password" id="password" placeholder="Şifre">
        <button onclick="attemptLogin()">DÜNYAYA GİR</button>
    </div>
</div>

<div id="ui-overlay">
    <div id="player-name-display">Bekleniyor...</div>
    <div id="hp-bar-ui"><div id="hp-fill"></div></div>
    <div style="margin-top:10px; font-weight: bold;">🪵 <span id="inv-wood">0</span> | 🪨 <span id="inv-stone">0</span></div>
</div>

<div id="craft-menu">
    <div class="item-slot" onclick="craft('axe')">🪓<br>Balta</div>
    <div class="item-slot" onclick="craft('pickaxe')">⛏️<br>Kazma</div>
    <div class="item-slot" onclick="craft('sword')">⚔️<br>Kılıç</div>
</div>

<div id="mobile-controls">
    <div id="joystick-container"><div id="joystick-knob"></div></div>
    <button id="jump-btn" onclick="jump()">ZIPLA</button>
    <button id="attack-btn" onclick="performAttack()">🔥</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script type="module">
    import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';

    let scene, camera, renderer, socket, myPlayer, myId;
    let joystickData = { x: 0, y: 0, active: false };
    const otherPlayers = {}, worldObjects = [], keys = {};
    
    // Sesler
    const hitSound = new Audio('/sounds/hit.mp3');
    const breakSound = new Audio('/sounds/break.mp3');

    // Fizik & Envanter
    let velocityY = 0, isGrounded = true;
    let inv = { wood: 0, stone: 0, sword: 0, axe: 0, pickaxe: 0 };
    let currentTool = null; // Elimizde ne var?

    let camYaw = 0, camPitch = -Math.PI / 8;
    let isDragging = false, lastMouseX, lastMouseY;

    window.attemptLogin = () => {
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;
        if(u.length < 2) return;
        
        socket = io();
        socket.emit('login', { username: u, password: p });
        
        socket.on('loginSuccess', () => {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('player-name-display').innerText = u.toUpperCase();
            initGame();
        });

        socket.on('updateInventory', data => {
            inv = data;
            document.getElementById('inv-wood').innerText = inv.wood;
            document.getElementById('inv-stone').innerText = inv.stone;
            updateEquippedTool();
        });
    };

    function initGame() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);
        scene.fog = new THREE.Fog(0x87ceeb, 25, 120);

        camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const sun = new THREE.DirectionalLight(0xffffff, 0.9);
        sun.position.set(50, 80, 50); sun.castShadow = true;
        scene.add(sun);

        const ground = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshStandardMaterial({ color: 0x4caf50 }));
        ground.rotation.x = -Math.PI / 2; ground.receiveShadow = true;
        scene.add(ground);

        // Map Nesneleri
        for(let i=0; i<100; i++) spawnResource(Math.random()*200-100, Math.random()*200-100);

        socket.on('currentPlayers', (players) => {
            myId = socket.id;
            Object.keys(players).forEach(id => {
                if(id === myId) myPlayer = createHuman(players[id]);
                else otherPlayers[id] = createHuman(players[id]);
            });
        });

        socket.on('playerMoved', data => {
            if(data.id !== myId && otherPlayers[data.id]) {
                otherPlayers[data.id].position.set(data.x, data.y || 0, data.z);
                otherPlayers[data.id].rotation.y = data.rotationY;
            }
        });

        socket.on('playerDisconnected', id => {
            if(otherPlayers[id]) { scene.remove(otherPlayers[id]); delete otherPlayers[id]; }
        });

        setupCameraControls();
        setupJoystick();
        animate();
    }

    function createHuman(data) {
        const group = new THREE.Group();
        
        // Gövde (Pantolonlu/Tişörtlü gibi renkli kutular)
        const torso = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.7, 0.3), new THREE.MeshStandardMaterial({color: 0x3498db}));
        torso.position.y = 1.05; torso.castShadow = true; group.add(torso);
        
        const legs = new THREE.Mesh(new THREE.BoxGeometry(0.55, 0.7, 0.28), new THREE.MeshStandardMaterial({color: 0x2c3e50}));
        legs.position.y = 0.35; group.add(legs);

        const head = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.4, 0.4), new THREE.MeshStandardMaterial({color: 0xffdbac}));
        head.position.y = 1.6; group.add(head);

        // Kollar
        const rightArmGroup = new THREE.Group();
        rightArmGroup.position.set(0.4, 1.3, 0);
        const rightArm = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.6, 0.2), new THREE.MeshStandardMaterial({color: 0xffdbac}));
        rightArm.position.y = -0.25; rightArmGroup.add(rightArm);
        group.add(rightArmGroup);

        const leftArm = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.6, 0.2), new THREE.MeshStandardMaterial({color: 0xffdbac}));
        leftArm.position.set(-0.4, 1.05, 0); group.add(leftArm);

        // Elindeki Eşya Yuvası
        const toolSlot = new THREE.Group();
        toolSlot.position.set(0, -0.5, 0.1); 
        rightArm.add(toolSlot);

        group.userData = { rightArmGroup, toolSlot };
        group.position.set(data.x || 0, 0, data.z || 0);
        scene.add(group);
        return group;
    }

    function updateEquippedTool() {
        if(!myPlayer) return;
        const slot = myPlayer.userData.toolSlot;
        while(slot.children.length > 0) slot.remove(slot.children[0]);

        let toolMesh;
        if(inv.sword > 0) {
            toolMesh = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.8, 0.1), new THREE.MeshStandardMaterial({color: 0xbdc3c7}));
        } else if(inv.axe > 0) {
            toolMesh = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.3, 0.1), new THREE.MeshStandardMaterial({color: 0x7f8c8d}));
        } else if(inv.pickaxe > 0) {
            toolMesh = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.1, 0.1), new THREE.MeshStandardMaterial({color: 0x95a5a6}));
        }

        if(toolMesh) slot.add(toolMesh);
    }

    function spawnResource(x, z) {
        const isTree = Math.random() > 0.4;
        const group = new THREE.Group();
        if(isTree) {
            const t = new THREE.Mesh(new THREE.BoxGeometry(0.4, 2.5, 0.4), new THREE.MeshStandardMaterial({color:0x5d4037}));
            const l = new THREE.Mesh(new THREE.SphereGeometry(1.2, 8, 8), new THREE.MeshStandardMaterial({color:0x2e7d32}));
            l.position.y = 2; group.add(t, l);
        } else {
            const r = new THREE.Mesh(new THREE.DodecahedronGeometry(0.8), new THREE.MeshStandardMaterial({color:0x757575}));
            group.add(r);
        }
        group.position.set(x, 0.5, z);
        group.userData = { type: isTree ? 'wood' : 'stone', hp: Math.floor(Math.random()*6)+5 };
        scene.add(group); worldObjects.push(group);
    }

    window.jump = () => { if(isGrounded) { velocityY = 0.3; isGrounded = false; } };
    window.craft = (t) => socket.emit('craft', t);

    window.performAttack = () => {
        if(!myPlayer) return;
        
        // Vurma Animasyonu
        const arm = myPlayer.userData.rightArmGroup;
        arm.rotation.x = -Math.PI / 2;
        hitSound.play().catch(()=>{});

        setTimeout(() => { arm.rotation.x = 0; }, 150);

        worldObjects.forEach((obj, i) => {
            if(myPlayer.position.distanceTo(obj.position) < 4) {
                let damage = 1;
                if(obj.userData.type === 'wood' && inv.axe > 0) damage = 4;
                if(obj.userData.type === 'stone' && inv.pickaxe > 0) damage = 4;
                if(inv.sword > 0) damage += 1;

                obj.userData.hp -= damage;
                
                // Kırılma Efekti (Küçülme)
                obj.scale.multiplyScalar(0.9);

                if(obj.userData.hp <= 0) {
                    breakSound.play().catch(()=>{});
                    socket.emit('collect', obj.userData.type);
                    scene.remove(obj); worldObjects.splice(i, 1);
                }
            }
        });
    };

    function setupCameraControls() {
        // PC & Mobil Kamera
        const handleMove = (dx, dy) => {
            camYaw -= dx * 0.005;
            camPitch = Math.max(-Math.PI/2.1, Math.min(-0.1, camPitch - dy * 0.005));
        };

        window.addEventListener('mousemove', e => { if(isDragging || e.buttons === 2) handleMove(e.movementX, e.movementY); });
        window.addEventListener('mousedown', e => { if(e.button === 2) isDragging = true; });
        window.addEventListener('mouseup', () => isDragging = false);

        window.addEventListener('touchmove', e => {
            const t = e.touches[0];
            if(t.clientX > window.innerWidth/2) { // Sağ taraf kameradır
                handleMove(t.clientX - (lastMouseX || t.clientX), t.clientY - (lastMouseY || t.clientY));
            }
            lastMouseX = t.clientX; lastMouseY = t.clientY;
        });
        window.addEventListener('contextmenu', e => e.preventDefault());
    }

    function setupJoystick() {
        const container = document.getElementById('joystick-container');
        const knob = document.getElementById('joystick-knob');
        container.addEventListener('touchstart', e => { joystickData.active = true; e.stopPropagation(); });
        window.addEventListener('touchend', () => { 
            joystickData.active = false; 
            knob.style.transform = `translate(0,0)`;
            joystickData.x = 0; joystickData.y = 0;
        });
        window.addEventListener('touchmove', e => {
            if(!joystickData.active) return;
            const t = e.touches[0];
            const dx = t.clientX - (container.offsetLeft + 60), dy = t.clientY - (container.offsetTop + 60);
            const dist = Math.min(Math.sqrt(dx*dx+dy*dy), 50), angle = Math.atan2(dy, dx);
            knob.style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`;
            joystickData.x = Math.cos(angle) * (dist/50); joystickData.y = Math.sin(angle) * (dist/50);
        });
    }

    window.onkeydown = e => { 
        keys[e.code] = true; 
        if(e.code === 'Space') jump(); 
    };
    window.onkeyup = e => keys[e.code] = false;

    function animate() {
        requestAnimationFrame(animate);
        if(myPlayer) {
            const speed = 0.16;
            let mx = 0, mz = 0;
            if(keys['KeyW'] || joystickData.y < -0.2) { mx += Math.sin(camYaw) * speed; mz += Math.cos(camYaw) * speed; }
            if(keys['KeyS'] || joystickData.y > 0.2) { mx -= Math.sin(camYaw) * speed; mz -= Math.cos(camYaw) * speed; }
            if(keys['KeyA']) { mx += Math.sin(camYaw + Math.PI/2) * speed; mz += Math.cos(camYaw + Math.PI/2) * speed; }
            if(keys['KeyD']) { mx += Math.sin(camYaw - Math.PI/2) * speed; mz += Math.cos(camYaw - Math.PI/2) * speed; }

            myPlayer.position.x += mx;
            myPlayer.position.z += mz;
            if(mx !== 0 || mz !== 0) myPlayer.rotation.y = Math.atan2(mx, mz);

            // Zıplama Fiziği
            myPlayer.position.y += velocityY;
            if(myPlayer.position.y > 0) velocityY -= 0.015;
            else { myPlayer.position.y = 0; velocityY = 0; isGrounded = true; }

            socket.emit('playerMovement', {x: myPlayer.position.x, y: myPlayer.position.y, z: myPlayer.position.z, rotationY: myPlayer.rotation.y});

            // Akıcı Kamera
            const camDist = 12;
            camera.position.x = myPlayer.position.x - Math.sin(camYaw) * camDist * Math.cos(camPitch);
            camera.position.y = myPlayer.position.y - Math.sin(camPitch) * camDist + 2;
            camera.position.z = myPlayer.position.z - Math.cos(camYaw) * camDist * Math.cos(camPitch);
            camera.lookAt(myPlayer.position.x, myPlayer.position.y + 1.6, myPlayer.position.z);
        }
        renderer.render(scene, camera);
    }
</script>
</body>
</html>
