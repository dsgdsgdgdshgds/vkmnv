<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D MMORPG Orman</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; font-family: sans-serif; }
        
        /* Giriş Ekranı */
        #login-screen {
            position: fixed; width: 100%; height: 100%; background: rgba(0,0,0,0.85);
            display: flex; align-items: center; justify-content: center; z-index: 1000;
        }
        .box { 
            background: linear-gradient(145deg, #1e3d14, #2d5e1e); 
            padding: 30px; border-radius: 15px; text-align: center; color: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8); border: 2px solid #4caf50;
        }
        .box input { 
            padding: 12px; width: 220px; border-radius: 5px; border: none; 
            margin-bottom: 15px; font-size: 16px; outline: none;
        }
        .box button {
            padding: 12px 30px; cursor: pointer; background: #f39c12; color: white;
            border: none; border-radius: 5px; font-weight: bold; font-size: 18px;
            transition: 0.2s;
        }
        .box button:hover { background: #e67e22; transform: scale(1.05); }
        #error-msg { color: #ff4d4d; font-weight: bold; min-height: 20px; margin-bottom: 10px; }

        /* Mobil Kontroller */
        #joystick-container {
            position: absolute; bottom: 40px; left: 40px; width: 130px; height: 130px;
            background: rgba(255,255,255,0.15); border-radius: 50%; display: none; touch-action: none;
            border: 2px solid rgba(255,255,255,0.3);
        }
        #joystick-knob {
            position: absolute; width: 60px; height: 60px; background: rgba(255,255,255,0.6);
            border-radius: 50%; top: 35px; left: 35px; box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        @media (pointer: coarse) { #joystick-container { display: block; } }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="box">
        <h2>⚔️ ORMAN MACERASI</h2>
        <div id="error-msg"></div>
        <input type="text" id="username" placeholder="Kullanıcı Adı" maxlength="12"><br>
        <input type="password" id="password" placeholder="Şifre"><br>
        <button onclick="attemptLogin()">GİRİŞ / KAYIT</button>
    </div>
</div>

<div id="joystick-container"><div id="joystick-knob"></div></div>

<script src="/socket.io/socket.io.js"></script>
<script type="module">
    import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';

    let scene, camera, renderer, socket, myPlayer;
    let joystickData = { x: 0, y: 0, active: false };
    const otherPlayers = {};
    const keys = {};

    // Kamera takibi için değişkenler
    const cameraOffset = new THREE.Vector3(0, 4, 8); // Metin2 tarzı omuz arkası
    let playerAngle = 0; // Karakterin baktığı yön

    window.attemptLogin = () => {
        const user = document.getElementById('username').value.trim();
        const pass = document.getElementById('password').value.trim();
        
        if(user.length < 3) return showErr("Kullanıcı adı en az 3 hane olmalı.");
        if(pass.length < 3) return showErr("Şifre en az 3 hane olmalı.");

        socket = io();
        socket.emit('login', { username: user, password: pass });

        socket.on('loginError', (msg) => {
            showErr(msg);
            socket.disconnect();
        });

        socket.on('loginSuccess', () => {
            document.getElementById('login-screen').style.display = 'none';
            initGame();
        });
    };

    function showErr(msg) {
        document.getElementById('error-msg').innerText = msg;
    }

    function initGame() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 20, 150);

        camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // Işıklar
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(50, 100, 50);
        dirLight.castShadow = true;
        dirLight.shadow.camera.left = -50; dirLight.shadow.camera.right = 50;
        dirLight.shadow.camera.top = 50; dirLight.shadow.camera.bottom = -50;
        dirLight.shadow.mapSize.width = 2048; dirLight.shadow.mapSize.height = 2048;
        scene.add(dirLight);

        // Gerçekçi Zemin
        const groundGeo = new THREE.PlaneGeometry(300, 300);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x3b5e2b, roughness: 0.8 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI/2; 
        ground.receiveShadow = true; 
        scene.add(ground);

        // Orman Oluşturma (Ağaçlar ve Kayalar)
        for(let i=0; i<150; i++) {
            createTree(Math.random()*280-140, Math.random()*280-140);
            if(i < 50) createRock(Math.random()*280-140, Math.random()*280-140);
        }

        // Multiplayer Eventleri
        socket.on('currentPlayers', (players) => {
            Object.keys(players).forEach(id => {
                if(id === socket.id) {
                    myPlayer = createHumanoid(players[id].color, players[id].username);
                    myPlayer.position.set(players[id].x, 0, players[id].z);
                } else {
                    otherPlayers[id] = createHumanoid(players[id].color, players[id].username);
                    otherPlayers[id].position.set(players[id].x, 0, players[id].z);
                }
            });
        });

        socket.on('newPlayer', (data) => {
            otherPlayers[data.id] = createHumanoid(data.color, data.username);
            otherPlayers[data.id].position.set(data.x, 0, data.z);
        });

        socket.on('playerMoved', (data) => {
            if(otherPlayers[data.id]) {
                // Diğer oyuncuların hareketini yumuşat
                otherPlayers[data.id].position.lerp(new THREE.Vector3(data.x, 0, data.z), 0.3);
                if (data.rotationY !== undefined) {
                    otherPlayers[data.id].rotation.y = data.rotationY;
                }
            }
        });

        socket.on('playerDisconnected', (id) => {
            if(otherPlayers[id]) {
                scene.remove(otherPlayers[id]);
                delete otherPlayers[id];
            }
        });

        setupJoystick();
        animate();
    }

    // İnsan Benzeri Karakter Oluşturucu
    function createHumanoid(colorHex, nameText) {
        const group = new THREE.Group();
        const mat = new THREE.MeshStandardMaterial({ color: colorHex });
        const skinMat = new THREE.MeshStandardMaterial({ color: 0xffdbac });

        // Gövde
        const body = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.2, 0.4), mat);
        body.position.y = 1.4; body.castShadow = true; group.add(body);

        // Kafa
        const head = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.6, 0.6), skinMat);
        head.position.y = 2.4; head.castShadow = true; group.add(head);

        // İsim Etiketi (Basit Canvas Sistemi)
        const canvas = document.createElement('canvas');
        canvas.width = 256; canvas.height = 64;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = 'white'; ctx.font = 'bold 30px Arial'; ctx.textAlign = 'center';
        ctx.fillText(nameText, 128, 40);
        const nameTex = new THREE.CanvasTexture(canvas);
        const nameSprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: nameTex }));
        nameSprite.position.y = 3.2; nameSprite.scale.set(2, 0.5, 1);
        group.add(nameSprite);

        scene.add(group);
        return group;
    }

    function createTree(x, z) {
        const tree = new THREE.Group();
        const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.5, 3), new THREE.MeshStandardMaterial({color: 0x4b3621}));
        trunk.position.y = 1.5; trunk.castShadow = true; tree.add(trunk);
        
        const leaves = new THREE.Mesh(new THREE.ConeGeometry(2.5, 6, 7), new THREE.MeshStandardMaterial({color: 0x1b5e20}));
        leaves.position.y = 5; leaves.castShadow = true; tree.add(leaves);
        
        tree.position.set(x, 0, z);
        scene.add(tree);
    }

    function createRock(x, z) {
        const rock = new THREE.Mesh(new THREE.DodecahedronGeometry(Math.random()+0.5), new THREE.MeshStandardMaterial({color: 0x888888}));
        rock.position.set(x, 0.5, z);
        rock.rotation.set(Math.random(), Math.random(), Math.random());
        rock.castShadow = true; scene.add(rock);
    }

    // Mobil Joystick
    function setupJoystick() {
        const container = document.getElementById('joystick-container');
        const knob = document.getElementById('joystick-knob');

        const handleMove = (e) => {
            if(!joystickData.active) return;
            const touch = e.touches ? e.touches[0] : e;
            const dx = touch.clientX - (container.offsetLeft + 65);
            const dy = touch.clientY - (container.offsetTop + 65);
            const dist = Math.min(Math.sqrt(dx*dx + dy*dy), 50);
            const angle = Math.atan2(dy, dx);
            
            knob.style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`;
            joystickData.x = (Math.cos(angle) * dist) / 50;
            joystickData.y = (Math.sin(angle) * dist) / 50;
        };

        container.addEventListener('touchstart', () => joystickData.active = true);
        window.addEventListener('touchend', () => {
            joystickData.active = false;
            knob.style.transform = `translate(0,0)`;
            joystickData.x = 0; joystickData.y = 0;
        });
        window.addEventListener('touchmove', handleMove);
    }

    window.onkeydown = (e) => keys[e.code] = true;
    window.onkeyup = (e) => keys[e.code] = false;

    // Oyun Döngüsü
    function animate() {
        requestAnimationFrame(animate);
        
        if(myPlayer) {
            const moveSpeed = 0.15;
            const rotSpeed = 0.05;
            let moved = false;

            // PC Kontrolleri (A ve D döndürür, W ve S ileri/geri gider - Metin2 gibi)
            if(keys['KeyA']) playerAngle += rotSpeed;
            if(keys['KeyD']) playerAngle -= rotSpeed;
            
            let moveZ = 0;
            if(keys['KeyW']) moveZ = moveSpeed;
            if(keys['KeyS']) moveZ = -moveSpeed;

            // Joystick Kontrolü (Mobil)
            if (joystickData.active) {
                playerAngle -= joystickData.x * rotSpeed; // X ekseni döndürür
                moveZ = -joystickData.y * moveSpeed;      // Y ekseni ileri götürür
            }

            // Hareketi Uygula
            if (moveZ !== 0) {
                myPlayer.position.x += Math.sin(playerAngle) * moveZ;
                myPlayer.position.z += Math.cos(playerAngle) * moveZ;
                moved = true;
            }
            if (keys['KeyA'] || keys['KeyD'] || joystickData.active) moved = true;

            myPlayer.rotation.y = playerAngle; // Karakteri baktığı yöne çevir

            if(moved) {
                socket.emit('playerMovement', { 
                    x: myPlayer.position.x, 
                    z: myPlayer.position.z,
                    rotationY: myPlayer.rotation.y 
                });
            }

            // Metin2 Tarzı Third-Person Kamera Takibi
            const camOffsetX = Math.sin(playerAngle) * cameraOffset.z;
            const camOffsetZ = Math.cos(playerAngle) * cameraOffset.z;
            
            const targetCamPos = new THREE.Vector3(
                myPlayer.position.x - camOffsetX,
                myPlayer.position.y + cameraOffset.y,
                myPlayer.position.z - camOffsetZ
            );

            // Kamera yumuşak takip
            camera.position.lerp(targetCamPos, 0.1);
            
            // Kamera karakterin biraz üstüne baksın
            const lookTarget = new THREE.Vector3(myPlayer.position.x, myPlayer.position.y + 2, myPlayer.position.z);
            camera.lookAt(lookTarget);
            
            // İsim etiketlerinin sürekli kameraya bakmasını sağla
            scene.traverse((object) => {
                if (object.isSprite) object.lookAt(camera.position);
            });
        }
        
        renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
        if(!camera) return;
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
