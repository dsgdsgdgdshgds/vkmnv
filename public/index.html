<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Survival RPG: Evolution</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1a; touch-action: none; font-family: 'Segoe UI', sans-serif; }
        #login-screen { position: fixed; inset: 0; background: #1a1a1a; display: flex; align-items: center; justify-content: center; z-index: 2000; }
        .box { background: #222; padding: 40px 20px; border-radius: 20px; text-align: center; color: white; border: 2px solid #333; width: 85%; max-width: 320px; }
        input { padding: 15px; width: 90%; border-radius: 8px; border: 1px solid #444; margin-bottom: 15px; font-size: 16px; background: #333; color: white; }
        button.login-btn { padding: 15px; cursor: pointer; background: #2ecc71; color: white; border: none; border-radius: 8px; font-weight: bold; width: 98%; font-size: 18px; }
        #game-ui { display: none; }
        #ui-overlay { position: fixed; top: 20px; left: 20px; color: white; pointer-events: none; z-index: 1000; text-shadow: 2px 2px 2px #000; }
        #hp-bar-ui { width: 180px; height: 12px; background: rgba(0,0,0,0.5); border: 2px solid #fff; border-radius: 10px; overflow: hidden; margin-top: 5px; }
        #hp-fill { width: 100%; height: 100%; background: #e74c3c; transition: 0.3s; }
        #craft-toggle { position: fixed; top: 20px; right: 20px; width: 50px; height: 50px; background: rgba(0,0,0,0.6); color: white; border-radius: 10px; border: 2px solid white; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; z-index: 1600; }
        #craft-panel { position: fixed; top: 80px; right: -250px; width: 200px; background: rgba(0,0,0,0.85); border-radius: 15px 0 0 15px; padding: 15px; transition: 0.5s; z-index: 1500; color: white; }
        #craft-panel.open { right: 0; }
        .craft-option { background: #333; padding: 12px; margin-bottom: 10px; border-radius: 8px; text-align: center; cursor: pointer; border: 1px solid #555; }
        #mobile-controls { position: fixed; inset: 0; pointer-events: none; }
        #joystick-container { position: absolute; bottom: 30px; left: 30px; width: 110px; height: 110px; background: rgba(255,255,255,0.1); border-radius: 50%; border: 1px solid rgba(255,255,255,0.3); pointer-events: auto; }
        #joystick-knob { position: absolute; width: 45px; height: 45px; background: #fff; opacity: 0.5; border-radius: 50%; top: 32px; left: 32px; pointer-events: none; }
        #jump-btn { position: absolute; bottom: 130px; right: 30px; width: 65px; height: 65px; background: rgba(255,255,255,0.2); border: 2px solid #fff; border-radius: 50%; color: white; font-weight: bold; pointer-events: auto; }
        #attack-btn { position: absolute; bottom: 30px; right: 30px; width: 85px; height: 85px; background: rgba(231, 76, 60, 0.6); border-radius: 50%; color: white; border: 3px solid #fff; font-size: 20px; pointer-events: auto; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="box">
        <h2 style="color:#2ecc71; margin-bottom: 25px;">⚔️ SURVIVAL EVOLUTION</h2>
        <input type="text" id="username" placeholder="Kullanıcı Adı">
        <input type="password" id="password" placeholder="Şifre">
        <button class="login-btn" onclick="attemptLogin()">DÜNYAYA GİR</button>
    </div>
</div>

<div id="game-ui">
    <div id="ui-overlay">
        <div id="player-name-display">...</div>
        <div id="hp-bar-ui"><div id="hp-fill"></div></div>
        <div style="margin-top:10px; font-weight: bold;">🪵 <span id="inv-wood">0</span> | 🪨 <span id="inv-stone">0</span></div>
    </div>
    <div id="craft-toggle" onclick="toggleCraft()">☰</div>
    <div id="craft-panel">
        <div class="craft-option" onclick="doCraft('axe')">🪓 Balta (3 Odun)</div>
        <div class="craft-option" onclick="doCraft('pickaxe')">⛏️ Kazma (3 Taş)</div>
        <div class="craft-option" onclick="doCraft('sword')">⚔️ Kılıç (2 Odun, 2 Taş)</div>
    </div>
    <div id="mobile-controls">
        <div id="joystick-container"><div id="joystick-knob"></div></div>
        <button id="jump-btn" onclick="jump()">ZIPLA</button>
        <button id="attack-btn">🔥</button>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script type="module">
    import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';

    let scene, camera, renderer, socket, myPlayer, myId;
    let joystickData = { x: 0, y: 0, active: false, identifier: null };
    let lookData = { active: false, identifier: null, lastX: 0, lastY: 0 };
    const otherPlayers = {}, worldObjects = [];
    
    let velocityY = 0, isGrounded = true, myHealth = 100;
    let inv = { wood: 0, stone: 0, sword: 0, axe: 0, pickaxe: 0 };
    let camYaw = 0, camPitch = -Math.PI / 8;

    window.toggleCraft = () => document.getElementById('craft-panel').classList.toggle('open');

    function createNameTag(name) {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 256; canvas.height = 64;
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.font = 'bold 32px Arial';
        ctx.fillStyle = 'white';
        ctx.textAlign = 'center';
        ctx.fillText(name, 128, 45);
        const texture = new THREE.CanvasTexture(canvas);
        const spriteMaterial = new THREE.SpriteMaterial({ map: texture });
        const sprite = new THREE.Sprite(spriteMaterial);
        sprite.scale.set(2, 0.5, 1);
        sprite.position.y = 2.2;
        return sprite;
    }

    window.attemptLogin = async () => {
        const u = document.getElementById('username').value;
        if(u.length < 2) return;
        socket = io();
        socket.emit('login', { username: u, password: document.getElementById('password').value });
        socket.on('loginSuccess', () => {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('game-ui').style.display = 'block';
            document.getElementById('player-name-display').innerText = u.toUpperCase();
            initGame(u);
        });
        socket.on('updateInventory', data => { inv = data; updateUI(); updateEquippedTool(); });
    };

    function initGame(username) {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);
        scene.fog = new THREE.Fog(0x87ceeb, 25, 120);
        camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const sun = new THREE.DirectionalLight(0xffffff, 0.9);
        sun.position.set(50, 80, 50); sun.castShadow = true;
        scene.add(sun);

        const ground = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshStandardMaterial({ color: 0x4caf50 }));
        ground.rotation.x = -Math.PI / 2; ground.receiveShadow = true;
        scene.add(ground);

        for(let i=0; i<60; i++) spawnResource(Math.random()*200-100, Math.random()*200-100);

        socket.on('currentPlayers', (players) => {
            myId = socket.id;
            Object.keys(players).forEach(id => {
                if(id === myId) myPlayer = createHuman(players[id], username);
                else otherPlayers[id] = createHuman(players[id], players[id].username);
            });
        });

        socket.on('newPlayer', data => { if(data.id !== myId) otherPlayers[data.id] = createHuman(data, data.username); });
        socket.on('playerMoved', data => {
            if(data.id !== myId && otherPlayers[data.id]) {
                otherPlayers[data.id].position.set(data.x, data.y || 0, data.z);
                otherPlayers[data.id].rotation.y = data.rotationY;
            }
        });
        socket.on('playerDisconnected', id => { if(otherPlayers[id]) { scene.remove(otherPlayers[id]); delete otherPlayers[id]; } });

        setupControls();
        document.getElementById('attack-btn').addEventListener('touchstart', performAttack);
        animate();
    }

    function createHuman(data, name) {
        const group = new THREE.Group();
        const bodyColor = data.color || Math.random() * 0xffffff;
        const torso = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.7, 0.3), new THREE.MeshStandardMaterial({color: bodyColor}));
        torso.position.y = 1.05; group.add(torso);
        const legs = new THREE.Mesh(new THREE.BoxGeometry(0.55, 0.7, 0.28), new THREE.MeshStandardMaterial({color: 0x2c3e50}));
        legs.position.y = 0.35; group.add(legs);
        const head = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.4, 0.4), new THREE.MeshStandardMaterial({color: 0xffdbac}));
        head.position.y = 1.6; group.add(head);
        
        const rightArmGroup = new THREE.Group();
        rightArmGroup.position.set(0.4, 1.3, 0);
        const rightArm = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.6, 0.2), new THREE.MeshStandardMaterial({color: 0xffdbac}));
        rightArm.position.y = -0.25; rightArmGroup.add(rightArm);
        group.add(rightArmGroup);
        const toolSlot = new THREE.Group();
        toolSlot.position.set(0, -0.4, 0.1); 
        rightArm.add(toolSlot);

        if(name) group.add(createNameTag(name));

        group.userData = { rightArmGroup, toolSlot, id: data.id };
        group.position.set(data.x || 0, 0, data.z || 0);
        scene.add(group);
        return group;
    }

    function spawnResource(x, z) {
        const isTree = Math.random() > 0.4;
        const group = new THREE.Group();
        if(isTree) {
            const trunk = new THREE.Mesh(new THREE.BoxGeometry(0.4, 2.5, 0.4), new THREE.MeshStandardMaterial({color:0x5d4037}));
            const leaves = new THREE.Mesh(new THREE.SphereGeometry(1.2, 8, 8), new THREE.MeshStandardMaterial({color:0x2e7d32}));
            leaves.position.y = 2; group.add(trunk, leaves);
        } else {
            const rock = new THREE.Mesh(new THREE.DodecahedronGeometry(0.8), new THREE.MeshStandardMaterial({color:0x757575}));
            group.add(rock);
        }
        group.position.set(x, 0, z); // Zemine sıfırla
        group.userData = { type: isTree ? 'wood' : 'stone', hp: 10, maxHp: 10 };
        scene.add(group); worldObjects.push(group);
    }

    function performAttack() {
        if(!myPlayer) return;
        
        // Animasyon
        const arm = myPlayer.userData.rightArmGroup;
        arm.rotation.x = -Math.PI / 2;
        setTimeout(() => { arm.rotation.x = 0; }, 150);

        const hitRange = 2.5; 
        
        for (let i = worldObjects.length - 1; i >= 0; i--) {
            const obj = worldObjects[i];
            const dist = myPlayer.position.distanceTo(obj.position);

            if (dist < hitRange) {
                let dmg = 1;
                if(obj.userData.type === 'wood' && inv.axe > 0) dmg = 5;
                if(obj.userData.type === 'stone' && inv.pickaxe > 0) dmg = 5;
                
                obj.userData.hp -= dmg;
                const s = Math.max(0.2, obj.userData.hp / obj.userData.maxHp);
                obj.scale.set(s, s, s);

                if (obj.userData.hp <= 0) {
                    inv[obj.userData.type]++;
                    updateUI();
                    scene.remove(obj);
                    worldObjects.splice(i, 1);
                    socket.emit('collect', { type: obj.userData.type });
                }
            }
        }

        Object.keys(otherPlayers).forEach(id => {
            if(myPlayer.position.distanceTo(otherPlayers[id].position) < 2.0) {
                socket.emit('attackPlayer', { targetId: id, dmg: (inv.sword > 0 ? 20 : 5) });
            }
        });
    };

    function updateUI() {
        document.getElementById('inv-wood').innerText = inv.wood;
        document.getElementById('inv-stone').innerText = inv.stone;
        document.getElementById('hp-fill').style.width = myHealth + '%';
    }

    function updateEquippedTool() {
        if(!myPlayer) return;
        const slot = myPlayer.userData.toolSlot;
        while(slot.children.length > 0) slot.remove(slot.children[0]);
        let m;
        if(inv.sword > 0) m = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.8, 0.1), new THREE.MeshStandardMaterial({color: 0xbdc3c7}));
        else if(inv.axe > 0) m = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.3, 0.1), new THREE.MeshStandardMaterial({color: 0x7f8c8d}));
        else if(inv.pickaxe > 0) m = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.1, 0.1), new THREE.MeshStandardMaterial({color: 0x95a5a6}));
        if(m) slot.add(m);
    }

    window.jump = () => { if(isGrounded) { velocityY = 0.3; isGrounded = false; } };
    
    window.doCraft = (t) => {
        let ok = false;
        if(t==='axe' && inv.wood>=3) { inv.wood-=3; inv.axe=1; ok=true; }
        if(t==='pickaxe' && inv.stone>=3) { inv.stone-=3; inv.pickaxe=1; ok=true; }
        if(t==='sword' && inv.wood>=2 && inv.stone>=2) { inv.wood-=2; inv.stone-=2; inv.sword=1; ok=true; }
        if(ok) { updateUI(); updateEquippedTool(); toggleCraft(); }
    };

    function setupControls() {
        const jsBase = document.getElementById('joystick-container');
        const knob = document.getElementById('joystick-knob');
        window.addEventListener('touchstart', e => {
            for(let i=0; i<e.changedTouches.length; i++){
                const t = e.changedTouches[i];
                const rect = jsBase.getBoundingClientRect();
                if(t.clientX > rect.left && t.clientX < rect.right && t.clientY > rect.top && t.clientY < rect.bottom) {
                    joystickData.active = true; joystickData.identifier = t.identifier;
                } else {
                    lookData.active = true; lookData.identifier = t.identifier;
                    lookData.lastX = t.clientX; lookData.lastY = t.clientY;
                }
            }
        });
        window.addEventListener('touchmove', e => {
            for(let i=0; i<e.changedTouches.length; i++){
                const t = e.changedTouches[i];
                if(t.identifier === joystickData.identifier) {
                    const rect = jsBase.getBoundingClientRect();
                    const dx = t.clientX - (rect.left + 55), dy = t.clientY - (rect.top + 55);
                    const dist = Math.min(Math.sqrt(dx*dx+dy*dy), 45), angle = Math.atan2(dy, dx);
                    knob.style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`;
                    joystickData.x = Math.cos(angle) * (dist/45); joystickData.y = Math.sin(angle) * (dist/45);
                }
                if(t.identifier === lookData.identifier) {
                    const dx = t.clientX - lookData.lastX, dy = t.clientY - lookData.lastY;
                    camYaw -= dx * 0.008;
                    camPitch = Math.max(-Math.PI/2.1, Math.min(-0.1, camPitch - dy * 0.008));
                    lookData.lastX = t.clientX; lookData.lastY = t.clientY;
                }
            }
        });
        window.addEventListener('touchend', e => {
            for(let t of e.changedTouches){
                if(t.identifier === joystickData.identifier) { joystickData.active = false; knob.style.transform = `translate(0,0)`; joystickData.x = 0; joystickData.y = 0; }
                if(t.identifier === lookData.identifier) lookData.active = false;
            }
        });
    }

    function animate() {
        requestAnimationFrame(animate);
        if(myPlayer) {
            const speed = 0.18;
            let mx = 0, mz = 0;
            if(joystickData.active) { 
                mx += (Math.sin(camYaw) * -joystickData.y + Math.cos(camYaw) * -joystickData.x) * speed;
                mz += (Math.cos(camYaw) * -joystickData.y - Math.sin(camYaw) * -joystickData.x) * speed;
            }
            myPlayer.position.x += mx; myPlayer.position.z += mz;
            if(mx !== 0 || mz !== 0) myPlayer.rotation.y = Math.atan2(mx, mz);
            myPlayer.position.y += velocityY;
            if(myPlayer.position.y > 0) velocityY -= 0.015;
            else { myPlayer.position.y = 0; velocityY = 0; isGrounded = true; }
            socket.emit('playerMovement', {x: myPlayer.position.x, y: myPlayer.position.y, z: myPlayer.position.z, rotationY: myPlayer.rotation.y});
            const camDist = 12;
            camera.position.x = myPlayer.position.x - Math.sin(camYaw) * camDist * Math.cos(camPitch);
            camera.position.y = myPlayer.position.y - Math.sin(camPitch) * camDist + 2;
            camera.position.z = myPlayer.position.z - Math.cos(camYaw) * camDist * Math.cos(camPitch);
            camera.lookAt(myPlayer.position.x, myPlayer.position.y + 1.6, myPlayer.position.z);
        }
        renderer.render(scene, camera);
    }
</script>
</body>
</html>
