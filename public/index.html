<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Survival RPG: Evolution V2</title>
    <style>
        /* CSS Kısmı Aynı Kalıyor */
        body { margin: 0; overflow: hidden; background: #1a1a1a; touch-action: none; font-family: 'Segoe UI', sans-serif; }
        #login-screen { position: fixed; inset: 0; background: #1a1a1a; display: flex; align-items: center; justify-content: center; z-index: 2000; }
        .box { background: #222; padding: 40px 20px; border-radius: 20px; text-align: center; color: white; border: 2px solid #333; width: 85%; max-width: 320px; }
        input { padding: 15px; width: 90%; border-radius: 8px; border: 1px solid #444; margin-bottom: 15px; font-size: 16px; background: #333; color: white; }
        button.login-btn { padding: 15px; cursor: pointer; background: #2ecc71; color: white; border: none; border-radius: 8px; font-weight: bold; width: 98%; font-size: 18px; }
        #game-ui { display: none; }
        /* UI ve Buton CSS'leri buraya gelecek... */
    </style>
</head>
<body>

<div id="login-screen">
    <div class="box">
        <h2 style="color:#2ecc71; margin-bottom: 25px;">⚔️ SURVIVAL EVOLUTION</h2>
        <input type="text" id="username" placeholder="Kullanıcı Adı">
        <input type="password" id="password" placeholder="Şifre">
        <button class="login-btn" onclick="attemptLogin()">DÜNYAYA GİR</button>
        <div style="margin-top:10px; font-size:12px; color:#666;">Bilgilerin bu tarayıcıya kaydedilecek.</div>
    </div>
</div>

<div id="game-ui">
    <button id="attack-btn" style="position:fixed; bottom:30px; right:30px; width:80px; height:80px; border-radius:50%; background:red; color:white;" onclick="performAttack()">🔥</button>
</div>

<script type="module">
    import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';

    let scene, camera, renderer, myPlayer, myId;
    const worldObjects = [], otherPlayers = {};
    let inv = { wood: 0, stone: 0, axe: 0, pickaxe: 0, sword: 0 };

    // --- 1. KAYITLI GİRİŞ SİSTEMİ ---
    window.onload = () => {
        const savedUser = localStorage.getItem('rpg_user');
        const savedPass = localStorage.getItem('rpg_pass');
        if(savedUser) document.getElementById('username').value = savedUser;
        if(savedPass) document.getElementById('password').value = savedPass;
    };

    window.attemptLogin = () => {
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;
        if(u.length < 2) return;

        // Bilgileri Kaydet
        localStorage.setItem('rpg_user', u);
        localStorage.setItem('rpg_pass', p);

        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('game-ui').style.display = 'block';
        initGame(u);
    };

    // --- 2. İSİM ETİKETİ SİSTEMİ ---
    function createNameTag(name) {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 256; canvas.height = 64;
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.roundRect ? ctx.roundRect(0,0,256,64,10) : ctx.fillRect(0,0,256,64); 
        ctx.fill();
        ctx.font = 'bold 36px Arial';
        ctx.fillStyle = 'white';
        ctx.textAlign = 'center';
        ctx.fillText(name, 128, 45);

        const texture = new THREE.CanvasTexture(canvas);
        const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: texture }));
        sprite.scale.set(1.5, 0.4, 1);
        sprite.position.y = 2.3; // Başın üstünde
        return sprite;
    }

    // --- 3. ALAN HASARI (1 METRE) KIRMA SİSTEMİ ---
    window.performAttack = () => {
        if(!myPlayer) return;
        
        // Saldırı Animasyonu
        const arm = myPlayer.userData.arm;
        arm.rotation.x = -Math.PI/2;
        setTimeout(() => arm.rotation.x = 0, 150);

        const attackRadius = 4.0; // Karakterin 1-2 metre etrafı

        // Alan Hasarı Döngüsü (Herşeye vurur)
        for (let i = worldObjects.length - 1; i >= 0; i--) {
            const obj = worldObjects[i];
            const dist = myPlayer.position.distanceTo(obj.position);

            if (dist < attackRadius) {
                let damage = 1;
                // Alet Bonusu
                if (obj.userData.type === 'wood' && inv.axe > 0) damage = 5;
                if (obj.userData.type === 'stone' && inv.pickaxe > 0) damage = 5;

                obj.userData.hp -= damage;
                
                // Küçülme Efekti
                const s = Math.max(0.2, obj.userData.hp / 10);
                obj.scale.set(s, s, s);

                if (obj.userData.hp <= 0) {
                    inv[obj.userData.type]++;
                    scene.remove(obj);
                    worldObjects.splice(i, 1);
                    console.log("Toplanan:", obj.userData.type);
                }
            }
        }
    };

    function initGame(username) {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);
        camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
        renderer = new THREE.WebGLRenderer({antialias: true});
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Zemin
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), new THREE.MeshStandardMaterial({color: 0x4caf50}));
        ground.rotation.x = -Math.PI/2;
        scene.add(ground);
        scene.add(new THREE.AmbientLight(0xffffff, 0.8));

        // Oyuncu Oluştur
        myPlayer = new THREE.Group();
        const body = new THREE.Mesh(new THREE.BoxGeometry(0.6, 1, 0.4), new THREE.MeshStandardMaterial({color: 'blue'}));
        body.position.y = 0.5;
        myPlayer.add(body);
        
        // Kol (Saldırı için)
        const arm = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.6, 0.2), new THREE.MeshStandardMaterial({color: 'peachpuff'}));
        arm.position.set(0.4, 0.8, 0);
        const armGroup = new THREE.Group(); armGroup.add(arm);
        myPlayer.add(armGroup);
        myPlayer.userData.arm = armGroup;

        // İSİM EKLE
        myPlayer.add(createNameTag(username));
        scene.add(myPlayer);

        // Örnek Kaynaklar
        for(let i=0; i<20; i++) spawnResource(Math.random()*40-20, Math.random()*40-20);

        animate();
    }

    function spawnResource(x, z) {
        const type = Math.random() > 0.5 ? 'wood' : 'stone';
        const geo = type === 'wood' ? new THREE.CylinderGeometry(0.3, 0.3, 2) : new THREE.DodecahedronGeometry(0.6);
        const mat = new THREE.MeshStandardMaterial({color: type === 'wood' ? 0x5d4037 : 0x757575});
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.set(x, type === 'wood' ? 1 : 0.3, z);
        mesh.userData = { type, hp: 10 };
        scene.add(mesh);
        worldObjects.push(mesh);
    }

    function animate() {
        requestAnimationFrame(animate);
        // Kamera takibi ve kontroller buraya...
        renderer.render(scene, camera);
    }
</script>
</body>
</html>
