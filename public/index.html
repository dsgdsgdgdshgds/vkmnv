<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Survival RPG: Evolution v3</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1a; touch-action: none; font-family: 'Segoe UI', sans-serif; }
        
        /* Giriş Ekranı (Dikey) */
        #login-screen { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 2000; }
        .box { background: #222; padding: 30px; border-radius: 20px; text-align: center; color: white; width: 80%; max-width: 300px; border: 2px solid #333; }
        input { padding: 12px; width: 90%; border-radius: 8px; border: none; margin-bottom: 15px; font-size: 16px; background: #444; color: white; }
        .login-btn { padding: 15px; background: #2ecc71; color: white; border: none; border-radius: 8px; width: 100%; font-weight: bold; }

        /* Oyun UI */
        #game-ui { display: none; }
        #ui-overlay { position: fixed; top: 20px; left: 20px; color: white; pointer-events: none; z-index: 1000; }
        .hp-container { width: 150px; height: 12px; background: rgba(0,0,0,0.5); border: 2px solid #fff; border-radius: 10px; overflow: hidden; }
        #hp-fill { width: 100%; height: 100%; background: #e74c3c; transition: 0.2s; }
        
        /* Envanter & Craft */
        #inv-display { margin-top: 10px; background: rgba(0,0,0,0.4); padding: 5px; border-radius: 5px; font-size: 14px; }
        #craft-toggle { position: fixed; top: 20px; right: 20px; width: 50px; height: 50px; background: #34495e; color: white; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; pointer-events: auto; z-index: 1100; border: 2px solid #fff; }
        #craft-panel { position: fixed; right: -300px; top: 80px; width: 200px; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 15px 0 0 15px; transition: 0.4s; color: white; z-index: 1100; }
        .craft-item { background: #444; margin-bottom: 10px; padding: 10px; border-radius: 8px; text-align: center; cursor: pointer; border: 1px solid #666; }
        .craft-item:active { background: #2ecc71; }

        /* Mobil Kontroller */
        #joystick-container { position: absolute; bottom: 30px; left: 30px; width: 110px; height: 110px; background: rgba(255,255,255,0.1); border-radius: 50%; pointer-events: auto; }
        #joystick-knob { position: absolute; width: 40px; height: 40px; background: #fff; opacity: 0.6; border-radius: 50%; top: 35px; left: 35px; }
        #attack-btn { position: absolute; bottom: 30px; right: 30px; width: 90px; height: 90px; background: rgba(231,76,60,0.7); border: 4px solid #fff; border-radius: 50%; color: white; font-size: 30px; pointer-events: auto; }
        #jump-btn { position: absolute; bottom: 140px; right: 40px; width: 60px; height: 60px; background: rgba(255,255,255,0.2); border: 2px solid #fff; border-radius: 50%; color: white; pointer-events: auto; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="box">
        <h2 style="color:#2ecc71">RPG EVOLUTION</h2>
        <input type="text" id="username" placeholder="Karakter Adı">
        <button class="login-btn" onclick="attemptLogin()">BAŞLA</button>
    </div>
</div>

<div id="game-ui">
    <div id="ui-overlay">
        <b id="p-name">OYUNCU</b>
        <div class="hp-container"><div id="hp-fill"></div></div>
        <div id="inv-display">🪵: <span id="w-count">0</span> | 🪨: <span id="s-count">0</span></div>
    </div>

    <div id="craft-toggle" onclick="toggleCraft()">☰</div>
    <div id="craft-panel" id="cp">
        <div class="craft-item" onclick="tryCraft('axe')">🪓 Balta<br><small>(3 Odun)</small></div>
        <div class="craft-item" onclick="tryCraft('pickaxe')">⛏️ Kazma<br><small>(3 Taş)</small></div>
        <div class="craft-item" onclick="tryCraft('sword')">⚔️ Kılıç<br><small>(2 Odun, 2 Taş)</small></div>
    </div>

    <div id="joystick-container"><div id="joystick-knob"></div></div>
    <button id="jump-btn" onclick="jump()">ZIP</button>
    <button id="attack-btn" onclick="performAttack()">⚔️</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script type="module">
    import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';

    let scene, camera, renderer, socket, myPlayer, myId;
    let joystick = { active: false, x: 0, y: 0, id: null };
    let look = { active: false, id: null, lx: 0, ly: 0 };
    const players = {}, worldObjects = [], keys = {};
    
    // Sesler
    const sndHit = new Audio('/sounds/hit.mp3');
    const sndBreak = new Audio('/sounds/break.mp3');
    const sndCraft = new Audio('/sounds/craft.mp3');

    let vY = 0, isGrounded = true, health = 100;
    let inv = { wood: 0, stone: 0, axe: false, pickaxe: false, sword: false };
    let camYaw = 0, camPitch = -Math.PI / 8;

    window.attemptLogin = async () => {
        const u = document.getElementById('username').value;
        if(u.length < 2) return;

        try {
            if (document.documentElement.requestFullscreen) await document.documentElement.requestFullscreen();
            if (screen.orientation?.lock) await screen.orientation.lock('landscape');
        } catch(e) {}

        socket = io();
        socket.emit('login', { username: u });
        
        socket.on('loginSuccess', (data) => {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('game-ui').style.display = 'block';
            document.getElementById('p-name').innerText = u.toUpperCase();
            initGame();
        });
    };

    function initGame() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);
        scene.fog = new THREE.Fog(0x87ceeb, 20, 150);

        camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        const sun = new THREE.DirectionalLight(0xffffff, 0.8);
        sun.position.set(50, 100, 50); sun.castShadow = true;
        scene.add(sun);

        const floor = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshStandardMaterial({ color: 0x4caf50 }));
        floor.rotation.x = -Math.PI/2; floor.receiveShadow = true;
        scene.add(floor);

        // Haritayı Doldur
        for(let i=0; i<80; i++) spawnResource(Math.random()*200-100, Math.random()*200-100);

        socket.on('currentPlayers', (data) => {
            myId = socket.id;
            Object.keys(data).forEach(id => {
                if(id === myId) myPlayer = createChar(data[id], true);
                else players[id] = createChar(data[id], false);
            });
        });

        socket.on('newPlayer', d => { if(d.id !== myId) players[d.id] = createChar(d, false); });
        socket.on('playerMoved', d => { if(players[d.id]) { players[d.id].position.set(d.x, d.y, d.z); players[d.id].rotation.y = d.rot; } });
        socket.on('playerDisconnected', id => { if(players[id]) { scene.remove(players[id]); delete players[id]; } });
        
        socket.on('takeDamage', d => { if(d.id === myId) { health -= d.dmg; updateUI(); } });

        setupControls();
        animate();
    }

    function createChar(data, isMe) {
        const group = new THREE.Group();
        // Rastgele renkli karakter
        const color = isMe ? 0x2ecc71 : Math.random() * 0xffffff;
        const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.4, 1, 4, 8), new THREE.MeshStandardMaterial({ color }));
        body.position.y = 0.9; body.castShadow = true; group.add(body);
        
        const head = new THREE.Mesh(new THREE.BoxGeometry(0.45, 0.45, 0.45), new THREE.MeshStandardMaterial({ color: 0xffdbac }));
        head.position.y = 1.6; group.add(head);

        const hand = new THREE.Group();
        hand.position.set(0.5, 1.2, 0.2);
        const itemMesh = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 0.5), new THREE.MeshStandardMaterial({color: 0x333}));
        hand.add(itemMesh); group.add(hand);

        group.userData = { hand, id: data.id };
        group.position.set(data.x || 0, 0, data.z || 0);
        scene.add(group); return group;
    }

    function spawnResource(x, z) {
        const type = Math.random() > 0.5 ? 'wood' : 'stone';
        const group = new THREE.Group();
        if(type === 'wood') {
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.4, 3), new THREE.MeshStandardMaterial({color: 0x5d4037}));
            trunk.position.y = 1.5; group.add(trunk);
            const leaves = new THREE.Mesh(new THREE.SphereGeometry(1.2), new THREE.MeshStandardMaterial({color: 0x2e7d32}));
            leaves.position.y = 3; group.add(leaves);
        } else {
            const rock = new THREE.Mesh(new THREE.DodecahedronGeometry(0.8), new THREE.MeshStandardMaterial({color: 0x757575}));
            rock.position.y = 0.4; group.add(rock);
        }
        group.position.set(x, 0, z);
        group.userData = { type, hp: 10, maxHp: 10 };
        scene.add(group); worldObjects.push(group);
    }

    window.toggleCraft = () => {
        const p = document.getElementById('craft-panel');
        p.style.right = p.style.right === '0px' ? '-300px' : '0px';
    };

    window.tryCraft = (item) => {
        let success = false;
        if(item === 'axe' && inv.wood >= 3) { inv.wood -= 3; inv.axe = true; success = true; }
        if(item === 'pickaxe' && inv.stone >= 3) { inv.stone -= 3; inv.pickaxe = true; success = true; }
        if(item === 'sword' && inv.wood >= 2 && inv.stone >= 2) { inv.wood -= 2; inv.stone -= 2; inv.sword = true; success = true; }
        
        if(success) { sndCraft.play(); updateUI(); toggleCraft(); }
    };

    window.performAttack = () => {
        if(!myPlayer) return;
        myPlayer.userData.hand.rotation.x = -1.2;
        setTimeout(() => myPlayer.userData.hand.rotation.x = 0, 150);
        sndHit.play();

        // Kaynaklara vurma
        worldObjects.forEach((obj, i) => {
            if(myPlayer.position.distanceTo(obj.position) < 3.5) {
                let dmg = 1;
                if(obj.userData.type === 'wood' && inv.axe) dmg = 4;
                if(obj.userData.type === 'stone' && inv.pickaxe) dmg = 4;
                
                obj.userData.hp -= dmg;
                obj.scale.setScalar(obj.userData.hp / obj.userData.maxHp); // Küçülme efekti

                if(obj.userData.hp <= 0) {
                    sndBreak.play();
                    inv[obj.userData.type] += Math.floor(Math.random()*3)+1;
                    scene.remove(obj); worldObjects.splice(i, 1);
                    updateUI();
                }
            }
        });

        // Oyunculara vurma (PvP)
        Object.values(players).forEach(p => {
            if(myPlayer.position.distanceTo(p.position) < 3) {
                let dmg = inv.sword ? 20 : 5;
                socket.emit('attackPlayer', { targetId: p.userData.id, dmg });
            }
        });
    };

    function updateUI() {
        document.getElementById('w-count').innerText = inv.wood;
        document.getElementById('s-count').innerText = inv.stone;
        document.getElementById('hp-fill').style.width = health + '%';
        if(health <= 0) location.reload();
    }

    function setupControls() {
        const js = document.getElementById('joystick-container');
        window.addEventListener('touchstart', e => {
            for(let t of e.changedTouches) {
                const r = js.getBoundingClientRect();
                if(t.clientX > r.left && t.clientX < r.right && t.clientY > r.top && t.clientY < r.bottom) {
                    joystick.active = true; joystick.id = t.identifier;
                } else {
                    look.active = true; look.id = t.identifier; look.lx = t.clientX; look.ly = t.clientY;
                }
            }
        });
        window.addEventListener('touchmove', e => {
            for(let t of e.changedTouches) {
                if(t.identifier === joystick.id) {
                    const r = js.getBoundingClientRect();
                    const dx = t.clientX - (r.left+55), dy = t.clientY - (r.top+55);
                    const d = Math.min(Math.sqrt(dx*dx+dy*dy), 45);
                    const a = Math.atan2(dy, dx);
                    document.getElementById('joystick-knob').style.transform = `translate(${Math.cos(a)*d}px, ${Math.sin(a)*d}px)`;
                    joystick.x = Math.cos(a)*(d/45); joystick.y = Math.sin(a)*(d/45);
                }
                if(t.identifier === look.id) {
                    camYaw -= (t.clientX - look.lx) * 0.007;
                    camPitch = Math.max(-1.4, Math.min(-0.1, camPitch - (t.clientY - look.ly) * 0.007));
                    look.lx = t.clientX; look.ly = t.clientY;
                }
            }
        });
        window.addEventListener('touchend', e => {
            for(let t of e.changedTouches) {
                if(t.identifier === joystick.id) { joystick.active = false; joystick.x = 0; joystick.y = 0; document.getElementById('joystick-knob').style.transform = ''; }
                if(t.identifier === look.id) look.active = false;
            }
        });
    }

    window.jump = () => { if(isGrounded) { vY = 0.25; isGrounded = false; } };

    function animate() {
        requestAnimationFrame(animate);
        if(myPlayer) {
            let mx = 0, mz = 0;
            if(joystick.active) { mx = Math.sin(camYaw)*-joystick.y*0.18 + Math.cos(camYaw)*-joystick.x*0.18; mz = Math.cos(camYaw)*-joystick.y*0.18 - Math.sin(camYaw)*-joystick.x*0.18; }
            
            myPlayer.position.x += mx; myPlayer.position.z += mz;
            if(Math.abs(mx) > 0.01) myPlayer.rotation.y = Math.atan2(mx, mz);
            
            myPlayer.position.y += vY;
            if(myPlayer.position.y > 0) vY -= 0.012; else { myPlayer.position.y = 0; vY = 0; isGrounded = true; }

            socket.emit('playerMovement', { x: myPlayer.position.x, y: myPlayer.position.y, z: myPlayer.position.z, rot: myPlayer.rotation.y });

            camera.position.set(myPlayer.position.x - Math.sin(camYaw)*12*Math.cos(camPitch), myPlayer.position.y - Math.sin(camPitch)*12+2, myPlayer.position.z - Math.cos(camYaw)*12*Math.cos(camPitch));
            camera.lookAt(myPlayer.position.x, myPlayer.position.y + 1.5, myPlayer.position.z);
        }
        renderer.render(scene, camera);
    }
</script>
</body>
</html>
