<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Survival RPG</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; font-family: 'Segoe UI', sans-serif; }
        #login-screen { position: fixed; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .box { background: #222; padding: 30px; border-radius: 15px; text-align: center; color: white; border: 2px solid #555; }
        input { padding: 12px; width: 220px; border-radius: 5px; border: none; margin-bottom: 10px; display: block; }
        button { padding: 12px 30px; cursor: pointer; background: #e74c3c; color: white; border: none; border-radius: 5px; font-weight: bold; }
        
        #ui-overlay { position: fixed; top: 20px; left: 20px; color: white; pointer-events: none; }
        #hp-bar-ui { width: 200px; height: 20px; background: #444; border: 2px solid white; border-radius: 10px; overflow: hidden; }
        #hp-fill { width: 100%; height: 100%; background: #2ecc71; transition: 0.3s; }
        
        #joystick-container { position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px; background: rgba(255,255,255,0.1); border-radius: 50%; display: none; }
        #joystick-knob { position: absolute; width: 50px; height: 50px; background: white; opacity: 0.5; border-radius: 50%; top: 35px; left: 35px; }
        #attack-btn { position: absolute; bottom: 60px; right: 40px; width: 80px; height: 80px; background: rgba(231, 76, 60, 0.7); border-radius: 50%; display: none; color: white; font-weight: bold; border: none; }
        
        @media (pointer: coarse) { #joystick-container, #attack-btn { display: block; } }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="box">
        <h2>⚔️ HAYATTA KALMA</h2>
        <input type="text" id="username" placeholder="Kullanıcı Adı">
        <input type="password" id="password" placeholder="Şifre">
        <button onclick="attemptLogin()">BAŞLA</button>
    </div>
</div>

<div id="ui-overlay">
    <div>CANIM:</div>
    <div id="hp-bar-ui"><div id="hp-fill"></div></div>
</div>

<div id="joystick-container"><div id="joystick-knob"></div></div>
<button id="attack-btn" onclick="performAttack()">SALDIR</button>

<script src="/socket.io/socket.io.js"></script>
<script type="module">
    import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';

    let scene, camera, renderer, socket, myPlayer, myId;
    let joystickData = { x: 0, y: 0, active: false };
    const otherPlayers = {};
    const worldObjects = []; // Ağaçlar ve taşlar
    const keys = {};

    // Kamera kontrol değişkenleri
    let camYaw = 0, camPitch = -Math.PI/6;
    let isOrbiting = false;

    window.attemptLogin = () => {
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;
        if(u.length < 2) return;
        socket = io();
        socket.emit('login', { username: u, password: p });
        socket.on('loginSuccess', () => {
            document.getElementById('login-screen').style.display = 'none';
            initGame();
        });
    };

    function initGame() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0xa3d2ca);
        camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(10, 20, 10); light.castShadow = true;
        scene.add(light, new THREE.AmbientLight(0xffffff, 0.5));

        // Zemin
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), new THREE.MeshStandardMaterial({color: 0x5d8233}));
        ground.rotation.x = -Math.PI/2; ground.receiveShadow = true; scene.add(ground);

        // Ağaç ve Taşlar (Etkileşimli)
        for(let i=0; i<60; i++) {
            const x = Math.random()*180-90, z = Math.random()*180-90;
            const type = Math.random() > 0.3 ? 'tree' : 'rock';
            createWorldObject(x, z, type);
        }

        socket.on('currentPlayers', (players) => {
            myId = socket.id;
            Object.keys(players).forEach(id => {
                const p = createHumanoid(players[id]);
                if(id === myId) myPlayer = p;
                else otherPlayers[id] = p;
            });
        });

        socket.on('newPlayer', data => otherPlayers[data.id] = createHumanoid(data));
        socket.on('playerMoved', data => {
            if(otherPlayers[data.id]) {
                otherPlayers[data.id].position.set(data.x, 0, data.z);
                otherPlayers[data.id].rotation.y = data.rotationY;
            }
        });
        
        socket.on('hpUpdate', data => {
            if(data.id === myId) {
                document.getElementById('hp-fill').style.width = data.hp + "%";
            }
            // Diğer oyuncuların canını da görselleştir...
        });

        // Fare ile Kamera Kontrolü (PC)
        window.addEventListener('mousedown', (e) => { if(e.button === 2) isOrbiting = true; });
        window.addEventListener('mouseup', () => isOrbiting = false);
        window.addEventListener('mousemove', (e) => {
            if(isOrbiting) {
                camYaw -= e.movementX * 0.005;
                camPitch = Math.max(-Math.PI/2.5, Math.min(-0.1, camPitch - e.movementY * 0.005));
            }
        });
        window.addEventListener('contextmenu', e => e.preventDefault());
        window.addEventListener('click', performAttack);

        setupJoystick();
        animate();
    }

    function createWorldObject(x, z, type) {
        const group = new THREE.Group();
        if(type === 'tree') {
            const trunk = new THREE.Mesh(new THREE.BoxGeometry(0.5, 2, 0.5), new THREE.MeshStandardMaterial({color: 0x4b3621}));
            const leaves = new THREE.Mesh(new THREE.SphereGeometry(1.5), new THREE.MeshStandardMaterial({color: 0x2d5e1e}));
            leaves.position.y = 2; group.add(trunk, leaves);
        } else {
            const rock = new THREE.Mesh(new THREE.DodecahedronGeometry(1), new THREE.MeshStandardMaterial({color: 0x777}));
            group.add(rock);
        }
        group.position.set(x, 0.5, z);
        group.userData = { type, hp: 3 };
        scene.add(group);
        worldObjects.push(group);
    }

    function createHumanoid(data) {
        const group = new THREE.Group();
        // Gövde
        const body = new THREE.Mesh(new THREE.BoxGeometry(0.6, 1, 0.3), new THREE.MeshStandardMaterial({color: data.color}));
        body.position.y = 1; group.add(body);
        // Kafa
        const head = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.4, 0.4), new THREE.MeshStandardMaterial({color: 0xffdbac}));
        head.position.y = 1.8; group.add(head);
        // El (Saldırı için animasyon yapılacak parça)
        const arm = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.6, 0.2), new THREE.MeshStandardMaterial({color: 0xffdbac}));
        arm.position.set(0.5, 1.2, 0.2); 
        group.add(arm);
        group.userData = { arm };

        scene.add(group);
        return group;
    }

    window.performAttack = () => {
        if(!myPlayer) return;
        // Basit Kol Sallama Animasyonu
        myPlayer.userData.arm.rotation.x = -Math.PI/2;
        setTimeout(() => myPlayer.userData.arm.rotation.x = 0, 150);

        // Yakındaki nesneleri kontrol et
        worldObjects.forEach((obj, index) => {
            if(myPlayer.position.distanceTo(obj.position) < 3) {
                obj.userData.hp--;
                if(obj.userData.hp <= 0) {
                    scene.remove(obj);
                    worldObjects.splice(index, 1);
                }
            }
        });

        // Yakındaki oyuncuları kontrol et
        Object.keys(otherPlayers).forEach(id => {
            if(myPlayer.position.distanceTo(otherPlayers[id].position) < 3) {
                socket.emit('attack', id);
            }
        });
    };

    function setupJoystick() {
        const container = document.getElementById('joystick-container');
        const knob = document.getElementById('joystick-knob');
        container.addEventListener('touchstart', () => joystickData.active = true);
        window.addEventListener('touchend', () => { 
            joystickData.active = false; knob.style.transform = `translate(0,0)`;
            joystickData.x = 0; joystickData.y = 0;
        });
        window.addEventListener('touchmove', (e) => {
            if(!joystickData.active) return;
            const t = e.touches[0];
            const dx = t.clientX - (container.offsetLeft + 60), dy = t.clientY - (container.offsetTop + 60);
            const dist = Math.min(Math.sqrt(dx*dx+dy*dy), 50), angle = Math.atan2(dy, dx);
            knob.style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`;
            joystickData.x = Math.cos(angle) * (dist/50); joystickData.y = Math.sin(angle) * (dist/50);
        });
    }

    window.onkeydown = e => keys[e.code] = true;
    window.onkeyup = e => keys[e.code] = false;

    function animate() {
        requestAnimationFrame(animate);
        if(myPlayer) {
            const speed = 0.15;
            let mx = 0, mz = 0;

            if(keys['KeyW'] || joystickData.y < -0.2) {
                mx += Math.sin(camYaw) * speed;
                mz += Math.cos(camYaw) * speed;
            }
            if(keys['KeyS'] || joystickData.y > 0.2) {
                mx -= Math.sin(camYaw) * speed;
                mz -= Math.cos(camYaw) * speed;
            }

            if(mx !== 0 || mz !== 0) {
                myPlayer.position.x += mx;
                myPlayer.position.z += mz;
                myPlayer.rotation.y = Math.atan2(mx, mz);
                socket.emit('playerMovement', {x: myPlayer.position.x, z: myPlayer.position.z, rotationY: myPlayer.rotation.y});
            }

            // Kamera Takibi
            const dist = 10;
            camera.position.set(
                myPlayer.position.x - Math.sin(camYaw) * dist * Math.cos(camPitch),
                myPlayer.position.y - Math.sin(camPitch) * dist,
                myPlayer.position.z - Math.cos(camYaw) * dist * Math.cos(camPitch)
            );
            camera.lookAt(myPlayer.position.x, myPlayer.position.y + 1, myPlayer.position.z);
        }
        renderer.render(scene, camera);
    }
</script>
</body>
</html>
